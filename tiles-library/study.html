<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#050506" />
<title>Study</title>
<!--
  STUDY — the evidence behind "knowledgeable." Two logs: lessons learnt (short
  takeaways, newest first) and a reading list (queued, checked off when read).
  Feeds the "finance" goal in lib/tiles/weights.ts alongside the Finance tile.

  Sealed: no network. Saves through window.Vitality.
  Store: { lessons: [{id,text,ts}], reading: [{id,title,read,ts}] }
-->
<style>
  :root{
    --bg:#050506;--fg:#ededf0;--brand:#6EE7B7;
    --muted:#84848c;--muted-strong:#a8a8b0;--border:#1d1d22;--border-strong:#2a2a33;
    --danger:#ff8b8b;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --serif:Georgia,'Times New Roman',serif;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 var(--font);display:flex;justify-content:center;padding:40px 20px;-webkit-font-smoothing:antialiased;position:relative}
  body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(58% 44% at 50% -6%, rgba(110,231,183,.13), transparent 62%),
    radial-gradient(1.5px 1.5px at 14% 16%, rgba(255,255,255,.5), transparent 100%),
    radial-gradient(1px 1px at 76% 10%, rgba(255,255,255,.4), transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 6%, rgba(255,255,255,.32), transparent 100%),
    radial-gradient(1px 1px at 30% 28%, rgba(255,255,255,.28), transparent 100%)}
  .shell{width:100%;max-width:520px}
  h1{font-size:24px;font-weight:600;letter-spacing:-.01em}
  .sub{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:6px 0 0}

  .section{margin-top:30px}
  .secHd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .secTitle{font-family:var(--serif);font-style:italic;font-size:19px;color:#fff}
  .secCount{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--muted)}

  .addRow{display:flex;gap:8px}
  .addRow input{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--fg);font:14px/1.4 var(--font);outline:none;transition:border-color .15s}
  .addRow input:focus{border-color:var(--border-strong)}
  .addRow input::placeholder{color:var(--muted)}
  .addBtn{flex:0 0 auto;width:44px;border-radius:11px;border:none;background:linear-gradient(180deg,#8df0c9,var(--brand));color:#04140d;font-size:20px;font-weight:600;cursor:pointer;transition:transform .15s var(--ease)}
  .addBtn:hover{transform:translateY(-1px)}
  .addBtn:disabled{opacity:.4;cursor:default;transform:none}

  .list{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:flex-start;gap:11px;border:1px solid var(--border);border-radius:13px;background:rgba(14,14,17,.5);padding:13px 14px}
  .row .txt{flex:1;font-size:14px;line-height:1.5;word-break:break-word}
  .row .when{display:block;margin-top:3px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted)}
  .del{flex:0 0 auto;width:26px;height:26px;border-radius:999px;border:none;background:transparent;color:var(--muted);font-size:15px;cursor:pointer;line-height:1;transition:color .15s}
  .del:hover{color:var(--danger)}

  .chk{flex:0 0 auto;width:20px;height:20px;margin-top:1px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;cursor:pointer;display:grid;place-items:center;color:transparent;font-size:13px;transition:all .15s}
  .chk.on{background:var(--brand);border-color:var(--brand);color:#04140d}
  .row.read .txt{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border-strong)}

  .empty{padding:22px 4px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6}
  .foot{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:30px;text-align:center}
</style>
</head>
<body>
<div class="shell">
  <h1>Study</h1>
  <p class="sub">lessons learnt · reading list</p>
  <div id="app"></div>
  <p class="foot">knowledge going in — not just money moving</p>
</div>
<script>
var store = { lessons: [], reading: [] };
var draftLesson = '';
var draftBook = '';

function uid(){ return 's-' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
function persist(){ if (window.Vitality && window.Vitality.save) { try { window.Vitality.save(store); } catch(e){} } }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function ago(ts){
  var s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (s < 60) return 'just now';
  var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24); if (d < 7) return d + 'd ago';
  var w = Math.floor(d / 7); if (w < 5) return w + 'w ago';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function lessonsHtml(){
  if (!store.lessons.length) return '<div class="empty">Nothing logged yet — what did you learn today?</div>';
  return '<div class="list">' + store.lessons.map(function(l){
    return '<div class="row"><div class="txt">' + esc(l.text) + '<span class="when">' + ago(l.ts) + '</span></div>'
      + '<button class="del" data-del-lesson="' + l.id + '" aria-label="Remove">×</button></div>';
  }).join('') + '</div>';
}

function readingHtml(){
  if (!store.reading.length) return '<div class="empty">Nothing queued yet — what should you read next?</div>';
  var sorted = store.reading.slice().sort(function(a,b){
    if (!!a.read === !!b.read) return b.ts - a.ts;
    return a.read ? 1 : -1;
  });
  return '<div class="list">' + sorted.map(function(r){
    return '<div class="row' + (r.read ? ' read' : '') + '">'
      + '<button class="chk' + (r.read ? ' on' : '') + '" data-toggle-read="' + r.id + '" aria-label="Mark read">' + (r.read ? '✓' : '') + '</button>'
      + '<div class="txt">' + esc(r.title) + '<span class="when">' + ago(r.ts) + '</span></div>'
      + '<button class="del" data-del-reading="' + r.id + '" aria-label="Remove">×</button></div>';
  }).join('') + '</div>';
}

function render(){
  document.getElementById('app').innerHTML =
    '<div class="section">'
      + '<div class="secHd"><span class="secTitle">Lessons learnt</span><span class="secCount">' + store.lessons.length + '</span></div>'
      + '<div class="addRow"><input id="lessonInput" placeholder="What did you learn?" value="' + esc(draftLesson) + '" />'
        + '<button class="addBtn" id="lessonAdd" ' + (draftLesson.trim() ? '' : 'disabled') + ' aria-label="Add lesson">+</button></div>'
      + lessonsHtml()
    + '</div>'
    + '<div class="section">'
      + '<div class="secHd"><span class="secTitle">Reading list</span><span class="secCount">' + store.reading.length + '</span></div>'
      + '<div class="addRow"><input id="bookInput" placeholder="Book or article to read" value="' + esc(draftBook) + '" />'
        + '<button class="addBtn" id="bookAdd" ' + (draftBook.trim() ? '' : 'disabled') + ' aria-label="Add to reading list">+</button></div>'
      + readingHtml()
    + '</div>';

  var li = document.getElementById('lessonInput');
  li.addEventListener('input', function(){ draftLesson = li.value; document.getElementById('lessonAdd').disabled = !draftLesson.trim(); });
  li.addEventListener('keydown', function(e){ if (e.key === 'Enter') addLesson(); });
  document.getElementById('lessonAdd').addEventListener('click', addLesson);

  var bi = document.getElementById('bookInput');
  bi.addEventListener('input', function(){ draftBook = bi.value; document.getElementById('bookAdd').disabled = !draftBook.trim(); });
  bi.addEventListener('keydown', function(e){ if (e.key === 'Enter') addBook(); });
  document.getElementById('bookAdd').addEventListener('click', addBook);
}

function addLesson(){
  var t = draftLesson.trim();
  if (!t) return;
  store.lessons.unshift({ id: uid(), text: t, ts: Date.now() });
  draftLesson = '';
  persist(); render();
}
function addBook(){
  var t = draftBook.trim();
  if (!t) return;
  store.reading.unshift({ id: uid(), title: t, read: false, ts: Date.now() });
  draftBook = '';
  persist(); render();
}

document.addEventListener('click', function(e){
  var dl = e.target.closest('[data-del-lesson]');
  if (dl) { store.lessons = store.lessons.filter(function(l){ return l.id !== dl.getAttribute('data-del-lesson'); }); persist(); render(); return; }
  var dr = e.target.closest('[data-del-reading]');
  if (dr) { store.reading = store.reading.filter(function(r){ return r.id !== dr.getAttribute('data-del-reading'); }); persist(); render(); return; }
  var tr = e.target.closest('[data-toggle-read]');
  if (tr) {
    var id = tr.getAttribute('data-toggle-read');
    store.reading = store.reading.map(function(r){ return r.id === id ? Object.assign({}, r, { read: !r.read }) : r; });
    persist(); render(); return;
  }
});

if (!window.Vitality) {
  window.Vitality = {
    save: function(d){ try { localStorage.setItem('v:prev:study', JSON.stringify(d)); } catch(e){} return Promise.resolve(true); },
    load: function(){ try { return Promise.resolve(JSON.parse(localStorage.getItem('v:prev:study') || '{}')); } catch(e){ return Promise.resolve({}); } },
    read: function(){ return Promise.resolve(null); }
  };
}
(async function(){
  var d = await window.Vitality.load();
  if (d && typeof d === 'object' && !Array.isArray(d)) {
    store.lessons = Array.isArray(d.lessons) ? d.lessons : [];
    store.reading = Array.isArray(d.reading) ? d.reading : [];
  }
  render();
})();
</script>
</body>
</html>
