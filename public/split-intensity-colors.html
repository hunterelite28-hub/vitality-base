<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Split intensity colors · heavy / volume / normal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --fg:#fff; --mint:#6EE7B7; --amber:#fbbf24;
  --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.7); --faint:rgba(255,255,255,.3);
  --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16); --card:rgba(255,255,255,.02);
  --s2:.5rem; --s3:.75rem; --s4:1rem; --s5:1.25rem;
  --r-md:8px; --r-lg:12px; --r-pill:999px;
  --serif:'Instrument Serif',Georgia,serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060a;min-height:100vh;font-family:Inter,sans-serif;color:var(--fg);-webkit-font-smoothing:antialiased;
  padding:42px 22px 80px;background-image:radial-gradient(90% 24vh at 50% 0%,rgba(110,231,183,.07),transparent 70%)}
.wrap{max-width:560px;margin:0 auto}
.pageHead{text-align:center;margin-bottom:8px}
.eyebrowRule{display:inline-flex;align-items:center;gap:var(--s3);font-family:var(--mono);font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mint)}
.eyebrowRule::before,.eyebrowRule::after{content:'';width:24px;height:1px;background:var(--mint);opacity:.55}
.pageTitle{font-family:var(--serif);font-style:italic;font-size:2rem;margin:.4rem 0 .3rem}
.pageSub{color:var(--muted-strong);font-size:.86rem;line-height:1.5;max-width:480px;margin:0 auto}
.cTag{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-strong);margin:30px 0 10px}
.cTag b{color:var(--mint);font-weight:500}

.legend{display:flex;justify-content:center;gap:var(--s5);margin:0 0 12px}
.legItem{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.legDot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.card{border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;background:var(--card);margin-bottom:10px;display:flex;flex-direction:column;gap:12px}
.head{display:flex;align-items:baseline;gap:10px}
.name{font-family:var(--serif);font-style:italic;font-size:1.1rem;flex:1;min-width:0}
.fr{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.rhythm{border-top:1px solid var(--border);padding-top:12px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);align-items:start}
.cell{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}
.pd{width:8px;height:8px;border-radius:50%}
.lab{font-family:var(--mono);font-size:8px;font-weight:500;letter-spacing:.02em;text-transform:uppercase;line-height:1;white-space:nowrap}
.spacer{height:8px}
.rep{grid-column:span 3;align-self:start;padding-left:8px;display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mint);opacity:.72;white-space:nowrap}
.rep svg{width:12px;height:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="pageHead">
    <div class="eyebrowRule">Intensity · colors</div>
    <h1 class="pageTitle">Heavy · volume · normal</h1>
    <p class="pageSub">A split with no heavy/volume split now reads as "normal" days — a different colour from a true heavy day. Two palette options.</p>
  </div>
  <div id="out"></div>
</div>

<script>
const LOOP=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>`;

// each day: [kind, label]  kind: 'heavy' | 'volume' | 'normal' | 'rest'
// (in the real app: a HEAVY day in a split that HAS volume = heavy; a HEAVY day
//  in a split with NO volume days = normal.)
const SPLITS = [
  {name:'Full Body', fr:'3× /wk', periodised:false,
    week:[['normal','Full'],['rest',''],['normal','Full'],['rest',''],['normal','Full'],['rest',''],['rest','']]},
  {name:'Upper / Lower', fr:'4× /wk', periodised:true,
    week:[['heavy','Upper'],['heavy','Lower'],['rest',''],['volume','Upper'],['volume','Lower'],['rest',''],['rest','']]},
  {name:'Push Pull Legs', fr:'3× /cycle', rot:true, periodised:false,
    cycle:[['normal','Push'],['normal','Pull'],['normal','Legs'],['rest','']]},
  {name:'Bro Split', fr:'5× /wk', periodised:false,
    week:[['normal','Chest'],['normal','Back'],['normal','Delts'],['normal','Arms'],['normal','Legs'],['rest',''],['rest','']]},
  {name:'Push Pull Legs', fr:'6× /wk', periodised:true,
    week:[['heavy','Push'],['heavy','Pull'],['heavy','Legs'],['volume','Push'],['volume','Pull'],['volume','Legs'],['rest','']]},
];

// two palettes: { heavy, volume, normal }  (rest is always hollow)
const PALETTES = {
  A: {label:'normal = mint · heavy = blue · volume = amber', heavy:'#7cb8f5', volume:'#fbbf24', normal:'#6EE7B7'},
  B: {label:'heavy = mint · normal = slate · volume = amber', heavy:'#6EE7B7', volume:'#fbbf24', normal:'#7d96a8'},
};

function dot(kind, pal){
  if(kind==='rest') return `<span class="pd" style="background:transparent;border:1px solid rgba(255,255,255,.2)"></span>`;
  const c = pal[kind];
  return `<span class="pd" style="background:${c};box-shadow:0 0 0 2px ${c}22"></span>`;
}
function days(s){return s.rot?s.cycle:s.week;}
function rhythm(s, pal){
  const cells = days(s).map(([k,l])=>`<div class="cell">${dot(k,pal)}${(k!=='rest'&&l)?`<span class="lab" style="color:${pal[k]};opacity:.8">${l}</span>`:'<span class="spacer"></span>'}</div>`).join('');
  const rep = s.rot ? `<span class="rep">${LOOP}repeats</span>` : '';
  return `<div class="g7">${cells}${rep}</div>`;
}
function legend(pal){
  return `<div class="legend">
    <span class="legItem"><span class="legDot" style="background:${pal.heavy}"></span>heavy</span>
    <span class="legItem"><span class="legDot" style="background:${pal.volume}"></span>volume</span>
    <span class="legItem"><span class="legDot" style="background:${pal.normal}"></span>normal</span>
    <span class="legItem"><span class="legDot" style="background:transparent;border:1px solid rgba(255,255,255,.25)"></span>rest</span>
  </div>`;
}
function section(tag, pal){
  return `<div class="cTag">${tag}<div style="text-transform:none;letter-spacing:.04em;color:var(--muted);margin-top:3px">${pal.label}</div></div>`+
    legend(pal)+
    SPLITS.map(s=>`<div class="card"><div class="head"><span class="name">${s.name}</span><span class="fr">${s.fr}</span></div><div class="rhythm">${rhythm(s,pal)}</div></div>`).join('');
}
document.getElementById('out').innerHTML =
  section('palette <b>A</b>', PALETTES.A)+
  section('palette <b>B</b>', PALETTES.B);
</script>
</body>
</html>
