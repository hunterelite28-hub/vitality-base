<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cardio — final mix</title>
<style>
  :root{
    --bg:#000; --mint:#6EE7B7; --mint-hover:#5dd6a6;
    --fg:#f5f5f5; --text:#f5f5f5;
    --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.7);
    --rule:rgba(255,255,255,.08); --rule-strong:rgba(255,255,255,.16);
    --space-2:.5rem; --space-3:.75rem; --space-4:1rem; --space-6:1.5rem;
    --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-xl:1.375rem; --text-2xl:1.75rem;
    --ease:cubic-bezier(.2,.8,.2,1); --ease-premium:cubic-bezier(.16,1,.3,1); --duration:180ms;
    --font-serif:'Times New Roman',Georgia,serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; padding:32px 0 80px}
  ::selection{background:rgba(110,231,183,.3)}

  .lab-head{text-align:center; margin-bottom:28px}
  .lab-eyebrow{font-size:var(--text-xs); letter-spacing:.2em; text-transform:uppercase; color:var(--muted)}
  .lab-title{font-family:var(--font-serif); font-style:italic; font-size:1.6rem; margin:4px 0 0}

  /* two frames side by side so both widths are visible at once */
  .frames{display:flex; gap:40px; justify-content:center; align-items:flex-start; flex-wrap:wrap; padding:0 22px}
  .frame{display:flex; flex-direction:column; align-items:center; gap:10px}
  .frame .cap{font-size:var(--text-xs); letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
  .phone{width:390px; max-width:calc(100vw - 44px); border:1px solid var(--rule); border-radius:30px; padding:24px 20px}
  .desktop{width:680px; max-width:calc(100vw - 44px); border:1px solid var(--rule); border-radius:20px; padding:30px 40px}
  /* the real app constrains the logger column even on desktop, so content keeps a readable measure */
  .desktop .col{max-width:520px; margin:0 auto}

  /* scene context — faded lift card */
  .ghost-lift{border:1px solid var(--rule); border-radius:22px; padding:18px 20px; opacity:.4; pointer-events:none}
  .ghost-lift .gl-name{font-family:var(--font-serif); font-style:italic; font-size:var(--text-2xl); line-height:1.05}
  .ghost-lift .gl-meta{font-size:var(--text-xs); letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-top:4px}
  .ghost-lift .gl-rows{display:flex; gap:8px; margin-top:14px}
  .ghost-lift .gl-pill{flex:1; height:46px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid var(--rule)}

  /* ===== section ===== */
  .cardioSection{margin-top:var(--space-6); padding-top:var(--space-6); border-top:1px solid var(--rule)}

  /* header: warm eyebrow + pulse mark + title + trailing rule */
  .cardioHead{margin-bottom:var(--space-4)}
  .cardioEyebrow{font-size:var(--text-xs); font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:var(--mint); opacity:.85}
  .cardioHeadRow{display:flex; align-items:center; gap:12px; margin-top:5px}
  .cardioPulse{flex:none; width:30px; height:24px; color:var(--mint)}
  .cardioPulse path{stroke-dasharray:60; stroke-dashoffset:60; animation:cardioDraw 2.4s var(--ease-premium) infinite}
  @keyframes cardioDraw{0%{stroke-dashoffset:60}38%{stroke-dashoffset:0}68%{stroke-dashoffset:0}100%{stroke-dashoffset:-60}}
  @media (prefers-reduced-motion:reduce){.cardioPulse path{animation:none; stroke-dashoffset:0}}
  .cardioTitle{margin:0; flex:none; font-family:var(--font-serif); font-style:italic; font-size:var(--text-2xl); color:var(--text); line-height:1}
  .cardioRule{flex:1; height:1px; background:linear-gradient(90deg, var(--rule-strong), transparent)}

  /* invitation card (rhymes with the Zone-2 summary surface) */
  .invite{border:1px solid rgba(110,231,183,.2); border-radius:20px; padding:22px; background:radial-gradient(130% 130% at 0% 0%, rgba(110,231,183,.08), transparent 60%)}
  .invite-line{font-size:var(--text-base); color:var(--text); line-height:1.45; margin:0}
  .invite-line b{color:var(--mint); font-weight:600}
  .invite-sub{font-size:var(--text-sm); color:var(--muted); margin:7px 0 0; line-height:1.5}
  .invite-rail{display:flex; gap:9px; margin:18px 0; flex-wrap:wrap}
  .invite-chip{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;color:var(--mint);background:rgba(110,231,183,.08);border:1px solid rgba(110,231,183,.16)}
  .invite-btn{width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:15px; border-radius:14px; border:none; background:var(--mint); color:#04130d; font-size:var(--text-sm); font-weight:700; cursor:pointer; transition:background var(--duration) var(--ease), transform var(--duration) var(--ease)}
  .invite-btn:hover{background:var(--mint-hover)}
  .invite-btn:active{transform:scale(.98)}
  .cardioAddPlus{font-size:16px; line-height:1}

  /* picker (after Add cardio) */
  .cardioPicker{border:1px solid var(--rule); border-radius:18px; padding:var(--space-3); background:rgba(255,255,255,.022)}
  .cardioPickerTop{display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-3)}
  .cardioPickerLabel{font-size:var(--text-xs); letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:500}
  .cardioPickerClose{width:26px;height:26px;display:grid;place-items:center;font-size:16px;color:var(--muted);background:transparent;border:none;cursor:pointer}
  .cardioTiles{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-2)}
  .cardioTile{display:flex; flex-direction:column; align-items:center; gap:9px; padding:15px 4px; border-radius:14px; border:1px solid transparent; background:rgba(255,255,255,.03); color:var(--mint); cursor:pointer; transition:border-color var(--duration) var(--ease), background var(--duration) var(--ease), transform var(--duration) var(--ease)}
  .cardioTile:active{transform:scale(.94)}
  .cardioTile:hover{border-color:rgba(110,231,183,.4); background:rgba(110,231,183,.07)}
  .cardioTile span{font-size:.625rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-strong); text-align:center; font-weight:500}
  @media (max-width:380px){.cardioTiles{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
  <div class="lab-head">
    <div class="lab-eyebrow">SplitLog · cardio — final mix</div>
    <div class="lab-title">Header 4 + pulse · Invitation card</div>
  </div>

  <div class="frames">
    <div class="frame">
      <span class="cap">mobile · 390</span>
      <div class="phone"><div class="col" id="m"></div></div>
    </div>
    <div class="frame">
      <span class="cap">desktop · constrained column</span>
      <div class="desktop"><div class="col" id="d"></div></div>
    </div>
  </div>

<script>
  const TYPES=[
    {id:'walk',label:'Walk'},{id:'incline_walk',label:'Incline walk'},{id:'run',label:'Run'},
    {id:'cycle',label:'Cycling'},{id:'row',label:'Rowing'},{id:'stairs',label:'Stairmaster'},
    {id:'elliptical',label:'Elliptical'},{id:'other',label:'Other cardio'},
  ];
  const PATHS={
    walk:'<ellipse cx="9.5" cy="9" rx="1.9" ry="2.9"/><ellipse cx="14.5" cy="13" rx="1.9" ry="2.9"/>',
    incline_walk:'<path d="M4 19 18 6"/><path d="M4 19h14" opacity="0.35"/>',
    run:'<path d="M6 7l5 5-5 5"/><path d="M13 7l5 5-5 5"/>',
    cycle:'<circle cx="6" cy="17" r="3.1"/><circle cx="18" cy="17" r="3.1"/><path d="M6 17l4-6h5l-3 6"/><path d="M10 11l2-3h3"/>',
    row:'<path d="M4 9c2.5 2 5.5 2 8 0s5.5-2 8 0"/><path d="M4 15c2.5 2 5.5 2 8 0s5.5-2 8 0"/>',
    stairs:'<path d="M4 19h4v-3h4v-3h4v-3h4"/>',
    elliptical:'<ellipse cx="12" cy="14.5" rx="7.5" ry="3"/><path d="M9 6l6 8"/>',
    other:'<path d="M3 12h4l2 6 4-14 2 8h6"/>',
  };
  function glyph(id,size){size=size||22;return '<svg viewBox="0 0 24 24" width="'+size+'" height="'+size+'" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+(PATHS[id]||PATHS.other)+'</svg>';}

  function section(){
    return ''+
    '<div class="ghost-lift"><div class="gl-name">Lat pulldown</div><div class="gl-meta">last · 3 sets</div>'+
      '<div class="gl-rows"><div class="gl-pill"></div><div class="gl-pill"></div><div class="gl-pill"></div></div></div>'+
    '<section class="cardioSection">'+
      '<div class="cardioHead">'+
        '<span class="cardioEyebrow">After the lifts</span>'+
        '<div class="cardioHeadRow">'+
          '<svg class="cardioPulse" viewBox="0 0 30 24" width="30" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M0 12h7l3-7 5 14 3-7h9"/></svg>'+
          '<h2 class="cardioTitle">Cardio</h2>'+
          '<span class="cardioRule"></span>'+
        '</div>'+
      '</div>'+
      '<div class="body">'+inviteHTML()+'</div>'+
    '</section>';
  }
  function inviteHTML(){
    return '<div class="invite">'+
      '<p class="invite-line">Cap the session with a little <b>zone 2</b>.</p>'+
      '<p class="invite-sub">A walk, a run, anything easy. It builds the aerobic base your lifts sit on.</p>'+
      '<div class="invite-rail">'+TYPES.slice(0,5).map(t=>'<span class="invite-chip">'+glyph(t.id,20)+'</span>').join('')+'</div>'+
      '<button class="invite-btn" data-add><span class="cardioAddPlus">+</span> Add cardio</button>'+
    '</div>';
  }
  function pickerHTML(){
    return '<div class="cardioPicker"><div class="cardioPickerTop"><span class="cardioPickerLabel">Pick your cardio</span>'+
      '<button class="cardioPickerClose" data-close>×</button></div>'+
      '<div class="cardioTiles">'+TYPES.map(t=>'<button class="cardioTile" data-close>'+glyph(t.id,22)+'<span>'+t.label+'</span></button>').join('')+'</div></div>';
  }
  function mount(id){
    const root=document.getElementById(id);
    root.innerHTML=section();
    const body=root.querySelector('.body');
    root.addEventListener('click',e=>{
      if(e.target.closest('[data-add]')) body.innerHTML=pickerHTML();
      else if(e.target.closest('[data-close]')) body.innerHTML=inviteHTML();
    });
  }
  mount('m'); mount('d');
</script>
</body>
</html>
