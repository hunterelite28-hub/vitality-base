<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vitals</title>
<style>
  :root{--mint:#6EE7B7;--bg:#050506;--card:#0e0e11;--line:#1d1d22;--fg:#ededf0;--muted:#84848c}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;display:flex;justify-content:center;padding:44px 20px}
  .wrap{width:100%;max-width:600px}
  h1{font-size:24px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:0 0 24px;font-size:13px}
  .field{margin-bottom:18px}
  .field label{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:8px}
  .field label b{color:var(--mint);font-weight:600}
  input[type=range]{width:100%;accent-color:var(--mint)}
  .save{background:var(--mint);color:#04140d;border:none;border-radius:11px;padding:12px 20px;font-weight:600;cursor:pointer;width:100%;margin-top:6px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:30px 0 12px}
  .item{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:8px}
  .meta{color:var(--muted);font-size:13px}
  .empty{color:var(--muted);font-size:14px;padding:8px 2px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Daily Check-in</h1>
  <p class="sub">How's the body today?</p>
  <div class="field"><label>Sleep <b><span id="slV">7.5</span> h</b></label><input type="range" id="sl" min="0" max="12" step="0.5" value="7.5"></div>
  <div class="field"><label>Recovery <b><span id="reV">70</span>%</b></label><input type="range" id="re" min="0" max="100" step="1" value="70"></div>
  <div class="field"><label>Mood <b><span id="moV">3</span>/5</b></label><input type="range" id="mo" min="1" max="5" step="1" value="3"></div>
  <button class="save" id="save">Save today</button>
  <h2>Recent</h2>
  <div id="list"></div>
</div>
<script>
  const $=s=>document.querySelector(s);
  let rows=[];
  const dayKey=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
  const nice=k=>{const[y,m,d]=k.split("-");return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+(+d)};
  const bind=(id,vid)=>{const el=$("#"+id);el.oninput=()=>$("#"+vid).textContent=el.value;};
  bind("sl","slV");bind("re","reV");bind("mo","moV");
  function render(){
    $("#list").innerHTML=rows.slice(-7).reverse().map(r=>
      `<div class="item"><b>${nice(r.day)}</b><span class="meta">${r.sl}h sleep · ${r.re}% rec · mood ${r.mo}</span></div>`
    ).join("")||'<div class="empty">No check-ins yet.</div>';
  }
  $("#save").onclick=async()=>{
    const day=dayKey();
    rows=rows.filter(r=>r.day!==day);
    rows.push({day,sl:$("#sl").value,re:$("#re").value,mo:$("#mo").value,ts:Date.now()});
    render(); await window.Vitality.save(rows);
  };
  (async()=>{const d=await window.Vitality.load();rows=Array.isArray(d)?d:[];render();})();
</script>
</body>
</html>
