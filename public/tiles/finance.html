<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Finance</title>
<style>
  /* Vitality reskin of the Patron "Finance" tile — sealed & bridge-backed.
     Net worth · subs · orders · wishlist. All state persists through the
     dashboard bridge (window.Vitality); no localStorage, no network. Live FX,
     live stock quotes, and AI screenshot import were dropped (can't run sealed)
     — stocks + everything else stay as manual entry. */
  :root{
    color-scheme: dark;
    --bg:#050506; --bg-elevated:#121216;
    --surface:#0e0e11; --surface-2:#16161b;
    --fg:#ededf0; --muted:#84848c; --muted-strong:#a8a8b0;
    --border:#1d1d22; --border-strong:#2c2c33;
    --brand:#6EE7B7; --brand-2:#9df3cf; --brand-ink:#04140d;
    --brand-soft:rgba(110,231,183,0.08); --brand-line:rgba(110,231,183,0.35); --brand-glow:rgba(110,231,183,0.42);
    --pos:#6EE7B7; --pos-soft:rgba(110,231,183,0.10); --pos-line:rgba(110,231,183,0.30);
    --neg:#ff6b6b; --neg-soft:rgba(255,107,107,0.10); --neg-line:rgba(255,107,107,0.40);
    --warn:#FBBF24; --warn-soft:rgba(251,191,36,0.10); --warn-line:rgba(251,191,36,0.28);
    --track:#17171b;
    --card-shadow:0 1px 0 rgba(255,255,255,0.02) inset, 0 18px 44px -30px rgba(0,0,0,0.85);
    --glow-1:rgba(110,231,183,0.10); --glow-2:rgba(110,231,183,0.04);
    --tabbar-grad:linear-gradient(to top, rgba(5,5,6,0.94) 55%, transparent);
    --tabbar-pill:rgba(16,16,20,0.92);
    --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
    --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    --radius-sm:8px;--radius-md:11px;--radius-lg:18px;--radius-pill:999px;
    --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;
    --text-xl:1.375rem;--text-2xl:1.75rem;--text-3xl:2.5rem;
    --ease:cubic-bezier(0.2,0.8,0.2,1); --ease-premium:cubic-bezier(0.16,1,0.3,1);
    --duration-fast:120ms; --duration:200ms;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  html { -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--font-ui); font-size: var(--text-base);
    -webkit-font-smoothing: antialiased; overflow-x:hidden; -webkit-tap-highlight-color:transparent;
  }
  img { max-width:100%; height:auto; }
  @media (max-width:480px){ input,select,textarea{ font-size:16px !important; } }

  .page { position: relative; min-height: 100dvh; background: var(--bg); color: var(--fg); padding: var(--space-8) var(--space-5) var(--space-16); isolation: isolate; }
  .page::before { content:''; position: absolute; inset:0; pointer-events:none; z-index:-1; background: radial-gradient(58% 42% at 82% 6%, var(--glow-1), transparent 70%), radial-gradient(48% 38% at 12% 92%, var(--glow-2), transparent 72%); }
  .shell { max-width: 1000px; margin: 0 auto; padding-bottom: 96px; }

  /* Header */
  .header { display:flex; align-items:flex-end; justify-content:space-between; gap: var(--space-4); margin-bottom: var(--space-8); flex-wrap: wrap; }
  .headerLeft { display:flex; flex-direction:column; gap: var(--space-3); }
  .headerRight { display:flex; flex-direction:column; align-items:flex-end; gap: var(--space-2); }
  .title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-3xl); line-height: 1.0; letter-spacing: -0.03em; color: var(--fg); margin: 0; }
  .subtitle { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin: 0; }
  .currencySeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px; gap: 2px; }
  .currencyBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.04em; padding: 5px 11px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
  .currencyBtn:hover { color: var(--muted-strong); }
  .currencyBtnActive, .currencyBtnActive:hover { background: var(--brand); color: var(--brand-ink); }

  /* Section */
  .section { margin-bottom: var(--space-10); }
  .sectionEyebrow { font-family: var(--font-display); font-weight: 700; font-size: var(--text-xl); letter-spacing: -0.02em; color: var(--fg); margin-bottom: var(--space-4); display:flex; align-items:baseline; justify-content:space-between; gap: var(--space-3); }
  .sectionEyebrow > span:first-child { display:inline-flex; align-items:center; gap: 10px; }
  .sectionEyebrow > span:first-child::before { content:''; width: 7px; height: 18px; border-radius: 3px; background: var(--brand); box-shadow: 0 0 12px -2px var(--brand-glow); }
  .sectionCount { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .sectionCountSep { color: var(--brand); font-weight: 600; }

  /* NW hero */
  .nwHero { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap: var(--space-4); margin-bottom: var(--space-5); }
  .nwHeroLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .nwHeroNum { font-family: var(--font-display); font-size: 46px; font-weight: 700; line-height: 1.0; letter-spacing: -0.03em; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .nwHeroBreakdown { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 8px; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .nwHeroMain { flex: 1; min-width: 0; }
  .nwHeroNumRow { display:inline-flex; align-items:baseline; gap: var(--space-3); flex-wrap: wrap; }
  .firstRunHint { margin-top: var(--space-3); font-size: 13px; color: var(--muted-strong); line-height: 1.5; max-width: 42ch; }
  .dailyDelta { display:inline-flex; align-items:baseline; gap: 6px; font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; padding: 4px 10px; border-radius: var(--radius-pill); border: 1px solid transparent; background: var(--surface-2); color: var(--muted-strong); white-space: nowrap; }
  .dailyDelta.up { background: var(--pos-soft); border-color: var(--pos-line); color: var(--pos); }
  .dailyDelta.down { background: var(--neg-soft); border-color: var(--neg-line); color: var(--neg); }
  .dailyDelta.flat { color: var(--muted); font-style: italic; }
  .dailyDeltaPct { font-weight: 500; opacity: 0.8; }
  .dailyDeltaWindow { font-family: var(--font-mono); font-size: 9px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: inherit; opacity: 0.6; }

  /* Overview grid */
  .overviewGrid { display:grid; grid-template-columns: 1.6fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4); }
  @media (max-width: 720px) { .overviewGrid { grid-template-columns: 1fr; } }
  .chartWrap, .donutWrap { position: relative; padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); }
  .chartHead { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: var(--space-4); gap: var(--space-3); flex-wrap: wrap; }
  .chartHeadLeft { display:inline-flex; align-items:baseline; gap: var(--space-3); }
  .chartLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .chartDelta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .chartDelta.up { color: var(--pos); } .chartDelta.down { color: var(--neg); }
  .periodSeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 2px; gap: 1px; }
  .periodBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 5px 10px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
  .periodBtn:hover { color: var(--muted-strong); }
  .periodBtnActive, .periodBtnActive:hover { background: var(--brand); color: var(--brand-ink); }
  .chartSvg { display:block; width: 100%; height: 144px; color: var(--pos); }
  .chartGrid { stroke: var(--border); stroke-width: 0.5; }
  .chartLineStroke { filter: drop-shadow(0 0 7px currentColor); }
  .chartEmpty { text-align:center; color: var(--muted); font-size: var(--text-sm); padding: var(--space-6) 0; }
  .chartStatsRow { display:grid; grid-template-columns: repeat(4,1fr); gap: var(--space-3); margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--border); }
  .chartStat { display:flex; flex-direction:column; gap: 3px; }
  .chartStatLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .chartStatVal { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--fg); }

  /* Donut */
  .donutStage { position: relative; display:flex; align-items:center; justify-content:center; margin: var(--space-3) 0; }
  .donutSvg { width: 162px; height: 162px; }
  .donutCenter { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
  .donutNum { font-family: var(--font-display); font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .donutSub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .donutEmpty { text-align:center; color: var(--muted); font-size: var(--text-sm); padding: var(--space-3) 0; }
  .donutLegend { display:flex; flex-direction:column; gap: 8px; margin-top: var(--space-3); }
  .donutLeg { display:grid; grid-template-columns: 12px 1fr auto; align-items:center; gap: 9px; font-size: 12px; color: var(--muted-strong); }
  .donutLegDot { width: 9px; height: 9px; border-radius: 3px; }
  .donutLegPct { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--muted); }

  /* Account cards */
  .accountsGrid { display:grid; grid-template-columns: repeat(2,1fr); gap: var(--space-4); }
  @media (max-width: 720px) { .accountsGrid { grid-template-columns: 1fr; } }
  .accountCard { display:flex; flex-direction:column; gap: var(--space-3); padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); }
  .accountHead { display:flex; align-items:baseline; justify-content:space-between; }
  .accountLabel { font-family: var(--font-display); font-weight: 700; font-size: var(--text-base); letter-spacing: -0.01em; color: var(--fg); }
  .accountTotal { font-family: var(--font-mono); font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .accountTotalPct { font-size: 10px; font-weight: 400; letter-spacing: 0.02em; color: var(--muted); margin-left: 6px; font-variant-numeric: tabular-nums; }
  .accountList { display:flex; flex-direction:column; gap: 2px; }
  .accountRow { display:grid; grid-template-columns: 1fr auto auto; align-items:center; gap: var(--space-3); padding: 8px 10px; border-radius: var(--radius-md); transition: background var(--duration) var(--ease-premium); }
  .accountRow:hover { background: var(--surface-2); }
  .accountRowName { font-size: 13px; color: var(--fg); cursor: pointer; border-radius: 6px; padding: 2px 5px; margin-left: -5px; }
  .accountRowName:hover { background: var(--brand-soft); }
  .accountRowAmount { font-family: var(--font-mono); font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; cursor: pointer; text-align:right; border-radius: 6px; padding: 2px 5px; color: var(--fg); }
  .accountRowAmount:hover { background: var(--brand-soft); }
  .inlineEditInput { width: 100%; background: var(--bg-elevated); border: 1px solid var(--brand-line); border-radius: 6px; padding: 4px 7px; color: var(--fg); font-family: var(--font-mono); font-size: 13px; outline: none; font-variant-numeric: tabular-nums; }
  .inlineEditAmt { text-align:right; width: 110px; }
  .deleteBtn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 11px; line-height: 1; padding: 5px 8px; border-radius: var(--radius-md); cursor: pointer; transition: color var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium); }
  .deleteBtn:hover { color: var(--neg); border-color: var(--neg-line); }
  .quickAdd { display:grid; grid-template-columns: 1fr 110px auto; gap: 7px; align-items:stretch; }
  .quickAddInput { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px 11px; color: var(--fg); font-family: var(--font-ui); font-size: 13px; outline: none; transition: border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium); }
  .quickAddInput::placeholder { color: var(--muted); }
  .quickAddInput:focus { border-color: var(--brand-line); box-shadow: 0 0 0 3px var(--brand-soft); }
  .quickAddBtn { background: var(--brand); border:0; color: var(--brand-ink); font-family: var(--font-ui); font-size: 13px; font-weight: 700; border-radius: var(--radius-md); padding: 0 15px; cursor: pointer; transition: filter var(--duration) var(--ease-premium); }
  .quickAddBtn:hover { filter: brightness(1.08); }
  .quickAddBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .addToggle { align-self:flex-start; background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius-md); color: var(--muted); font-family: var(--font-ui); font-size: 12px; letter-spacing: 0.01em; padding: 7px 13px; cursor: pointer; transition: color var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
  .addToggle:hover { color: var(--brand); border-color: var(--brand-line); background: var(--brand-soft); border-style: solid; }

  /* Activity */
  .activity { margin-top: var(--space-5); padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); }
  .activityHead { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: var(--space-3); }
  .activityList { display:flex; flex-direction:column; gap:0; }
  .activityBucket { display:flex; flex-direction:column; }
  .activityBucket + .activityBucket { margin-top: var(--space-3); }
  .activityBucketLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 500; padding: 4px 0 2px; }
  .activityRow { display:grid; grid-template-columns: 4px 1fr auto auto; align-items:center; gap: var(--space-3); padding: 11px 0; border-bottom: 1px solid var(--border); }
  .activityRow:last-child { border-bottom:0; }
  .activityBar { width: 3px; height: 26px; border-radius: 2px; }
  .activityInfo { min-width:0; }
  .activityName { font-size: 13px; color: var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .activityMeta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .activityAmt { font-family: var(--font-mono); font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .activityAmt.up { color: var(--pos); } .activityAmt.down { color: var(--neg); }
  .activityDate { font-family: var(--font-mono); font-size: 11px; color: var(--muted); min-width: 50px; text-align:right; }
  .activityEmpty { color: var(--muted); text-align:center; padding: var(--space-5) 0; }

  /* Ticker */
  .ticker { display:flex; align-items:center; gap: var(--space-3); padding: 9px 15px; background: var(--brand-soft); border: 1px solid var(--brand-line); border-radius: var(--radius-pill); margin-bottom: var(--space-5); overflow:hidden; }
  .ticker.urgent { background: var(--warn-soft); border-color: var(--warn-line); }
  .tickerTag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brand); font-weight: 600; flex-shrink:0; }
  .ticker.urgent .tickerTag { color: var(--warn); }
  .tickerStream { position: relative; flex:1; height: 18px; overflow:hidden; }
  .tickerItem { position:absolute; inset:0; display:flex; align-items:center; gap: var(--space-3); opacity:0; transform: translateY(8px); transition: opacity 400ms var(--ease-premium), transform 400ms var(--ease-premium); font-size: 12px; }
  .tickerItem.active { opacity:1; transform: translateY(0); }
  .tickerItemName { color: var(--fg); font-weight: 500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width: 50%; }
  .tickerItemAmt { font-family: var(--font-mono); color: var(--muted-strong); font-variant-numeric: tabular-nums; }
  .tickerItemDays { margin-left:auto; font-family: var(--font-mono); color: var(--muted); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .ticker.urgent .tickerItemDays { color: var(--warn); }
  .tickerDots { display:flex; gap: 4px; flex-shrink:0; }
  .tickerDot { width: 4px; height: 4px; border-radius: 50%; background: var(--border-strong); }
  .tickerDot.active { background: var(--brand); }
  .ticker.urgent .tickerDot.active { background: var(--warn); }

  /* Subs */
  .subsHero { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap: var(--space-3); margin-bottom: var(--space-4); }
  .subsHeroNum { font-family: var(--font-display); font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; margin-top: 6px; }
  .subsHeroNumSuffix { font-family: var(--font-ui); font-size: 13px; color: var(--muted); font-weight: 500; margin-left: 5px; }
  .subsHeroSub { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .subRow { display:grid; grid-template-columns: 1fr auto auto; align-items:center; gap: var(--space-3); padding: 13px 15px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; }
  .subRow.urgent { background: var(--warn-soft); box-shadow: inset 3px 0 0 var(--warn); border-color: var(--warn-line); }
  .subRowName { font-size: 14px; font-weight: 700; color: var(--fg); }
  .subRowPeriod { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: capitalize; }
  .subRowRenew { font-size: 10px; color: var(--warn); margin-top: 4px; }
  .subRowPills { display:flex; flex-wrap:wrap; gap: 6px; margin-top: 7px; }
  .subPill { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.02em; padding: 3px 9px; border-radius: var(--radius-pill); background: var(--surface-2); color: var(--muted-strong); }
  .subToggle { appearance:none; background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.02em; padding: 3px 9px 3px 7px; border-radius: var(--radius-pill); cursor: pointer; display:inline-flex; align-items:center; gap: 5px; transition: all var(--duration) var(--ease-premium); }
  .subToggle.on { background: var(--brand-soft); color: var(--brand); border-color: var(--brand-line); }
  .subToggleDot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .subToggle.on .subToggleDot { background: var(--brand); box-shadow: 0 0 5px var(--brand-glow); }
  .subRowCost { text-align:right; line-height: 1.15; }
  .subRowCostBig { font-family: var(--font-display); font-size: 21px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .subRowCostUnit { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .subRowCostBilled { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .subRowActions { display:flex; flex-direction:column; gap: 5px; align-items:center; }
  .iconBtn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; line-height: 1; padding: 4px 8px; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font-ui); transition: color var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium); }
  .iconBtn:hover { color: var(--fg); border-color: var(--border-strong); }

  /* Add card */
  .addCard { padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-4); box-shadow: var(--card-shadow); }
  .addCardHead { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; }
  .addEyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .modeSeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px; gap: 2px; }
  .modeBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 12px; font-weight: 500; letter-spacing: 0.01em; padding: 6px 15px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
  .modeBtn:hover { color: var(--muted-strong); }
  .modeBtnActive, .modeBtnActive:hover { background: var(--brand); color: var(--brand-ink); }
  .addGrid { display:grid; gap: 8px; grid-template-columns: 1.4fr 0.9fr 0.7fr 0.9fr 1.1fr auto; align-items:stretch; }
  .addGridBought { grid-template-columns: 1.4fr 0.9fr 1fr auto; }
  @media (max-width: 720px) { .addGrid, .addGridBought { grid-template-columns: 1fr 1fr; } }
  .quickAddInputAlert { border-color: var(--warn-line) !important; box-shadow: 0 0 0 3px var(--warn-soft); }
  .addPreview { font-size: 11px; color: var(--muted); margin-top: var(--space-3); font-style: italic; }
  .addPreview.warn { color: var(--warn); } .addPreview.bad { color: var(--neg); }
  .subsCheck { display:inline-flex; align-items:center; gap: 8px; margin-top: var(--space-3); font-size: 11px; color: var(--muted-strong); cursor: pointer; }

  /* Orders */
  .ordCard { padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-3); display:flex; flex-direction:column; gap: var(--space-3); box-shadow: var(--card-shadow); }
  .ordCard.deducted { opacity: 0.62; }
  .ordHead { display:grid; grid-template-columns: 1fr auto auto; gap: var(--space-3); align-items:baseline; }
  .ordName { font-size: var(--text-base); font-weight: 700; color: var(--fg); }
  .ordCard.deducted .ordName { text-decoration: line-through; text-decoration-color: var(--muted); }
  .ordAmt { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .ordMetaRow { display:flex; flex-wrap:wrap; gap: 6px; align-items:center; }
  .ordPill { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.02em; padding: 4px 10px; border-radius: var(--radius-pill); background: var(--surface-2); color: var(--muted-strong); }
  .ordPill.good { background: var(--pos-soft); color: var(--pos); }
  .ordPill.warn { background: var(--warn-soft); color: var(--warn); }
  .ordPill.bad { background: var(--neg-soft); color: var(--neg); }
  .ordPill.frozen { opacity: 0.55; text-decoration: line-through; }
  .ordDate.today { background: var(--pos-soft); color: var(--pos); }
  .ordDate.imminent { background: var(--warn-soft); color: var(--warn); }
  .ordDate.past { background: var(--neg-soft); color: var(--neg); }
  .ordFoot { display:flex; justify-content:flex-end; gap: 6px; margin-top: 4px; }
  .ordDeductBtn { background: transparent; border: 1px solid var(--border-strong); color: var(--muted-strong); font-family: var(--font-ui); font-size: 12px; padding: 7px 13px; border-radius: var(--radius-pill); cursor: pointer; transition: all var(--duration) var(--ease-premium); }
  .ordDeductBtn:hover { border-color: var(--neg-line); color: var(--neg); }
  .ordDeductedPill { font-family: var(--font-mono); font-size: 11px; padding: 7px 13px; border-radius: var(--radius-pill); background: var(--pos-soft); color: var(--pos); }

  /* Wishlist */
  .wishHero { padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-4); box-shadow: var(--card-shadow); }
  .wishHeroTop { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap: var(--space-3); margin-bottom: var(--space-4); }
  .wishHeroNum { font-family: var(--font-display); font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; margin-top: 6px; }
  .wishHeroPctNum { font-family: var(--font-display); font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--pos); text-align:right; }
  .wishHeroPctNum.warn { color: var(--warn); } .wishHeroPctNum.bad { color: var(--neg); }
  .wishHeroBar { height: 7px; border-radius: var(--radius-pill); background: var(--track); overflow:hidden; }
  .wishHeroBarFill { height: 100%; background: var(--pos); transition: width 320ms var(--ease-premium); }
  .wishHeroBarFill.warn { background: var(--warn); } .wishHeroBarFill.bad { background: var(--neg); }
  .wishHeroFoot { font-size: 11px; color: var(--muted); font-style: italic; margin-top: var(--space-3); }
  .wishRow { padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-2); display:flex; flex-direction:column; gap: var(--space-2); box-shadow: var(--card-shadow); }
  .wishRowH { display:grid; grid-template-columns: 1fr auto auto; gap: var(--space-3); align-items:center; }
  .wishRowName { font-size: var(--text-base); font-weight: 700; }
  .wishRowMeta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
  .wishRowAmtWrap { text-align:right; }
  .wishRowAmt { font-family: var(--font-mono); font-size: var(--text-base); font-weight: 600; font-variant-numeric: tabular-nums; }
  .wishRowPct { font-family: var(--font-mono); font-size: 11px; color: var(--pos); margin-top: 3px; }
  .wishRowPct.warn { color: var(--warn); } .wishRowPct.bad { color: var(--neg); }
  .wishRowBar { height: 3px; border-radius: var(--radius-pill); background: var(--track); overflow:hidden; }
  .wishRowBarFill { height: 100%; background: var(--pos); transition: width 320ms var(--ease-premium); }
  .wishRowBarFill.warn { background: var(--warn); } .wishRowBarFill.bad { background: var(--neg); }

  /* Empty states */
  .emptyState { padding: var(--space-8) var(--space-5); text-align:center; background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); margin-bottom: var(--space-4); }
  .emptyTitle { font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); color: var(--muted-strong); margin-bottom: var(--space-2); }
  .emptyBody { font-size: 12px; color: var(--muted); max-width: 38ch; margin: 0 auto; line-height: 1.55; }

  /* Tab bar */
  .tabBar { position: fixed; bottom:0; left:0; right:0; z-index: 30; display:flex; justify-content:center; padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom)); background: var(--tabbar-grad); pointer-events:none; }
  .tabBarInner { display:flex; gap: 4px; padding: 5px; background: var(--tabbar-pill); border: 1px solid var(--border); border-radius: var(--radius-pill); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 14px 44px rgba(0,0,0,0.45); pointer-events:auto; }
  .tab { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; padding: 9px 18px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
  .tab:hover { color: var(--muted-strong); }
  .tab.active, .tab.active:hover { background: var(--brand); color: var(--brand-ink); }

  /* Toast (replaces alert/confirm) */
  .toast { position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%) translateY(8px); z-index: 60; max-width: calc(100% - 32px); padding: 10px 16px; background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-pill); color: var(--fg); font-family: var(--font-ui); font-size: 12px; box-shadow: 0 14px 40px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity var(--duration) var(--ease), transform var(--duration) var(--ease); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<main class="page">
  <div class="shell" id="app"></div>
</main>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
/* ============================================================
 * Finance tile — ported from the Patron "Finance" standalone.
 * Sealed: no external assets, no network. Persists through the
 * dashboard bridge (window.Vitality) instead of localStorage.
 * Dropped (can't run sealed): live FX, live Finnhub quotes, AI
 * screenshot import, the theme switcher, the dashboard backlink.
 * Stocks are manual entry (same as other account types).
 * ============================================================ */
const ACTIVITY_MAX = 50;
const NW_HISTORY_MAX = 500;
const CURRENCIES = ['CHF', 'USD', 'EUR', 'GBP'];
const TAB_KEYS = ['net', 'subs', 'orders', 'wish'];
const TAB_LABELS = { net: 'net worth', subs: 'subs', orders: 'orders', wish: 'wishlist' };
/* No live FX in a sealed tile — every currency is a display symbol at rate 1. */
const DEFAULT_RATES = { CHF: 1, USD: 1, EUR: 1, GBP: 1 };

function genId(prefix) { return (prefix || 'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }

function fmtMoney(amountCHF, currency, rates) {
  const rate = rates[currency] || 1;
  const num = (Number(amountCHF) || 0) * rate;
  const hasFraction = Math.abs(num % 1) > 0.005;
  return currency + ' ' + num.toLocaleString('en-US', { minimumFractionDigits: hasFraction ? 2 : 0, maximumFractionDigits: 2 });
}
function displayToChf(amount, currency, rates) { return amount / (rates[currency] || 1); }
function chfToDisplay(amountCHF, currency, rates) { return amountCHF * (rates[currency] || 1); }
function monthlyEquivalent(s) { const a = Number(s.amountCHF) || 0; if (s.period === 'yearly') return a / 12; if (s.period === 'weekly') return a * 4.345; return a; }
function netWorthChf(accounts) { return accounts.reduce((sum, a) => sum + (Number(a.amountCHF) || 0), 0); }
function netWorthByType(accounts) { const out = { bank: 0, stocks: 0, crypto: 0, other: 0 }; accounts.forEach(a => { out[a.type] = (out[a.type] || 0) + (Number(a.amountCHF) || 0); }); return out; }

function nextRenewalDate(iso, period) {
  if (!iso) return null;
  const isoSafe = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + 'T00:00' : iso;
  const d = new Date(isoSafe);
  if (isNaN(d.getTime())) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let safety = 0;
  while (d < today && safety++ < 600) {
    if (period === 'weekly') d.setDate(d.getDate() + 7);
    else if (period === 'yearly') d.setFullYear(d.getFullYear() + 1);
    else d.setMonth(d.getMonth() + 1);
  }
  return d;
}
function formatActivityDate(ts) {
  const d = new Date(ts), now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const yesterday = today - 86400000;
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  if (dayStart === today) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (dayStart === yesterday) return 'yest';
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}
function formatRenewal(iso) {
  if (!iso) return '';
  const isoSafe = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + 'T00:00' : iso;
  const d = new Date(isoSafe);
  if (isNaN(d.getTime())) return iso;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.round((dayStart.getTime() - today.getTime()) / 86400000);
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  let prefix = '';
  if (diffDays < 0) prefix = 'past · ';
  else if (diffDays === 0) prefix = 'today · ';
  else if (diffDays === 1) prefix = 'tomorrow · ';
  else if (diffDays <= 7) prefix = 'in ' + diffDays + 'd · ';
  return prefix + dateLabel;
}
function pctClass(pct) { if (pct < 5) return 'good'; if (pct < 25) return 'warn'; return 'bad'; }
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ============================================================
 * State + persistence (through the bridge)
 * ============================================================ */
const DEFAULT_STATE = { version: 1, currency: 'CHF', activeTab: 'net', accounts: [], subscriptions: [], orders: [], wishlist: [], activity: [], netWorthHistory: [] };

let state = Object.assign({}, DEFAULT_STATE);
let rates = Object.assign({}, DEFAULT_RATES);

function save() { window.Vitality.save(state); }

/* Inline toast — replaces alert()/confirm()/prompt(). */
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

/* UI session state (not persisted) */
const ui = {
  chartPeriod: 'ALL',
  show: {},          // bankAdd, stocksAdd, cryptoAdd, otherAdd
  edit: null,        // { id, field:'name'|'amt' }
  subEditId: null,
  drafts: {
    bank: { name: '', amt: '' }, stocks: { name: '', amt: '' }, crypto: { name: '', amt: '' }, other: { name: '', amt: '' },
    subAdd: { name: '', amount: '', period: 'monthly', renewal: '', from: '', auto: false },
    subEdit: null,
    order: { mode: 'incoming', name: '', cost: '', from: '', arrival: '' },
    wish: { name: '', amount: '' },
  },
};

function fmt(chf) { return fmtMoney(chf, state.currency, rates); }

/* ---- NW snapshot ---- */
function maybeSnapshotNw() {
  const total = netWorthChf(state.accounts);
  const h = state.netWorthHistory;
  const last = h[h.length - 1];
  if (last && Math.abs((last.v || 0) - total) < 0.005) return;
  h.push({ t: Date.now(), v: total });
  if (h.length > NW_HISTORY_MAX) h.splice(0, h.length - NW_HISTORY_MAX);
}
function pushActivity(entry) {
  state.activity.push(Object.assign({ id: genId('act'), ts: Date.now() }, entry));
  if (state.activity.length > ACTIVITY_MAX) state.activity.splice(0, state.activity.length - ACTIVITY_MAX);
}

/* ============================================================
 * Actions
 * ============================================================ */
const actions = {
  setCurrency(c) { state.currency = c; save(); render(); },
  setActiveTab(t) { state.activeTab = t; save(); render(); },

  addAccount(type, name, displayAmount) {
    const trimmed = name.trim(); if (!trimmed || !isFinite(displayAmount)) return;
    const amountCHF = displayToChf(displayAmount, state.currency, rates);
    state.accounts.push({ id: genId('acc'), type, name: trimmed, amountCHF });
    pushActivity({ accountType: type, name: trimmed, deltaCHF: amountCHF, kind: 'add' });
    maybeSnapshotNw(); save(); render();
  },
  renameAccount(id, name) { const a = state.accounts.find(x => x.id === id); if (a) a.name = name.trim() || a.name; save(); render(); },
  setAccountAmount(id, displayAmount) {
    const acct = state.accounts.find(a => a.id === id); if (!acct || !isFinite(displayAmount)) return;
    const next = Math.max(0, displayToChf(displayAmount, state.currency, rates));
    const delta = next - acct.amountCHF; acct.amountCHF = next;
    if (Math.abs(delta) >= 0.005) pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: delta, kind: 'edit' });
    maybeSnapshotNw(); save(); render();
  },
  deleteAccount(id) {
    const acct = state.accounts.find(a => a.id === id); if (!acct) return;
    state.accounts = state.accounts.filter(a => a.id !== id);
    pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: -acct.amountCHF, kind: 'delete' });
    maybeSnapshotNw(); save(); render();
  },

  addSubscription(input) {
    const name = input.name.trim(); if (!name || !isFinite(input.displayAmount)) return;
    state.subscriptions.push({
      id: genId('sub'), name, amountCHF: displayToChf(input.displayAmount, state.currency, rates), period: input.period,
      enteredAmount: input.displayAmount, enteredCurrency: state.currency, renewal: input.renewal || null,
      fromAccountId: input.fromAccountId || null, autoDeduct: !!input.autoDeduct, lastDeductedAt: null,
    });
    save(); render();
  },
  updateSubscription(id, patch) {
    const sub = state.subscriptions.find(x => x.id === id); if (!sub) return;
    let amountCHF = sub.amountCHF;
    if (typeof patch.displayAmount === 'number' && isFinite(patch.displayAmount)) {
      const ccy = patch.enteredCurrency || sub.enteredCurrency || state.currency;
      amountCHF = displayToChf(patch.displayAmount, ccy, rates);
    }
    Object.assign(sub, patch, { amountCHF, enteredAmount: patch.displayAmount != null ? patch.displayAmount : sub.enteredAmount });
    delete sub.displayAmount;
    save(); render();
  },
  deleteSubscription(id) { state.subscriptions = state.subscriptions.filter(x => x.id !== id); save(); render(); },
  toggleSubAutoDeduct(id) { const s = state.subscriptions.find(x => x.id === id); if (s) s.autoDeduct = !s.autoDeduct; save(); render(); },

  addOrder(input) {
    const name = input.name.trim(); if (!name || !isFinite(input.displayAmount)) return;
    const amountCHF = displayToChf(input.displayAmount, state.currency, rates);
    let deductedAt = null, pctAtDeduction = null, deductedFromName = null;
    if (input.immediate && input.fromAccountId) {
      const acct = state.accounts.find(a => a.id === input.fromAccountId);
      if (acct) {
        const grand = netWorthChf(state.accounts);
        pctAtDeduction = grand > 0 ? (amountCHF / grand) * 100 : 0;
        deductedAt = Date.now(); deductedFromName = acct.name;
        const nextAmount = Math.max(0, acct.amountCHF - amountCHF);
        const delta = nextAmount - acct.amountCHF; acct.amountCHF = nextAmount;
        pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: delta, kind: 'edit' });
      }
    }
    state.orders.push({ id: genId('ord'), name, amountCHF, enteredAmount: input.displayAmount, enteredCurrency: state.currency, fromAccountId: input.fromAccountId || null, date: input.date || null, ts: Date.now(), deductedAt, pctAtDeduction, deductedFromName });
    maybeSnapshotNw(); save(); render();
  },
  deleteOrder(id) { state.orders = state.orders.filter(x => x.id !== id); save(); render(); },
  deductOrder(id) {
    const order = state.orders.find(x => x.id === id); if (!order || order.deductedAt) return;
    const grand = netWorthChf(state.accounts);
    const pct = grand > 0 ? (order.amountCHF / grand) * 100 : 0;
    const acct = order.fromAccountId ? state.accounts.find(a => a.id === order.fromAccountId) : null;
    if (acct) { const nextAmount = Math.max(0, acct.amountCHF - order.amountCHF); const delta = nextAmount - acct.amountCHF; acct.amountCHF = nextAmount; pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: delta, kind: 'edit' }); }
    order.deductedAt = Date.now(); order.pctAtDeduction = pct; order.deductedFromName = acct ? acct.name : null;
    maybeSnapshotNw(); save(); render();
  },
  undoDeductOrder(id) {
    const order = state.orders.find(x => x.id === id); if (!order || !order.deductedAt) return;
    const acct = order.fromAccountId ? state.accounts.find(a => a.id === order.fromAccountId) : null;
    if (acct) { acct.amountCHF += order.amountCHF; pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: order.amountCHF, kind: 'edit' }); }
    order.deductedAt = null; order.pctAtDeduction = null; order.deductedFromName = null;
    maybeSnapshotNw(); save(); render();
  },

  addWish(name, displayAmount) {
    const trimmed = name.trim(); if (!trimmed || !isFinite(displayAmount)) return;
    state.wishlist.push({ id: genId('wish'), name: trimmed, amountCHF: displayToChf(displayAmount, state.currency, rates), enteredAmount: displayAmount, enteredCurrency: state.currency, ts: Date.now() });
    save(); render();
  },
  deleteWish(id) { state.wishlist = state.wishlist.filter(x => x.id !== id); save(); render(); },
};

/* ============================================================
 * Constants for views
 * ============================================================ */
const TYPE_COLORS = { bank: '#6EE7B7', stocks: '#5EC8F2', crypto: '#B39DFF', other: 'rgba(237,237,240,0.38)' };
const SUBS_COLOR = '#FBBF24';
const TYPE_LABELS = { bank: 'Bank', stocks: 'Stocks', crypto: 'Crypto', other: 'Other' };
const CATEGORY_ORDER = [
  { key: 'bank', label: 'Bank accounts', ph1: 'Account name', ph2: 'Amount' },
  { key: 'stocks', label: 'Stocks · investments', ph1: 'Stock / fund', ph2: 'Value' },
  { key: 'crypto', label: 'Crypto', ph1: 'Coin / wallet', ph2: 'Value' },
  { key: 'other', label: 'Other assets', ph1: 'Asset name', ph2: 'Value' },
];
const CHART_PERIODS = [ { key:'1D',label:'1D',days:1 }, { key:'1W',label:'1W',days:7 }, { key:'1M',label:'1M',days:30 }, { key:'1Y',label:'1Y',days:365 }, { key:'ALL',label:'All',days:null } ];

/* ============================================================
 * Header + ticker
 * ============================================================ */
function headerHtml() {
  const segs = CURRENCIES.map(c => '<button type="button" class="currencyBtn ' + (c === state.currency ? 'currencyBtnActive' : '') + '" data-act="currency" data-c="' + c + '">' + c + '</button>').join('');
  return '<header class="header"><div class="headerLeft">'
    + '<h1 class="title">Finance</h1><p class="subtitle">Net worth · subs · orders · wishlist</p>'
    + '</div>'
    + '<div class="headerRight"><div class="currencySeg" role="radiogroup" aria-label="Display currency">' + segs + '</div></div></header>';
}

function tickerEntries() {
  const out = [];
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  state.subscriptions.forEach(s => {
    if (!s.renewal) return;
    const next = nextRenewalDate(s.renewal, s.period);
    if (!next) return;
    out.push({ id: s.id, name: s.name, amountCHF: s.amountCHF, days: Math.round((next.getTime() - today) / 86400000) });
  });
  out.sort((a, b) => a.days - b.days);
  return out;
}
function daysLabel(d) { if (d < 0) return Math.abs(d) + 'd late'; if (d === 0) return 'today'; if (d === 1) return 'tomorrow'; return 'in ' + d + 'd'; }

function tickerHtml() {
  const entries = tickerEntries();
  if (entries.length === 0) return '';
  const cur = entries[tickerIdx % entries.length];
  const urgent = cur && cur.days <= 5;

function dailyDeltaHtml() {
  const history = state.netWorthHistory;
  if (history.length < 2) return '';
  const last = history[history.length - 1];
  const cutoff = last.t - 86400000;
  let baseline = null;
  for (let i = history.length - 1; i >= 0; i--) { if (history[i].t <= cutoff) { baseline = history[i]; break; } }
  if (!baseline) baseline = history[0];
  if (last.t - baseline.t < 3600000) return '';
  const delta = last.v - baseline.v;
  const pct = Math.abs(baseline.v) > 0.005 ? (delta / Math.abs(baseline.v)) * 100 : null;
  if (Math.abs(delta) < 0.005) return '<span class="dailyDelta flat">flat · 24h</span>';
  const up = delta > 0, sign = up ? '+' : '−';
  const pctLabel = pct == null ? '' : '<span class="dailyDeltaPct">' + (up ? '+' : '−') + (Math.abs(pct) >= 100 ? Math.abs(pct).toFixed(0) : Math.abs(pct).toFixed(2)) + '%</span>';
  return '<span class="dailyDelta ' + (up ? 'up' : 'down') + '">' + sign + esc(fmt(Math.abs(delta))) + pctLabel + '<span class="dailyDeltaWindow">· 24h</span></span>';
}

function smoothPath(points) {
  if (points.length < 2) return '';
  if (points.length === 2) return 'M' + points[0].x + ',' + points[0].y + ' L' + points[1].x + ',' + points[1].y;
  const d = ['M' + points[0].x + ',' + points[0].y];
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i-1] || points[i], p1 = points[i], p2 = points[i+1], p3 = points[i+2] || p2;
    const c1x = p1.x + (p2.x - p0.x)/6, c1y = p1.y + (p2.y - p0.y)/6, c2x = p2.x - (p3.x - p1.x)/6, c2y = p2.y - (p3.y - p1.y)/6;
    d.push('C' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y + ' ' + p2.x + ',' + p2.y);
  }
  return d.join(' ');
}

function chartHtml() {
  const W = 600, H = 200, PAD = 8;
  const activePeriod = CHART_PERIODS.find(p => p.key === ui.chartPeriod) || CHART_PERIODS[CHART_PERIODS.length - 1];
  const full = state.netWorthHistory;
  let history;
  if (activePeriod.days == null) history = full;
  else {
    const cutoff = Date.now() - activePeriod.days * 86400000;
    const inWin = full.filter(p => p.t >= cutoff);
    if (inWin.length >= 2 || full.length === 0) history = inWin;
    else { let anchor = null; for (let i = full.length - 1; i >= 0; i--) { if (full[i].t < cutoff) { anchor = full[i]; break; } } history = anchor ? [anchor].concat(inWin) : inWin; }
  }
  const seg = CHART_PERIODS.map(p => '<button type="button" class="periodBtn ' + (p.key === ui.chartPeriod ? 'periodBtnActive' : '') + '" data-act="chartPeriod" data-p="' + p.key + '">' + p.label + '</button>').join('');
  const periodToggle = '<div class="periodSeg">' + seg + '</div>';

  function statsRow(hist) {
    if (!hist.length) return '<div class="chartStatsRow">' + stat('1% of NW','-') + stat('All-time high','-') + stat('All-time low','-') + stat('Snapshots','0') + '</div>';
    const vals = hist.map(p => p.v), last = vals[vals.length - 1];
    return '<div class="chartStatsRow">' + stat('1% of NW', fmt(last/100)) + stat('All-time high', fmt(Math.max.apply(null, vals))) + stat('All-time low', fmt(Math.min.apply(null, vals))) + stat('Snapshots', String(hist.length)) + '</div>';
  }
  function stat(l, v) { return '<div class="chartStat"><span class="chartStatLabel">' + esc(l) + '</span><span class="chartStatVal">' + esc(v) + '</span></div>'; }

  if (history.length < 1) {
    return '<div class="chartWrap"><div class="chartHead"><span class="chartLabel">' + (activePeriod.key === 'ALL' ? 'All-time' : activePeriod.label) + '</span>' + periodToggle + '</div><div class="chartEmpty">Add or edit an asset to start tracking net worth over time.</div>' + statsRow(history) + '</div>';
  }
  const first = history[0].v, last = history[history.length - 1].v, change = last - first;
  const direction = Math.abs(change) < 0.005 ? 'flat' : change > 0 ? 'up' : 'down';
  const color = direction === 'up' ? 'var(--pos)' : direction === 'down' ? 'var(--neg)' : 'var(--muted)';
  let deltaLabel = '-';
  if (direction === 'flat') deltaLabel = 'Flat';
  else if (Math.abs(first) < 0.5) deltaLabel = (change > 0 ? '+' : '−') + fmt(Math.abs(change));
  else { const pct = (change / Math.abs(first)) * 100, absPct = Math.abs(pct); const pctStr = absPct >= 100 ? absPct.toFixed(0) : absPct >= 10 ? absPct.toFixed(1) : absPct.toFixed(2); deltaLabel = (change > 0 ? '+' : '−') + pctStr + '%'; }

  const vals = history.map(p => p.v), minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  const range = (maxV - minV) || Math.max(1, Math.abs(maxV));
  let lineD = '', areaD = '';
  if (history.length === 1) { const y = H/2; lineD = 'M0,' + y + ' L' + W + ',' + y; areaD = lineD + ' L' + W + ',' + H + ' L0,' + H + ' Z'; }
  else {
    const points = history.map((p, i) => ({ x: (i/(history.length-1))*W, y: H - PAD - ((p.v - minV)/range)*(H - PAD*2) }));
    lineD = smoothPath(points); const lp = points[points.length-1], fp = points[0]; areaD = lineD + ' L' + lp.x + ',' + H + ' L' + fp.x + ',' + H + ' Z';
  }
  return '<div class="chartWrap"><div class="chartHead"><div class="chartHeadLeft"><span class="chartLabel">' + (activePeriod.key === 'ALL' ? 'All-time' : activePeriod.label) + '</span>'
    + '<span class="chartDelta ' + (direction === 'up' ? 'up' : direction === 'down' ? 'down' : '') + '">' + esc(deltaLabel) + '</span></div>' + periodToggle + '</div>'
    + '<svg class="chartSvg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-hidden style="color:' + color + '">'
    + '<defs><linearGradient id="nwGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="currentColor" stop-opacity="0.55"/><stop offset="60%" stop-color="currentColor" stop-opacity="0.18"/><stop offset="100%" stop-color="currentColor" stop-opacity="0"/></linearGradient></defs>'
    + '<line class="chartGrid" x1="0" x2="' + W + '" y1="40" y2="40"/><line class="chartGrid" x1="0" x2="' + W + '" y1="100" y2="100"/><line class="chartGrid" x1="0" x2="' + W + '" y1="160" y2="160"/>'
    + '<path d="' + areaD + '" fill="url(#nwGrad)"/><path d="' + lineD + '" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="chartLineStroke"/></svg>'
    + statsRow(history) + '</div>';
}

function donutArcPath(cx, cy, rO, rI, a1, a2) {
  const x1o = cx + rO*Math.cos(a1), y1o = cy + rO*Math.sin(a1), x2o = cx + rO*Math.cos(a2), y2o = cy + rO*Math.sin(a2);
  const x1i = cx + rI*Math.cos(a2), y1i = cy + rI*Math.sin(a2), x2i = cx + rI*Math.cos(a1), y2i = cy + rI*Math.sin(a1);
  const large = a2 - a1 > Math.PI ? 1 : 0;
  return 'M ' + x1o.toFixed(2) + ' ' + y1o.toFixed(2) + ' A ' + rO + ' ' + rO + ' 0 ' + large + ' 1 ' + x2o.toFixed(2) + ' ' + y2o.toFixed(2) + ' L ' + x1i.toFixed(2) + ' ' + y1i.toFixed(2) + ' A ' + rI + ' ' + rI + ' 0 ' + large + ' 0 ' + x2i.toFixed(2) + ' ' + y2i.toFixed(2) + ' Z';
}
function donutHtml(netWorth) {
  const slices = [];
  state.accounts.forEach(a => { if (a.amountCHF > 0) slices.push({ id: a.id, name: a.name, color: TYPE_COLORS[a.type], value: a.amountCHF }); });
  const annualSubs = state.subscriptions.reduce((s, sub) => s + monthlyEquivalent(sub) * 12, 0);
  if (annualSubs > 0) slices.push({ id: '__subs', name: 'Subs / yr', color: SUBS_COLOR, value: annualSubs });
  slices.sort((a, b) => b.value - a.value);
  const total = slices.reduce((s, x) => s + x.value, 0);

    return '<div class="donutWrap"><div class="chartHead"><span class="chartLabel">Allocation</span><span class="chartDelta">-</span></div>'
      + '<div class="donutStage"><svg class="donutSvg" viewBox="0 0 140 140" aria-hidden><circle cx="70" cy="70" r="60" fill="var(--track)"/><circle cx="70" cy="70" r="44" fill="var(--bg-elevated)"/></svg>'

    + '<input class="quickAddInput" type="date" value="' + esc(d.renewal) + '" data-draft="subEdit.renewal" />'
    + '<select class="quickAddInput" data-draft="subEdit.from">' + accountOptions(d.from) + '</select>'
    + '<label style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted-strong)"><input type="checkbox" ' + (d.auto ? 'checked' : '') + ' data-draft="subEdit.auto" /> Auto-deduct</label>'
    + '</div><div></div><div class="subRowActions"><button type="button" class="iconBtn" data-act="saveSub" data-id="' + sub.id + '">save</button><button type="button" class="iconBtn" data-act="cancelSub">cancel</button><button type="button" class="iconBtn" data-act="delSub" data-id="' + sub.id + '">delete</button></div></div>';
}

/* ============================================================
 * ORDERS view
 * ============================================================ */
function arrivalLabel(iso) {
  if (!iso) return null;
  const isoSafe = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + 'T00:00' : iso;
  const d = new Date(isoSafe); if (isNaN(d.getTime())) return null;
  const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((dayStart.getTime() - today.getTime()) / 86400000);
  const date = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  if (diff < 0) return { label: Math.abs(diff) + 'd late · ' + date, cls: 'past' };
  if (diff === 0) return { label: 'arrives today · ' + date, cls: 'today' };
  if (diff === 1) return { label: 'arrives tomorrow · ' + date, cls: 'imminent' };
  if (diff <= 5) return { label: 'in ' + diff + 'd · ' + date, cls: 'imminent' };
  return { label: 'in ' + diff + 'd · ' + date, cls: '' };
}
function orderPreviewText(netWorth) {
  const d = ui.drafts.order; const isBought = d.mode === 'bought';
  const a = parseFloat(d.cost);
  if (isNaN(a) || a <= 0) return { text: isBought ? 'Type a cost. We will deduct it from the chosen account on Add.' : 'Type a cost. Preview will show what % of net worth it takes.', cls: '' };
  const amountCHF = displayToChf(a, state.currency, rates);
  const fromName = d.from ? ((state.accounts.find(x => x.id === d.from) || {}).name || 'unassigned') : 'unassigned';
  if (isBought && !d.from) return { text: fmt(amountCHF) + ' · pick a "from account" to deduct from', cls: 'warn' };
  if (netWorth > 0) {
    const pct = (amountCHF / netWorth) * 100; const cls = pctClass(pct);
    const text = isBought ? 'Will debit ' + fromName + ': ' + fmt(amountCHF) + ' · ' + pct.toFixed(2) + '% of your ' + fmt(netWorth) + ' net worth'
      : fmt(amountCHF) + ' from ' + fromName + ' · ' + pct.toFixed(2) + '% of your ' + fmt(netWorth) + ' net worth';
    return { text, cls: cls === 'good' ? '' : cls };
  }
  return { text: fmt(amountCHF) + ' from ' + fromName + ' · add net worth first to see %', cls: '' };
}
function ordersViewHtml() {
  const netWorth = netWorthChf(state.accounts);
  const d = ui.drafts.order; const isBought = d.mode === 'bought'; const needsAccount = isBought && !d.from;
  const prev = orderPreviewText(netWorth);
  const addForm = '<div class="addCard"><div class="addCardHead"><div class="addEyebrow">' + (isBought ? '+ today’s purchase' : '+ new order') + '</div>'
    + '<div class="modeSeg"><button type="button" class="modeBtn ' + (!isBought ? 'modeBtnActive' : '') + '" data-act="orderMode" data-mode="incoming">Incoming</button><button type="button" class="modeBtn ' + (isBought ? 'modeBtnActive' : '') + '" data-act="orderMode" data-mode="bought">Bought today</button></div></div>'
    + '<div class="addGrid ' + (isBought ? 'addGridBought' : '') + '">'
    + '<input class="quickAddInput" type="text" placeholder="' + (isBought ? 'What did you buy?' : 'Item (e.g. New iPhone)') + '" value="' + esc(d.name) + '" data-draft="order.name" data-enter="addOrder" />'
    + '<input class="quickAddInput" type="number" step="0.01" placeholder="Cost (' + state.currency + ')" value="' + esc(d.cost) + '" data-draft="order.cost" data-orderprev="1" data-enter="addOrder" />'
    + '<select class="quickAddInput ' + (needsAccount ? 'quickAddInputAlert' : '') + '" data-draft="order.from" data-orderprev="1"><option value="">' + (isBought ? 'From account (required)…' : 'From account…') + '</option>' + state.accounts.map(a => '<option value="' + a.id + '"' + (a.id === d.from ? ' selected' : '') + '>' + esc(a.name) + '</option>').join('') + '</select>'
    + (!isBought ? '<input class="quickAddInput" type="date" title="Expected arrival" value="' + esc(d.arrival) + '" data-draft="order.arrival" />' : '')
    + '<button type="button" class="quickAddBtn" data-act="addOrder"' + (needsAccount ? ' disabled' : '') + '>' + (isBought ? '− Log purchase' : '+ Add order') + '</button></div>'
    + '<div class="addPreview ' + (prev.cls === 'warn' ? 'warn' : prev.cls === 'bad' ? 'bad' : '') + '" id="orderPreview">' + esc(prev.text) + '</div></div>';

  const sorted = state.orders.slice().sort((a, b) => { if (!a.date) return 1; if (!b.date) return -1; return a.date.localeCompare(b.date); });
  let list;
  if (state.orders.length === 0) list = '<div class="emptyState"><div class="emptyTitle">Nothing on the way.</div><div class="emptyBody">Log an order above. Pick the account it comes out of and the expected arrival date. The dashboard will show what % of your net worth it costs.</div></div>';
  else list = sorted.map(o => orderCardHtml(o, netWorth)).join('');

  return '<section class="section"><div class="sectionEyebrow"><span>Incoming orders</span><span class="sectionCount">' + state.orders.length + ' ' + (state.orders.length === 1 ? 'item' : 'items') + '</span></div>'
    + addForm + '<div>' + list + '</div></section>';
}
function orderCardHtml(order, netWorth) {
  const fromName = order.fromAccountId ? ((state.accounts.find(a => a.id === order.fromAccountId) || {}).name || 'unassigned') : 'unassigned';
  const isDeducted = !!order.deductedAt; const arr = arrivalLabel(order.date);
  let pctText, pctCls;
  if (isDeducted && typeof order.pctAtDeduction === 'number') { pctText = order.pctAtDeduction.toFixed(2) + '% of NW'; pctCls = pctClass(order.pctAtDeduction) + ' frozen'; }
  else if (netWorth > 0) { const pct = (order.amountCHF / netWorth) * 100; pctText = pct.toFixed(2) + '% of NW'; pctCls = pctClass(pct); }
  else { pctText = '- of NW'; pctCls = ''; }
  const pctPillCls = (pctCls.indexOf('good') >= 0 ? 'good' : pctCls.indexOf('warn') >= 0 ? 'warn' : pctCls.indexOf('bad') >= 0 ? 'bad' : '') + (pctCls.indexOf('frozen') >= 0 ? ' frozen' : '');
  let datePill;
  if (isDeducted) datePill = '<span class="ordPill ordDate">bought ' + new Date(order.deductedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + '</span>';
  else if (arr) datePill = '<span class="ordPill ordDate ' + (arr.cls === 'today' ? 'today' : arr.cls === 'imminent' ? 'imminent' : arr.cls === 'past' ? 'past' : '') + '">' + esc(arr.label) + '</span>';
  else datePill = '<span class="ordPill">no arrival date</span>';
  const foot = isDeducted
    ? '<span class="ordDeductedPill">Deducted from ' + esc(order.deductedFromName || fromName) + '</span><button type="button" class="ordDeductBtn" data-act="undoDeduct" data-id="' + order.id + '">Undo</button>'
    : '<button type="button" class="ordDeductBtn" data-act="deduct" data-id="' + order.id + '">− Deduct from net worth</button>';
  return '<div class="ordCard ' + (isDeducted ? 'deducted' : '') + '"><div class="ordHead"><div class="ordName">' + esc(order.name) + '</div><div class="ordAmt">' + esc(fmt(order.amountCHF)) + '</div><button type="button" class="iconBtn" data-act="delOrder" data-id="' + order.id + '" title="Remove">×</button></div>'
    + '<div class="ordMetaRow"><span class="ordPill">from · ' + esc(fromName) + '</span><span class="ordPill ' + pctPillCls + '">' + pctText + '</span>' + datePill + '</div>'
    + '<div class="ordFoot">' + foot + '</div></div>';
}

/* ============================================================
 * WISHLIST view
 * ============================================================ */
function wishViewHtml() {
  const netWorth = netWorthChf(state.accounts);
  const totalChf = state.wishlist.reduce((s, w) => s + w.amountCHF, 0);
  const heroPct = netWorth > 0 ? (totalChf / netWorth) * 100 : null;
  const heroCls = heroPct == null ? '' : pctClass(heroPct);
  const heroClsName = heroCls === 'warn' ? 'warn' : heroCls === 'bad' ? 'bad' : '';
  const heroFill = heroPct == null ? 0 : Math.min(100, heroPct);
  const d = ui.drafts.wish;
  const addForm = '<div class="addCard"><div class="addEyebrow">+ add to wishlist</div><div class="addGrid" style="grid-template-columns:2fr 1fr auto">'
    + '<input class="quickAddInput" type="text" placeholder="Item name (e.g. New iPhone Pro Max)" value="' + esc(d.name) + '" data-draft="wish.name" data-enter="addWish" />'
    + '<input class="quickAddInput" type="number" step="0.01" placeholder="Cost (' + state.currency + ')" value="' + esc(d.amount) + '" data-draft="wish.amount" data-enter="addWish" />'
    + '<button type="button" class="quickAddBtn" data-act="addWish">+ Add</button></div></div>';

  const sorted = state.wishlist.slice().sort((a, b) => b.amountCHF - a.amountCHF);
  let list;
  if (state.wishlist.length === 0) list = '<div class="emptyState"><div class="emptyTitle">No wishes yet.</div><div class="emptyBody">Add anything you\'re saving for. The dashboard will calculate what % of your net worth it\'d cost.</div></div>';
  else list = sorted.map(item => {
    const pct = netWorth > 0 ? (item.amountCHF / netWorth) * 100 : null;
    const cls = pct == null ? '' : pctClass(pct); const clsName = cls === 'warn' ? 'warn' : cls === 'bad' ? 'bad' : '';
    const fill = pct == null ? 0 : Math.min(100, pct);
    const originalLabel = (item.enteredCurrency && item.enteredAmount != null) ? item.enteredCurrency + ' ' + item.enteredAmount.toLocaleString('en-US', { maximumFractionDigits: 2 }) : fmt(item.amountCHF);
    return '<div class="wishRow"><div class="wishRowH"><div><div class="wishRowName">' + esc(item.name) + '</div><div class="wishRowMeta">' + esc(originalLabel) + ' · added ' + formatActivityDate(item.ts) + '</div></div>'
      + '<div class="wishRowAmtWrap"><div class="wishRowAmt">' + esc(fmt(item.amountCHF)) + '</div><div class="wishRowPct ' + clsName + '">' + (pct == null ? '-' : pct.toFixed(2) + '%') + ' of NW</div></div>'
      + '<button type="button" class="iconBtn" data-act="delWish" data-id="' + item.id + '" title="Remove">×</button></div>'
      + '<div class="wishRowBar"><div class="wishRowBarFill ' + clsName + '" style="width:' + fill + '%"></div></div></div>';
  }).join('');

  return '<section class="section"><div class="sectionEyebrow"><span>Wishlist</span><span class="sectionCount">' + state.wishlist.length + ' ' + (state.wishlist.length === 1 ? 'item' : 'items') + '</span></div>'
    + '<div class="wishHero"><div class="wishHeroTop"><div><div class="nwHeroLabel">Wishlist total</div><div class="wishHeroNum">' + esc(fmt(totalChf)) + '</div></div>'
    + '<div><div class="nwHeroLabel">% of net worth</div><div class="wishHeroPctNum ' + heroClsName + '">' + (heroPct == null ? '-' : heroPct.toFixed(2) + '%') + '</div></div></div>'
    + '<div class="wishHeroBar"><div class="wishHeroBarFill ' + heroClsName + '" style="width:' + heroFill + '%"></div></div>'
    + '<div class="wishHeroFoot">' + (heroPct == null ? 'Add net worth first to see this as a %' : 'Your wishlist is ' + heroPct.toFixed(2) + '% of your ' + fmt(netWorth) + ' net worth') + '</div></div>'
    + addForm + '<div>' + list + '</div></section>';
}

/* ============================================================
 * Render
 * ============================================================ */
function viewHtml() {
  if (state.activeTab === 'net') return netWorthViewHtml();
  if (state.activeTab === 'subs') return subsViewHtml();
  if (state.activeTab === 'orders') return ordersViewHtml();
  return wishViewHtml();
}
function tabBarHtml() {
  return '<nav class="tabBar" aria-label="Finance sections"><div class="tabBarInner">'
    + TAB_KEYS.map(k => '<button type="button" class="tab ' + (k === state.activeTab ? 'active' : '') + '" data-act="tab" data-tab="' + k + '">' + TAB_LABELS[k] + '</button>').join('')
    + '</div></nav>';
}
function render() {
  document.getElementById('app').innerHTML = headerHtml() + tickerHtml() + viewHtml() + tabBarHtml();
  mountTicker();
  // Focus an inline-edit input if one just opened.
  if (ui.edit) {
    const el = document.getElementById('edit-' + ui.edit.field + '-' + ui.edit.id);
    if (el) { el.focus(); try { el.select(); } catch {} }
  }
}

/* ============================================================
 * Inline-edit commit helpers
 * ============================================================ */
function commitName(id, val) { actions.renameAccount(id, val); ui.edit = null; }
function commitAmt(id, val) {
  const acct = state.accounts.find(a => a.id === id); ui.edit = null;
  if (!acct) { render(); return; }
  const v = (val || '').trim();
  if (v === '') { render(); return; }
  let nextDisplay = chfToDisplay(acct.amountCHF, state.currency, rates);
  if (/^[+\-]\s*\d/.test(v)) { const delta = parseFloat(v.replace(/\s+/g, '')); if (!isNaN(delta)) nextDisplay += delta; }
  else { const n = parseFloat(v); if (!isNaN(n)) nextDisplay = n; }
  actions.setAccountAmount(id, Math.max(0, nextDisplay));
}

/* ============================================================
 * Event wiring
 * ============================================================ */
function getDraftRef(path) { const [a, b] = path.split('.'); return { obj: ui.drafts[a], key: b }; }

document.addEventListener('input', e => {
  const t = e.target;
  if (t.dataset && t.dataset.draft) {
    const { obj, key } = getDraftRef(t.dataset.draft);
    if (obj) {
      if (t.type === 'checkbox') obj[key] = t.checked;
      else obj[key] = t.dataset.upper ? t.value.toUpperCase() : t.value;
    }
    if (t.dataset.orderprev) {
      const prevEl = document.getElementById('orderPreview');
      if (prevEl) { const p = orderPreviewText(netWorthChf(state.accounts)); prevEl.textContent = p.text; prevEl.className = 'addPreview ' + (p.cls === 'warn' ? 'warn' : p.cls === 'bad' ? 'bad' : ''); }
    }
  }
});
document.addEventListener('change', e => {
  const t = e.target;
  if (t.dataset && t.dataset.draft) { const { obj, key } = getDraftRef(t.dataset.draft); if (obj) obj[key] = (t.type === 'checkbox') ? t.checked : t.value; }
});

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t.dataset && t.dataset.edit) {
    if (e.key === 'Enter') { e.preventDefault(); commitEdit(t); }
    else if (e.key === 'Escape') { ui.edit = null; render(); }
    return;
  }
  if (e.key === 'Enter' && t.dataset && t.dataset.enter) {
    e.preventDefault();
    const container = t.closest('.addCard, .accountCard');
    const submit = container && container.querySelector('[data-act="' + t.dataset.enter + '"]');
    if (submit) submit.click();
  }
});
document.addEventListener('blur', e => {
  const t = e.target;
  if (t.dataset && t.dataset.edit) commitEdit(t);
}, true);

function commitEdit(t) {
  const id = t.dataset.id, field = t.dataset.edit;
  if (!ui.edit) return; // already committed
  if (field === 'name') commitName(id, t.value);
  else if (field === 'amt') commitAmt(id, t.value);
}

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.dataset.act;
  const id = btn.dataset.id;
  switch (act) {
    case 'currency': actions.setCurrency(btn.dataset.c); break;
    case 'tab': actions.setActiveTab(btn.dataset.tab); break;
    case 'chartPeriod': ui.chartPeriod = btn.dataset.p; render(); break;
    case 'showAdd': ui.show[btn.dataset.show] = true; render(); break;

    case 'editName': ui.edit = { id, field: 'name' }; render(); break;
    case 'editAmt': ui.edit = { id, field: 'amt' }; render(); break;
    case 'delAccount': actions.deleteAccount(id); break;

    case 'addAccount': {
      const cat = btn.dataset.cat; const d = ui.drafts[cat];
      const a = parseFloat(d.amt); if (!d.name.trim() || isNaN(a)) break;
      actions.addAccount(cat, d.name, a); d.name = ''; d.amt = '';
      ui.show[cat + 'Add'] = true; render(); break;
    }

    case 'addSub': {
      const d = ui.drafts.subAdd; const a = parseFloat(d.amount);
      if (!d.name.trim() || isNaN(a)) break;
      if (d.auto && !d.from) { toast('Pick a “from account” first — auto-deduct needs somewhere to take the money from.'); break; }
      actions.addSubscription({ name: d.name, displayAmount: a, period: d.period, renewal: d.renewal || null, fromAccountId: d.from || null, autoDeduct: d.auto });
      ui.drafts.subAdd = { name: '', amount: '', period: 'monthly', renewal: '', from: '', auto: false }; render(); break;
    }
    case 'editSub': {
      const sub = state.subscriptions.find(x => x.id === id); if (!sub) break;
      ui.subEditId = id;
      ui.drafts.subEdit = { name: sub.name, amount: String(sub.enteredAmount != null ? sub.enteredAmount : sub.amountCHF), period: sub.period, renewal: sub.renewal || '', from: sub.fromAccountId || '', auto: sub.autoDeduct };
      render(); break;
    }
    case 'saveSub': {
      const d = ui.drafts.subEdit; const a = parseFloat(d.amount);
      if (!d.name.trim() || isNaN(a)) break;
      if (d.auto && !d.from) { toast('Pick a “from account” first.'); break; }
      actions.updateSubscription(id, { name: d.name.trim(), displayAmount: a, period: d.period, renewal: d.renewal || null, fromAccountId: d.from || null, autoDeduct: d.auto });
      ui.subEditId = null; ui.drafts.subEdit = null; render(); break;
    }
    case 'cancelSub': ui.subEditId = null; ui.drafts.subEdit = null; render(); break;
    case 'delSub': { actions.deleteSubscription(id); ui.subEditId = null; break; }
    case 'toggleAuto': { const sub = state.subscriptions.find(x => x.id === id); if (sub && !sub.autoDeduct && !sub.fromAccountId) { toast('Pick a “from account” first (use the ✎ edit button).'); break; } actions.toggleSubAutoDeduct(id); break; }

    case 'orderMode': ui.drafts.order.mode = btn.dataset.mode; render(); break;
    case 'addOrder': {
      const d = ui.drafts.order; const isBought = d.mode === 'bought'; const a = parseFloat(d.cost);
      if (!d.name.trim() || isNaN(a)) break; if (isBought && !d.from) break;
      actions.addOrder({ name: d.name, displayAmount: a, fromAccountId: d.from || null, date: isBought ? null : (d.arrival || null), immediate: isBought });
      ui.drafts.order = { mode: d.mode, name: '', cost: '', from: '', arrival: '' }; render(); break;
    }
    case 'deduct': { const o = state.orders.find(x => x.id === id); if (o && !o.fromAccountId) { toast('Set a “from account” to deduct from.'); break; } actions.deductOrder(id); break; }
    case 'undoDeduct': actions.undoDeductOrder(id); break;
    case 'delOrder': actions.deleteOrder(id); break;

    case 'addWish': { const d = ui.drafts.wish; const a = parseFloat(d.amount); if (!d.name.trim() || isNaN(a)) break; actions.addWish(d.name, a); ui.drafts.wish = { name: '', amount: '' }; render(); break; }
    case 'delWish': actions.deleteWish(id); break;
  }
});

/* ============================================================
 * Boot — load through the bridge, snapshot NW, render.
 * ============================================================ */
(async () => {
  const d = await window.Vitality.load();
  const loaded = (d && typeof d === 'object' && !Array.isArray(d)) ? d : {};
  state = Object.assign({}, DEFAULT_STATE, loaded);
  // Defensive: guarantee every collection exists even after a partial save.
  ['accounts','subscriptions','orders','wishlist','activity','netWorthHistory'].forEach(k => { if (!Array.isArray(state[k])) state[k] = []; });
  if (CURRENCIES.indexOf(state.currency) < 0) state.currency = 'CHF';
  if (TAB_KEYS.indexOf(state.activeTab) < 0) state.activeTab = 'net';
  maybeSnapshotNw(); save();
  render();
})();
</script>
</body>
</html>
