<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vee</title>
<style>
  :root{--mint:#6EE7B7;--bg:#050506;--card:#0e0e11;--line:#1d1d22;--fg:#ededf0;--muted:#84848c}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;display:flex;justify-content:center;padding:44px 20px}
  .wrap{width:100%;max-width:600px}
  h1{font-size:24px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:0 0 22px;font-size:13px}
  textarea{width:100%;min-height:88px;resize:vertical;background:var(--card);border:1px solid var(--line);color:var(--fg);border-radius:12px;padding:13px 15px;font:inherit}
  textarea:focus{outline:none;border-color:var(--mint)}
  textarea::placeholder{color:#55555c}
  .save{background:var(--mint);color:#04140d;border:none;border-radius:11px;padding:11px 20px;font-weight:600;cursor:pointer;margin-top:10px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:30px 0 12px}
  .note{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;white-space:pre-wrap}
  .note .t{color:var(--muted);font-size:12px;margin-top:8px}
  .empty{color:var(--muted);font-size:14px;padding:8px 2px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Vee</h1>
  <p class="sub">Drop a thought. Nothing gets lost.</p>
  <textarea id="txt" placeholder="What's on your mind..."></textarea>
  <div><button class="save" id="save">Save note</button></div>
  <h2>The void</h2>
  <div id="list"></div>
</div>
<script>
  const $=s=>document.querySelector(s);
  let rows=[];
  const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const when=ts=>{const d=new Date(ts);return d.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" · "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})};
  function render(){
    $("#list").innerHTML=rows.slice().reverse().map(r=>
      `<div class="note">${esc(r.text)}<div class="t">${when(r.ts)}</div></div>`
    ).join("")||'<div class="empty">Empty. Say something to yourself.</div>';
  }
  $("#save").onclick=async()=>{
    const text=$("#txt").value.trim(); if(!text)return;
    rows.push({text,ts:Date.now()});$("#txt").value="";
    render(); await window.Vitality.save(rows);
  };
  (async()=>{const d=await window.Vitality.load();rows=Array.isArray(d)?d:[];render();})();
</script>
</body>
</html>
