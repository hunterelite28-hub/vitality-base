<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Peak</title>
<style>
  :root{--mint:#6EE7B7;--bg:#050506;--card:#0e0e11;--line:#1d1d22;--fg:#ededf0;--muted:#84848c}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;display:flex;justify-content:center;padding:44px 20px}
  .wrap{width:100%;max-width:600px}
  h1{font-size:24px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:0 0 22px;font-size:13px}
  .top{display:flex;gap:12px;margin-bottom:24px}
  .box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .box .n{font-size:34px;font-weight:700;color:var(--mint);line-height:1}
  .box .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-top:8px}
  .task{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:9px;cursor:pointer;user-select:none;transition:border-color .15s}
  .task[data-on="1"]{border-color:var(--mint)}
  .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center}
  .task[data-on="1"] .dot{background:var(--mint);border-color:var(--mint)}
  .task[data-on="1"] .dot::after{content:"";width:7px;height:11px;border:solid #04140d;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px)}
  .task[data-on="1"] .name{color:var(--muted);text-decoration:line-through}
</style>
</head>
<body>
<div class="wrap">
  <h1>Discipline</h1>
  <p class="sub">Win the day. Every day.</p>
  <div class="top">
    <div class="box"><div class="n" id="score">0/5</div><div class="l">Today</div></div>
    <div class="box"><div class="n" id="streak">0</div><div class="l">Day streak</div></div>
  </div>
  <div id="list"></div>
</div>
<script>
  const $=s=>document.querySelector(s);
  const TASKS=["Trained","Ate clean","Water","No doomscroll","Slept 7h+"];
  let byDay={};
  const dayKey=d=>{d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
  function computeStreak(){
    let s=0;const d=new Date();
    for(;;){const k=dayKey(d);const done=(byDay[k]||[]).filter(Boolean).length;if(done===TASKS.length){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  }
  function render(){
    const k=dayKey();const day=byDay[k]||TASKS.map(()=>false);
    const done=day.filter(Boolean).length;
    $("#score").textContent=done+"/"+TASKS.length;
    $("#streak").textContent=computeStreak();
    $("#list").innerHTML=TASKS.map((t,i)=>
      `<div class="task" data-i="${i}" data-on="${day[i]?1:0}"><span class="dot"></span><span class="name">${t}</span></div>`
    ).join("");
    document.querySelectorAll(".task").forEach(el=>el.onclick=()=>toggle(+el.dataset.i));
  }
  async function toggle(i){
    const k=dayKey();const day=byDay[k]||TASKS.map(()=>false);
    day[i]=!day[i];byDay[k]=day;render();
    await window.Vitality.save(byDay);
  }
  (async()=>{const d=await window.Vitality.load();byDay=(d&&!Array.isArray(d)&&typeof d==="object")?d:{};render();})();
</script>
</body>
</html>
