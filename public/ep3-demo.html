<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Workout logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --fg:#fff;
    --mint:#6EE7B7; --mint-cool:#A7F3D0; --mint-hover:#5dd6a6; --amber:#F59E0B; --rose:#e0767b; --gold:#f1cf7a;
    --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.72);
    --rule:rgba(255,255,255,.08); --rule-strong:rgba(255,255,255,.16);
    --card:rgba(255,255,255,.022);
    --serif:'Instrument Serif',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --ease:cubic-bezier(.16,1,.3,1); --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::selection{background:rgba(110,231,183,.25);color:#fff}
  html,body{background:var(--bg);min-height:100%}
  body{font-family:var(--sans);color:var(--fg);-webkit-font-smoothing:antialiased;letter-spacing:-.006em;
    padding:34px 18px 90px;display:flex;justify-content:center;overflow-x:hidden}

  /* ── background: light at the top, gradient down to pure black, snowy particles ── */
  .atmos{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 40% at 50% -4%, rgba(110,231,183,.16), transparent 60%),
      linear-gradient(180deg, #07140e 0%, #050b08 32%, #020403 64%, #000 100%);}
  #snow{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.9}

  .wrap{position:relative;z-index:1;width:100%;max-width:620px}
  .num,.pillValue,.pillInput{font-variant-numeric:tabular-nums}

  /* ── progress rail ── */
  .top{display:flex;align-items:center;gap:14px;margin-bottom:30px}
  .track{flex:1;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--mint);border-radius:2px;transition:width .5s var(--ease)}
  .count{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--muted);white-space:nowrap}
  .count b{color:var(--mint-cool);font-style:normal;font-weight:500;font-variant-numeric:tabular-nums}
  .unit-toggle{display:inline-flex;flex:none;background:var(--card);border:1px solid var(--rule-strong);border-radius:999px;padding:2px}
  .unit-opt{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:999px;cursor:pointer;transition:color .2s,background .2s}
  .unit-opt.on{background:var(--mint);color:#04140d}
  .unit-opt:not(.on):hover{color:var(--muted-strong)}

  /* ── lift card ── */
  .lift{margin-bottom:30px;opacity:0;transform:translateY(10px);animation:rise .6s var(--ease) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .lift-head{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--rule);padding-bottom:11px}
  .glyph{flex:none;width:20px;height:20px;color:var(--mint);opacity:.8;display:grid;place-items:center}
  .glyph svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .lift-name{font-family:var(--serif);font-size:28px;line-height:1;letter-spacing:-.01em;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .info{flex:none;width:18px;height:18px;border:1px solid rgba(110,231,183,.4);color:var(--mint);border-radius:50%;
    font-family:var(--serif);font-style:italic;font-size:11px;display:grid;place-items:center;cursor:pointer;opacity:.8;transition:opacity .2s,background .2s}
  .info:hover{opacity:1;background:rgba(110,231,183,.08)}
  .lift-head .sp{flex:1}
  .lift-x{flex:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:5px;border-radius:8px;opacity:.5;transition:color .2s,opacity .2s,background .2s}
  .lift-x:hover{color:var(--rose);opacity:1;background:rgba(224,118,123,.08)}
  .lift-x svg{width:17px;height:17px;display:block;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round}

  .lift-meta{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:14px 0 14px}
  .tierchip{border:1px solid var(--rule-strong);border-radius:6px;padding:4px 8px;letter-spacing:.14em;color:var(--muted-strong)}

  /* ── per-lift action chips ── */
  .chips{display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(110,231,183,.26);border-radius:999px;
    background:rgba(110,231,183,.03);color:var(--mint);font-family:var(--serif);font-style:italic;font-size:15px;
    padding:8px 15px;cursor:pointer;box-shadow:0 0 14px rgba(110,231,183,.06);transition:border-color .2s,background .2s,transform .15s var(--spring)}
  .chip:hover{border-color:rgba(110,231,183,.5);background:rgba(110,231,183,.07)} .chip:active{transform:scale(.95)}
  .chip svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  /* ── progressive-overload ★ pill (·· ★ at the end of the chips row) — 1:1 with the app ── */
  .starPill{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:6px 8px;margin-left:2px;
    border:none;background:transparent;color:var(--mint);cursor:pointer;overflow:visible;transition:transform .2s var(--ease),color .2s var(--ease)}
  .starDots{display:inline-flex;align-items:center;gap:3px;margin-right:5px}
  .starDot{width:3px;height:3px;border-radius:50%;background:var(--mint);opacity:.45;transition:opacity .2s var(--ease),background .2s var(--ease)}
  .starPillArmed .starDot{background:var(--gold);opacity:.7}
  .starGlyph{font-family:var(--serif);font-size:1.5rem;line-height:1;color:inherit;filter:drop-shadow(0 0 6px rgba(110,231,183,.45));transition:transform .2s var(--ease)}
  .starPill:hover .starGlyph{transform:scale(1.1)}
  .starPill:focus-visible{outline:2px solid var(--mint);outline-offset:3px;border-radius:8px}
  .starPillArmed{color:var(--gold)}
  .starPillArmed .starGlyph{filter:drop-shadow(0 0 8px rgba(241,207,122,.55));animation:armedBreathe 2.8s ease-in-out infinite}
  @keyframes armedBreathe{0%,100%{transform:scale(1);opacity:.95}50%{transform:scale(1.09);opacity:1}}
  .starPillInert{opacity:.3;cursor:default;color:var(--muted)}
  .starPillInert .starGlyph{filter:none;animation:none}
  .starPillInert:hover .starGlyph{transform:none}
  .starPillDone{opacity:.4;cursor:default;color:var(--mint)}
  .starPillDone .starGlyph{filter:none;animation:none}
  .starPillDone .starDot{background:var(--mint);opacity:.35}
  .starPillDone:hover .starGlyph{transform:none}
  .starAmt{align-self:center;font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--gold);margin-left:1px;text-shadow:0 0 9px rgba(241,207,122,.3)}

  /* small steady gold ★ beside the lift name once it's a conquered overload */
  .conqueredStar{flex:none;width:16px;height:16px;align-self:center;color:var(--gold);filter:drop-shadow(0 0 5px rgba(241,207,122,.4))}
  .conqueredStar svg{width:16px;height:16px;display:block;fill:currentColor}

  /* ── celebration: the one-time gold flush + star burst when a lift becomes a
        conquered overload (all sets logged + one beats the previous best). On-card,
        like the app — no broken full-screen overlay. Drives off .lift.celebrate;
        .lift.conquered is the quiet persistent state (gold name star + gold ★). ── */
  .lift{position:relative}
  .lift.conquered .starGlyph{color:var(--gold)}
  .lift.celebrate .pillValue{animation:goldNum 1.6s var(--ease)}
  @keyframes goldNum{0%,100%{color:inherit;text-shadow:none}26%{color:var(--gold);text-shadow:0 0 14px rgba(241,207,122,.55)}}
  .lift.celebrate .lift-name{animation:goldName 1.5s var(--ease)}
  @keyframes goldName{0%,100%{color:var(--fg)}26%{color:var(--gold);text-shadow:0 0 18px rgba(241,207,122,.45)}}
  .lift.celebrate .starPill{animation:starBig 1.15s var(--spring);color:var(--gold);opacity:1}
  .lift.celebrate .starGlyph{filter:drop-shadow(0 0 10px rgba(241,207,122,.6))}
  @keyframes starBig{0%{transform:scale(1)}30%{transform:scale(1.55)}100%{transform:scale(1)}}
  .lift.celebrate .starPill::after{content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;box-shadow:0 0 0 0 rgba(241,207,122,.6);animation:starRing 1.15s var(--ease) forwards}
  @keyframes starRing{0%{box-shadow:0 0 0 0 rgba(241,207,122,.6)}100%{box-shadow:0 0 0 30px rgba(241,207,122,0)}}

  .rows{display:flex;flex-direction:column;gap:9px}

  /* ── the set pill (real Vitality row) ── */
  .pill{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;border:1px solid var(--rule);
    background:var(--card);position:relative;overflow:hidden;min-width:0;
    transition:background .4s var(--ease),border-color .4s var(--ease),color .4s var(--ease)}
  .pillIdx{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted);width:20px;flex:none}
  .pillValue{font-size:19px;font-weight:500;letter-spacing:-.01em;display:inline-flex;align-items:baseline;white-space:nowrap}
  .pillInput{background:transparent;border:none;outline:none;color:inherit;font:inherit;font-weight:600;
    text-align:center;field-sizing:content;width:auto;min-width:1.4ch;padding:0 1px;border-bottom:1px solid transparent;
    transition:border-color .25s var(--ease),color .25s var(--ease)}
  .pill:hover .pillInput{border-bottom-color:rgba(110,231,183,.22)}
  .pillInput:focus{color:var(--mint);border-bottom-color:var(--mint)}
  .pillUnit{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:.7em;margin-left:3px;letter-spacing:.02em}
  .pillTimes{color:var(--muted);margin:0 7px;font-weight:400}
  .pillSpacer{flex:1}
  .pillGroup{display:inline-flex;align-items:center;gap:9px}
  .pillHit{background:none;border:none;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--mint);cursor:pointer;white-space:nowrap;padding:2px;transition:color .2s}
  .pillMiss{background:none;border:none;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);cursor:pointer;padding:2px;transition:color .2s}
  .pillMiss:hover{color:var(--rose)}
  .pillStatus{font-family:var(--serif);font-style:italic;font-size:14px;white-space:nowrap}
  .pillReset{background:none;border:none;color:currentColor;cursor:pointer;opacity:.6;padding:5px;border-radius:50%;display:inline-flex;transition:opacity .2s,background .2s}
  .pillReset:hover{opacity:1;background:rgba(0,0,0,.12)} .pillReset svg{width:13px;height:13px;display:block}
  .pillPr{font-family:var(--serif);font-style:italic;color:#a87f12}

  .pill.clean,.pill.over{background:var(--mint);border-color:var(--mint);color:#000}
  .pill.clean .pillIdx,.pill.over .pillIdx,.pill.clean .pillTimes,.pill.over .pillTimes{color:rgba(0,0,0,.55)}
  .pill.clean .pillInput,.pill.over .pillInput{color:#000}
  .pill.clean .pillUnit,.pill.over .pillUnit{color:rgba(0,0,0,.55)}
  .pill.clean .pillHit,.pill.over .pillHit,.pill.clean .pillStatus,.pill.over .pillStatus{color:#000}
  .pill.partial{background:rgba(245,158,11,.14);border-color:var(--amber);color:var(--fg)}
  .pill.partial .pillIdx,.pill.partial .pillStatus,.pill.partial .pillUnit{color:var(--amber)}
  .pill.failed{background:rgba(224,118,123,.12);border-color:var(--rose);color:var(--fg)}
  .pill.failed .pillIdx,.pill.failed .pillStatus{color:var(--rose)}
  .pill.failed .pillValue{text-decoration:line-through;color:var(--muted-strong)}

  /* ── add a lift ── */
  .add{display:flex;flex-direction:column;align-items:center;gap:9px;margin:34px 0 8px}
  .add-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--rule-strong);background:none;color:var(--mint);
    font-size:22px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:border-color .2s,transform .2s var(--spring)}
  .add-btn:hover{border-color:var(--mint)} .add-btn:active{transform:scale(.92)}
  .add-cap{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted)}
  .add-form{display:none;gap:9px;width:100%;max-width:360px}
  .add-form.on{display:flex}
  .add-input{flex:1;background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;color:var(--fg);
    font-family:var(--sans);font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s}
  .add-input:focus{border-color:var(--mint)}
  .add-go{background:var(--mint);color:#000;border:none;border-radius:12px;font-family:var(--sans);font-weight:600;font-size:14px;padding:0 18px;cursor:pointer}

  /* ── hidden / removed lifts (never lose your data) ── */
  .hidden-bar{margin-top:30px;border-top:1px solid var(--rule);padding-top:18px}
  .hidden-bar h4{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .hidden-row{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--muted-strong)}
  .hidden-row .hn{flex:1;font-family:var(--serif);font-style:italic;font-size:17px}
  .hidden-row .keep{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--rule);border-radius:999px;padding:3px 8px}
  .restore{background:none;border:1px solid var(--rule-strong);color:var(--mint);font-family:var(--serif);font-style:italic;font-size:13px;padding:5px 13px;border-radius:999px;cursor:pointer;transition:border-color .2s}
  .restore:hover{border-color:var(--mint)}

  .footnote{text-align:center;color:var(--muted);font-size:11.5px;margin-top:26px;opacity:.8}

  /* ── modal (info card + the Episode 1 history graph) ── */
  .modal{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:22px;
    background:rgba(0,0,0,.66);opacity:0;pointer-events:none;transition:opacity .25s var(--ease);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  .modal.on{opacity:1;pointer-events:auto}
  .sheet{width:100%;max-width:440px;background:#0a0f0c;border:1px solid var(--rule-strong);border-radius:20px;padding:22px;
    transform:scale(.94) translateY(10px);transition:transform .3s var(--spring)}
  .modal.on .sheet{transform:none}
  .sheet-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mint);margin-bottom:8px}
  .sheet-title{font-family:var(--serif);font-size:26px;line-height:1.05;margin-bottom:4px}
  .sheet-sub{color:var(--muted-strong);font-size:14px;line-height:1.5;margin-bottom:16px}
  .sheet-close{position:absolute;z-index:10;top:14px;right:14px;width:32px;height:32px;display:grid;place-items:center;background:rgba(255,255,255,.05);border:1px solid var(--rule-strong);border-radius:50%;color:var(--muted-strong);cursor:pointer;font-size:15px;line-height:1;transition:border-color .2s,color .2s}
  .sheet-close:hover{border-color:var(--mint);color:var(--fg)}
  .sheet-stats{display:flex;gap:18px;margin-top:8px}
  .sheet-stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
  .sheet-stat .v{font-size:20px;font-weight:600;margin-top:5px} .sheet-stat .v.gold{color:var(--gold)} .sheet-stat .v.up{color:var(--mint-cool)}
  .chart{width:100%;margin-top:6px}
  .chart svg{width:100%;height:auto;display:block;overflow:visible}
  .ch-grid{stroke:var(--rule)} .ch-area{fill:url(#g)} .ch-line{fill:none;stroke:var(--mint);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
  .ch-dot{fill:var(--mint);stroke:#0a0f0c;stroke-width:3} .ch-dot.best{fill:var(--gold)}
  .ch-lab{fill:var(--muted);font-family:var(--mono);font-size:8px}
  .ch-cap{text-align:center;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--mint-cool);margin-top:10px}

  /* ════ shared card bits (ported from the real logger cards) ════ */
  .card-sub{font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.5;color:var(--muted-strong);margin:4px 0 4px}
  .card-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .btn-ghost{background:none;border:1px solid var(--rule-strong);color:var(--muted-strong);font-family:var(--sans);font-weight:600;
    font-size:14px;padding:11px 20px;border-radius:999px;cursor:pointer;transition:border-color .2s,color .2s}
  .btn-ghost:hover{border-color:var(--mint);color:var(--fg)}
  .btn-mint{background:var(--mint);border:1px solid var(--mint);color:#04140d;font-family:var(--sans);font-weight:700;
    font-size:14px;padding:11px 22px;border-radius:999px;cursor:pointer;transition:background .2s,transform .15s var(--spring)}
  .btn-mint:hover{background:#5dd6a6} .btn-mint:active{transform:scale(.97)}

  /* ════ TUNE: icon + label rows, steppers, weight tap-to-type ════ */
  .tune{display:flex;flex-direction:column;margin:8px 0 2px}
  .tune-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 2px;border-top:1px solid var(--rule)}
  .tune-row:first-child{border-top:none}
  .tune-left{display:flex;align-items:center;gap:12px;min-width:0}
  .tune-ico{flex:none;width:17px;height:17px;color:var(--muted)}
  .tune-ico svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .tune-lab{display:flex;flex-direction:column;gap:3px}
  .tune-k{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-strong)}
  .tune-reset{align-self:flex-start;background:none;border:none;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;
    text-transform:lowercase;color:var(--rose);cursor:pointer;padding:0}
  .tune-ctrl{display:flex;align-items:center;gap:5px}
  .tune-step{width:30px;height:34px;background:none;border:none;color:rgba(255,255,255,.34);font-size:22px;line-height:1;
    cursor:pointer;display:grid;place-items:center;transition:color .2s} .tune-step:hover{color:var(--mint)}
  .tune-val{font-family:var(--serif);font-style:italic;font-size:27px;color:var(--fg);font-variant-numeric:tabular-nums;min-width:1.7ch;text-align:center}
  .tune-num{font-family:var(--serif);font-style:italic;font-size:27px;color:var(--fg);background:none;border:none;outline:none;
    text-align:right;width:auto;field-sizing:content;min-width:1.4ch;border-bottom:1.5px solid transparent;padding:0 1px;transition:border-color .25s,color .25s}
  .tune-num:focus{color:var(--mint);border-bottom-color:var(--mint)}
  .tune-unit{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:lowercase;color:var(--muted);margin-left:6px}

  /* ════ SWAP: recommendations + library search ════ */
  .swap-sec{margin-top:18px}
  .swap-lab{display:block;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .swap-rows{display:flex;flex-direction:column;gap:8px}
  .swap-row{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;color:var(--fg);
    background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;padding:13px 15px;cursor:pointer;
    transition:border-color .2s,background .2s,transform .12s var(--spring)}
  .swap-row:hover{border-color:var(--mint);background:rgba(110,231,183,.04)} .swap-row:active{transform:scale(.985)}
  .swap-nm{font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .swap-meta{display:inline-flex;align-items:center;gap:9px;flex:none}
  .swap-wt{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--mint);font-variant-numeric:tabular-nums}
  .swap-wt span{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-left:3px}
  .swap-arrow{flex:none;width:14px;height:14px;color:var(--mint)} .swap-arrow svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .swap-search{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;padding:0 14px;transition:border-color .2s}
  .swap-search:focus-within{border-color:var(--mint)}
  .swap-search-ico{flex:none;width:15px;height:15px;color:var(--muted)} .swap-search-ico svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .swap-input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-family:var(--sans);font-size:15px;padding:13px 0}
  .swap-input::placeholder{color:var(--muted)}
  .swap-lib{display:flex;flex-direction:column;max-height:208px;overflow-y:auto;margin-top:4px}
  .swap-lib .swap-row{border:none;border-bottom:1px solid var(--rule);border-radius:0;background:none;padding:13px 4px}
  .swap-lib .swap-row:hover{background:rgba(110,231,183,.04)}
  .swap-empty{text-align:center;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);padding:18px 0 2px}
  .swap-form{display:flex;gap:9px;margin:6px 0 12px}
  .swap-input2{flex:1;background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;color:var(--fg);font-family:var(--sans);font-size:15px;padding:13px 14px;outline:none;transition:border-color .2s}
  .swap-input2:focus{border-color:var(--mint)} .swap-input2::placeholder{color:var(--muted)}
  .swap-upsell{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--muted);text-align:center;line-height:1.45}
  .ov-empty{text-align:center;font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--muted);padding:10px 6px 16px;line-height:1.5}

  /* ── history opens the REAL Episode 1 component, on the logger's own atmosphere ── */
  .ep1-overlay{position:fixed;inset:0;z-index:60;display:none;
    background:
      radial-gradient(ellipse 70% 40% at 50% -4%, rgba(110,231,183,.16), transparent 60%),
      linear-gradient(180deg,#07140e 0%,#050b08 32%,#020403 64%,#000 100%)}
  .ep1-overlay.on{display:block;animation:ep1in .3s var(--ease)}
  @keyframes ep1in{from{opacity:0}to{opacity:1}}
  .ep1-overlay iframe{width:100%;height:100%;border:none;display:block;background:transparent}
  /* the logger owns the way back, so it works even when the graph is a file:// iframe */
  .ep1-close{position:fixed;top:16px;left:16px;z-index:2;display:inline-flex;align-items:center;gap:7px;
    background:rgba(8,14,10,.72);border:1px solid var(--rule-strong);color:var(--mint);
    font-family:var(--serif);font-style:italic;font-size:15px;padding:9px 16px;border-radius:999px;cursor:pointer;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:border-color .2s,background .2s}
  .ep1-close:hover{border-color:var(--mint);background:rgba(8,14,10,.92)}
  .ep1-close svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

  /* ── finish session (closes the loop: today's sets become a saved session) ── */
  .finish-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:26px 0 4px}
  .finish{display:inline-flex;align-items:center;gap:9px;background:var(--mint);color:#04140d;border:none;border-radius:999px;
    font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:-.01em;padding:14px 26px;cursor:pointer;
    box-shadow:0 10px 30px -10px rgba(110,231,183,.5);transition:transform .15s var(--spring),box-shadow .2s,opacity .2s}
  .finish:hover{transform:translateY(-2px);box-shadow:0 14px 36px -10px rgba(110,231,183,.6)} .finish:active{transform:scale(.97)}
  .finish svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .finish[disabled]{opacity:.4;cursor:default;box-shadow:none;pointer-events:none}
  .finish-cap{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted)}

  /* ════ OVERLOAD CARD: 1:1 port of the app's OverloadModal (opens on the ★) ════ */
  .po-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;
    background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:opacity .2s var(--ease)}
  .po-modal.on{opacity:1;pointer-events:auto}
  .po-card{position:relative;overflow:hidden;width:100%;max-width:380px;border:1px solid var(--rule-strong);border-radius:26px;
    background:#0a0f0c;padding:22px 22px 18px;box-shadow:0 24px 80px rgba(0,0,0,.6);
    transform:translateY(10px) scale(.985);opacity:0;transition:transform .32s var(--ease),opacity .32s var(--ease)}
  .po-modal.on .po-card{transform:none;opacity:1}
  .po-card::before{content:'';position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:320px;height:180px;
    pointer-events:none;background:radial-gradient(closest-side,rgba(110,231,183,.13),transparent 72%)}
  .po-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative}
  .po-head-l{display:flex;align-items:center;gap:10px;min-width:0}
  .po-head-ico{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;flex-shrink:0;color:rgba(110,231,183,.75)}
  .po-head-ico svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .po-eyebrow{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14px}
  .po-title{font-family:var(--serif);font-style:italic;font-size:24px;letter-spacing:-.02em;color:var(--fg);margin:2px 0 0;line-height:1.05;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .po-close{flex:none;width:30px;height:30px;border-radius:9px;border:none;background:transparent;color:var(--muted);cursor:pointer;
    display:grid;place-items:center;transition:color .2s var(--ease),background .2s var(--ease)}
  .po-close:hover{color:var(--fg);background:rgba(255,255,255,.06)}
  .po-close svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round}
  .po-body{text-align:center;padding-top:16px;position:relative}
  .po-body>.po-show,.po-body>.po-hint,.po-body>.po-confirm,.po-body>.po-remove,.po-body>.po-skip,
  .po-body>.po-choices,.po-body>.po-stepGroup,.po-body>.po-done{animation:cozyItem .46s var(--spring) backwards}
  .po-body>.po-show{animation-delay:.11s} .po-body>.po-hint{animation-delay:.18s}
  .po-body>.po-choices{animation-delay:.25s} .po-body>.po-confirm{animation-delay:.25s}
  .po-body>.po-stepGroup{animation-delay:.16s} .po-body>.po-remove{animation-delay:.3s}
  .po-body>.po-skip{animation-delay:.32s} .po-body>.po-done{animation-delay:.11s}
  @keyframes cozyItem{0%{opacity:0;transform:translateY(11px)}100%{opacity:1;transform:none}}
  .po-star{position:relative;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;margin:0 auto 9px;
    color:var(--mint);background:rgba(110,231,183,.12);font-family:var(--serif);font-size:1.25rem;line-height:1;animation:starPop .62s var(--spring)}
  .po-star::before{content:'';position:absolute;inset:-9px;border-radius:50%;z-index:-1;
    background:radial-gradient(closest-side,rgba(110,231,183,.3),transparent 72%);animation:haloBreath 3.2s ease-in-out infinite}
  .po-star.armed{color:var(--gold);background:rgba(241,207,122,.12)}
  .po-star.armed::before{background:radial-gradient(closest-side,rgba(241,207,122,.32),transparent 72%)}
  @keyframes starPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.18);opacity:1}100%{transform:scale(1)}}
  @keyframes haloBreath{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.95;transform:scale(1.18)}}
  .po-show{display:flex;flex-direction:column;gap:7px;margin:0 0 16px;padding:15px 13px;border-radius:16px;border:1px solid var(--rule);
    background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .po-showD{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .po-showV{display:flex;justify-content:center;align-items:baseline;flex-wrap:wrap;gap:16px}
  .po-stat{font-family:var(--serif);font-style:italic;font-size:.82rem;color:var(--muted-strong)}
  .po-stat b{font-weight:400;font-size:1.5rem;color:var(--fg);margin-right:4px;font-variant-numeric:tabular-nums}
  .po-hint{font-family:var(--serif);font-style:italic;color:var(--muted-strong);font-size:14px;margin:0 0 15px}
  .po-confirm{display:block;width:100%;margin:0 0 2px;padding:14px;border:none;border-radius:14px;background:var(--mint);color:#04140d;
    font-weight:700;font-size:14px;font-family:var(--sans);cursor:pointer;transition:background .2s var(--ease),transform .2s var(--spring),box-shadow .2s var(--ease)}
  .po-confirm:hover{background:var(--mint-hover);transform:translateY(-2px);box-shadow:0 10px 26px rgba(110,231,183,.22)}
  .po-confirm:active{transform:translateY(0) scale(.985)}
  .po-remove{display:block;margin:10px auto 0;background:none;border:none;color:var(--gold);font-family:var(--serif);font-style:italic;font-size:14px;cursor:pointer;opacity:.85}
  .po-remove:hover{opacity:1}
  .po-skip{display:block;margin:12px auto 0;background:none;border:none;color:var(--muted);font-family:var(--serif);font-style:italic;font-size:14px;cursor:pointer}
  .po-skip:hover{color:var(--muted-strong)}
  .po-armedBody{padding-top:8px}
  .po-armedAmt{font-family:var(--serif);font-style:italic;font-size:2.4rem;color:var(--gold);text-shadow:0 0 22px rgba(241,207,122,.3);margin:4px 0 2px}
  .po-armedLbl{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);margin-bottom:18px}
  .po-choices{display:flex;gap:9px;margin-bottom:2px}
  .po-choice{flex:1;cursor:pointer;border:1px solid rgba(110,231,183,.28);border-radius:14px;padding:14px 8px;color:var(--fg);
    font-family:var(--serif);font-style:italic;font-size:16px;background:linear-gradient(180deg,rgba(110,231,183,.08),rgba(110,231,183,.03));
    transition:background .2s var(--ease),border-color .2s var(--ease),transform .2s var(--spring),box-shadow .2s var(--ease)}
  .po-choice:hover{background:linear-gradient(180deg,rgba(110,231,183,.16),rgba(110,231,183,.06));border-color:rgba(110,231,183,.5);transform:translateY(-2px);box-shadow:0 8px 22px rgba(110,231,183,.13)}
  .po-choice:active{transform:translateY(0) scale(.98)}
  .po-stepBody{padding-top:22px}
  .po-stepGroup{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:18px}
  .po-stepLbl{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .po-step{display:flex;align-items:center;justify-content:center;gap:18px}
  .po-adj{width:46px;height:46px;border-radius:50%;border:1px solid rgba(110,231,183,.34);background:rgba(110,231,183,.06);color:var(--mint);
    font-size:23px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:background .2s var(--ease),color .2s var(--ease),transform .2s var(--spring),box-shadow .2s var(--ease)}
  .po-adj:hover{background:var(--mint);color:#04140d;box-shadow:0 8px 20px -8px rgba(110,231,183,.55)}
  .po-adj:active{transform:scale(.9)}
  .po-val{display:inline-flex;align-items:baseline;gap:5px;font-family:var(--serif);font-style:italic;font-size:2.05rem;color:var(--fg);
    min-width:118px;justify-content:center;padding:8px 18px;border-radius:16px;background:radial-gradient(130% 130% at 50% 0%,rgba(110,231,183,.1),transparent 72%);box-shadow:inset 0 0 0 1px rgba(110,231,183,.1)}
  .po-plus{color:var(--mint);font-size:.8em}
  .po-input{width:3.4ch;min-width:1.6ch;background:transparent;border:none;outline:none;color:var(--fg);font:inherit;text-align:center;
    -moz-appearance:textfield;appearance:textfield;border-bottom:1px solid transparent;padding:0 1px 1px;transition:border-color .2s var(--ease),color .2s var(--ease)}
  .po-input:focus{color:var(--mint);border-bottom-color:rgba(110,231,183,.55)}
  .po-input::-webkit-outer-spin-button,.po-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .po-unit{font-family:var(--serif);font-style:italic;font-size:.5em;color:var(--muted);margin-left:4px}
  .po-done{padding:22px 0 12px;text-align:center}
  .po-doneAmt{font-family:var(--serif);font-style:italic;font-size:1.55rem;color:var(--mint);animation:cozyPop .56s var(--spring)}
  .po-doneSub{font-size:12px;color:var(--muted);margin-top:7px;letter-spacing:.04em;animation:cozyItem .46s var(--spring) backwards .16s}
  @keyframes cozyPop{0%{opacity:0;transform:scale(.78)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}

  /* ── finish toast: a calm on-brand confirmation (replaces the old overlay) ── */
  .finish-cap.saved{color:var(--mint-cool);animation:savedPulse 1.8s var(--ease)}
  @keyframes savedPulse{0%{opacity:.4;transform:translateY(3px)}18%{opacity:1;transform:none}100%{opacity:1}}

  /* ── FORM reference card: the real Vitality "form" sheet, ported 1:1 ── */
  .sheet.fr{max-width:460px;max-height:88vh;overflow-y:auto;position:relative}
  .fr-card{display:flex;flex-direction:column;gap:18px}
  .fr-rev{opacity:0;animation:frReveal .5s var(--ease) both}
  @keyframes frReveal{from{opacity:0;transform:translateY(12px);filter:blur(4px)}to{opacity:1;transform:none;filter:blur(0)}}
  .fr-head{display:flex;flex-direction:column;gap:8px;padding-right:34px}
  .fr-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mint);font-weight:600}
  .fr-title{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(2rem,7vw,2.5rem);line-height:1.05;letter-spacing:-.015em}
  .fr-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .fr-muscle{display:inline-flex;align-items:center;gap:6px;color:var(--mint)}
  .fr-sep{opacity:.4}
  .fr-item{color:var(--muted-strong)}
  .fr-tier{font-family:var(--sans);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:2px 9px;border:1px solid rgba(110,231,183,.4);border-radius:999px;background:rgba(110,231,183,.06);color:var(--mint);cursor:pointer;transition:background .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease);animation:frTierGlow 2.8s ease-in-out infinite}
  .fr-tier:hover{background:rgba(110,231,183,.14);border-color:var(--mint);color:var(--mint-hover)}
  @keyframes frTierGlow{0%,100%{box-shadow:0 0 0 0 rgba(110,231,183,0)}50%{box-shadow:0 0 0 4px rgba(110,231,183,.10)}}
  .fr-gist{font-size:1.125rem;line-height:1.4;color:var(--fg);font-weight:600;letter-spacing:-.01em;max-width:56ch}
  .fr-images{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:360px}
  .fr-frame{margin:0;background:var(--card);border:1px solid var(--rule);border-radius:8px;overflow:hidden;position:relative;aspect-ratio:1/1;transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
  .fr-frame:hover{border-color:rgba(110,231,183,.4);box-shadow:0 0 24px -4px rgba(110,231,183,.4)}
  .fr-img{width:100%;height:100%;object-fit:cover;object-position:50% 22%;display:block}
  .fr-steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:16px;max-width:60ch}
  .fr-step{display:grid;grid-template-columns:20px 1fr;align-items:center;gap:16px}
  .fr-num{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1;color:var(--mint);text-align:center}
  .fr-text{font-size:1.05rem;line-height:1.3;color:var(--fg);font-weight:500}
  .fr-cues{display:flex;flex-wrap:wrap;gap:8px}
  .fr-cue{font-size:14px;line-height:1.3;padding:6px 12px;border-radius:999px;border:1px solid rgba(110,231,183,.22);background:rgba(110,231,183,.05);color:var(--muted-strong)}
  .fr-tierOverlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.66);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);animation:frFade .16s var(--ease)}
  .fr-tierOverlay[hidden]{display:none}
  @keyframes frFade{from{opacity:0}to{opacity:1}}
  .fr-tierCard{position:relative;width:100%;max-width:320px;background:#0a0f0c;border:1px solid var(--rule-strong);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:8px;animation:cozyItem .34s var(--spring)}
  .fr-tierBanner{display:inline-flex;align-items:center;gap:8px;margin-bottom:2px}
  .fr-tierDigit{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1px solid rgba(110,231,183,.4);background:rgba(110,231,183,.08);color:var(--mint);font-size:13px;font-weight:700}
  .fr-tierBadge{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mint);font-weight:600}
  .fr-tierTitle{font-family:var(--serif);font-style:italic;font-weight:400;font-size:1.6rem;line-height:1.1}
  .fr-tierBody{font-size:14px;line-height:1.6;color:var(--muted-strong)}
  .fr-tierClose{position:absolute;top:12px;right:12px;width:26px;height:26px;display:grid;place-items:center;background:transparent;border:none;color:var(--muted-strong);font-size:20px;line-height:1;cursor:pointer;transition:color .18s var(--ease)}
  .fr-tierClose:hover{color:var(--fg)}
  @media(prefers-reduced-motion:reduce){.fr-rev,.fr-tier,.fr-tierOverlay,.fr-tierCard{animation:none;opacity:1}}

  /* ════ LIBRARY: the full exercise library page (opens from "add a lift") ════ */
  .lib-open{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(110,231,183,.35);background:rgba(110,231,183,.04);
    color:var(--mint);font-family:var(--serif);font-style:italic;font-size:18px;padding:13px 22px;border-radius:999px;cursor:pointer;
    box-shadow:0 0 22px rgba(110,231,183,.08);transition:border-color .2s,background .2s,transform .15s var(--spring)}
  .lib-open:hover{border-color:var(--mint);background:rgba(110,231,183,.09);transform:translateY(-1px)} .lib-open:active{transform:scale(.97)}
  .lib-open svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .lib-open-n{font-family:var(--mono);font-style:normal;font-size:10px;letter-spacing:.08em;color:var(--mint-cool);border:1px solid rgba(110,231,183,.3);border-radius:999px;padding:2px 8px}

  /* the page itself: darker and more professional. The session view hides while
     you browse, so the drifting particles + a low mountain ridge become the
     background, like the real app. */
  .lib-overlay{position:fixed;inset:0;z-index:39;display:none;overflow-y:auto;padding:30px 18px 96px;
    background:linear-gradient(180deg, rgba(4,11,8,.52) 0%, rgba(2,6,4,.82) 46%, rgba(0,0,0,.96) 100%)}
  .lib-overlay.on{display:block;animation:ep1in .3s var(--ease)}
  body.lib-browsing .wrap{display:none}
  .lib-mtn{position:fixed;left:0;right:0;bottom:0;width:100%;height:23vh;max-height:210px;pointer-events:none;z-index:0;display:block}
  .lib-wrap{position:relative;z-index:1;width:100%;max-width:600px;margin:0 auto}
  .lib-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .lib-back{display:inline-flex;align-items:center;gap:7px;background:none;border:1px solid var(--rule-strong);color:var(--mint);
    font-family:var(--serif);font-style:italic;font-size:15px;padding:8px 15px;border-radius:999px;cursor:pointer;transition:border-color .2s}
  .lib-back:hover{border-color:var(--mint)}
  .lib-back svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .lib-sp{flex:1}
  .lib-count{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted);white-space:nowrap}
  .lib-count b{color:var(--mint-cool);font-style:normal;font-weight:500;font-variant-numeric:tabular-nums}
  .lib-title{font-family:var(--serif);font-size:34px;line-height:1;letter-spacing:-.01em;margin-bottom:16px}
  .lib-search{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.022);border:1px solid var(--rule-strong);border-radius:14px;padding:0 16px;margin-bottom:26px;transition:border-color .2s}
  .lib-search:focus-within{border-color:var(--mint)}
  .lib-search svg{flex:none;width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .lib-search input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-family:var(--sans);font-size:15px;padding:14px 0}
  .lib-search input::placeholder{color:var(--muted)}
  .lib-sec{margin-bottom:30px}
  .lib-sec-h{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:0 4px}
  .lib-sec-h b{color:var(--muted-strong);font-weight:500}
  .lib-sec-n{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--mint);border:1px solid rgba(110,231,183,.28);border-radius:999px;padding:2px 9px;opacity:.9;font-variant-numeric:tabular-nums}
  .lib-row{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid rgba(255,255,255,.05);min-width:0}
  .lib-row:last-child{border-bottom:none}
  .lib-check{flex:none;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--rule-strong);background:none;cursor:pointer;display:grid;place-items:center;padding:0;transition:border-color .18s,background .18s,transform .12s var(--spring)}
  .lib-check:hover{border-color:var(--mint)} .lib-check:active{transform:scale(.9)}
  .lib-check svg{width:12px;height:12px;fill:none;stroke:#04140d;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
  .lib-check.on{background:var(--mint);border-color:var(--mint)} .lib-check.on svg{opacity:1}
  .lib-gly{flex:none;width:18px;height:18px;color:var(--mint);opacity:.72;display:grid;place-items:center}
  .lib-gly svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .lib-main{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
  .lib-nm{font-family:var(--sans);font-size:16px;font-weight:500;letter-spacing:-.01em;color:var(--fg);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lib-rec{flex:none;font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--mint);border:1px solid rgba(110,231,183,.3);border-radius:999px;padding:3px 7px;opacity:.85}
  .lib-i{flex:none;width:22px;height:22px;border:1px solid rgba(110,231,183,.45);background:none;color:var(--mint);border-radius:50%;font-family:var(--serif);font-style:italic;font-size:12.5px;display:grid;place-items:center;cursor:pointer;opacity:.92;transition:opacity .2s,background .2s,border-color .2s}
  .lib-i:hover{opacity:1;background:rgba(110,231,183,.1);border-color:var(--mint)}
  .lib-empty{text-align:center;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted);padding:44px 0}
  .lib-sub{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted-strong);margin:-8px 0 20px;line-height:1.4}
  .lib-row.pick{cursor:pointer;border-radius:10px}
  .lib-row.pick:hover{background:rgba(110,231,183,.04)}
  .lib-pick{flex:none;width:22px;height:22px;display:grid;place-items:center;color:var(--mint);opacity:.75}
  .lib-pick svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .lib-create{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:rgba(110,231,183,.05);border:1px dashed rgba(110,231,183,.4);color:var(--mint);
    font-family:var(--serif);font-style:italic;font-size:16px;padding:14px 16px;border-radius:12px;cursor:pointer;margin-bottom:20px;transition:background .2s,border-color .2s}
  .lib-create:hover{background:rgba(110,231,183,.1);border-color:var(--mint)}
  .lib-create svg{flex:none;width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ── bottom actions: add a lift (opens the library) + reorder ── */
  .actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:32px 0 6px}
  .act-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--rule-strong);background:none;color:var(--mint);
    font-family:var(--serif);font-style:italic;font-size:16px;padding:11px 20px;border-radius:999px;cursor:pointer;transition:border-color .2s,background .2s,transform .12s var(--spring)}
  .act-btn:hover{border-color:var(--mint);background:rgba(110,231,183,.05)} .act-btn:active{transform:scale(.96)}
  .act-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .act-btn.on{background:var(--mint);border-color:var(--mint);color:#04140d}

  /* ── reorder: a simple arrow modal, matched to the app (no drag, cannot jam) ── */
  .sheet.ro{max-width:460px}
  .ro-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .ro-eyebrow{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted)}
  .ro-title{font-family:var(--serif);font-size:26px;line-height:1.1;margin-top:2px}
  .ro-done{flex:none;background:var(--mint);color:#04140d;border:none;border-radius:999px;font-family:var(--sans);font-weight:700;font-size:14px;padding:9px 22px;cursor:pointer;transition:transform .15s var(--spring),background .2s}
  .ro-done:hover{background:var(--mint-hover)} .ro-done:active{transform:scale(.96)}
  .ro-sub{font-family:var(--sans);font-size:14px;color:var(--muted-strong);margin:8px 0 18px;line-height:1.4}
  .ro-list{display:flex;flex-direction:column;gap:10px}
  .ro-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:13px 14px;transition:background .3s var(--ease)}
  .ro-row.moved{background:rgba(110,231,183,.09)}
  .ro-n{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted);width:16px;flex:none;text-align:center;font-variant-numeric:tabular-nums}
  .ro-nm{flex:1;min-width:0;font-family:var(--serif);font-style:italic;font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ro-arrows{display:inline-flex;gap:8px;flex:none}
  .ro-arrow{width:42px;height:36px;border:1px solid var(--rule-strong);background:none;color:var(--mint);border-radius:10px;cursor:pointer;display:grid;place-items:center;transition:border-color .2s,background .2s,transform .1s var(--spring)}
  .ro-arrow:hover:not([disabled]){border-color:var(--mint);background:rgba(110,231,183,.06)} .ro-arrow:active:not([disabled]){transform:scale(.9)}
  .ro-arrow[disabled]{opacity:.25;cursor:default}
  .ro-arrow svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ── session complete: the celebration (Vitality is a character, it celebrates) ── */
  .cele{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:26px;
    background:
      radial-gradient(ellipse 66% 42% at 50% 33%, rgba(241,207,122,.11), transparent 60%),
      radial-gradient(ellipse 92% 62% at 50% 42%, rgba(110,231,183,.10), transparent 64%),
      rgba(1,4,3,.95);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);opacity:0;transition:opacity .35s var(--ease)}
  .cele.on{display:flex;opacity:1}
  .cele-card{position:relative;width:100%;max-width:440px;text-align:center;display:flex;flex-direction:column;align-items:center}
  .cele-eyebrow,.cele-title,.cele-sub,.cele-stats,.cele-prs,.cele-done{animation:celeUp .62s var(--spring) backwards}
  .cele-eyebrow{animation-delay:.14s} .cele-title{animation-delay:.21s} .cele-sub{animation-delay:.29s}
  .cele-stats{animation-delay:.37s} .cele-prs{animation-delay:.45s} .cele-done{animation-delay:.55s}
  @keyframes celeUp{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:none}}
  .cele-star{position:relative;width:74px;height:74px;margin:0 auto 24px;filter:drop-shadow(0 8px 22px rgba(241,207,122,.4));animation:celeStar .82s var(--spring)}
  .cele-star svg{position:relative;z-index:1;width:74px;height:74px;display:block}
  .cele-star::before{content:'';position:absolute;inset:-26px;border-radius:50%;z-index:0;
    background:radial-gradient(closest-side, rgba(241,207,122,.36), transparent 72%);animation:celeHalo 3s ease-in-out infinite}
  .cele-star::after{content:'';position:absolute;inset:-6px;border-radius:50%;pointer-events:none;box-shadow:0 0 0 0 rgba(241,207,122,.5);animation:celeRing 1.1s var(--ease) .15s forwards}
  @keyframes celeStar{0%{transform:scale(.3) rotate(-16deg);opacity:0}62%{transform:scale(1.14) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes celeHalo{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  @keyframes celeRing{0%{box-shadow:0 0 0 0 rgba(241,207,122,.5)}100%{box-shadow:0 0 0 52px rgba(241,207,122,0)}}
  .cele-spark{position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;border-radius:50%;background:var(--gold);opacity:0;z-index:0;animation:celeSpark 1.5s var(--ease) forwards}
  @keyframes celeSpark{0%{opacity:0;transform:translate(0,0) scale(.2)}28%{opacity:1;transform:translate(var(--dx),var(--dy)) scale(1)}100%{opacity:0;transform:translate(calc(var(--dx)*1.5),calc(var(--dy)*1.5)) scale(.3)}}
  .cele-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--mint);margin-bottom:14px}
  .cele-title{font-family:var(--serif);font-size:46px;line-height:1.02;letter-spacing:-.015em;margin-bottom:12px}
  .cele-sub{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted-strong);line-height:1.5}
  .cele-stats{display:inline-flex;align-items:center;gap:24px;margin:22px 0 2px}
  .cele-stat{display:flex;flex-direction:column;align-items:center;gap:4px}
  .cele-statN{font-family:var(--serif);font-size:36px;line-height:1;color:var(--mint-cool);font-variant-numeric:tabular-nums}
  .cele-statK{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .cele-statDiv{width:1px;height:36px;background:var(--rule-strong)}
  .cele-prs{display:flex;flex-direction:column;align-items:center;gap:9px;margin:24px 0 2px}
  .cele-pr{display:inline-flex;align-items:center;gap:8px;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--gold);
    border:1px solid rgba(241,207,122,.36);background:rgba(241,207,122,.06);border-radius:999px;padding:8px 17px}
  .cele-pr svg{width:14px;height:14px;fill:currentColor;stroke:none}
  .cele-done{margin-top:30px;background:var(--mint);color:#04140d;border:none;border-radius:999px;
    font-family:var(--sans);font-weight:700;font-size:16px;padding:16px 46px;cursor:pointer;
    box-shadow:0 14px 38px -12px rgba(110,231,183,.6);transition:transform .15s var(--spring),box-shadow .2s}
  .cele-done:hover{transform:translateY(-2px);box-shadow:0 18px 44px -12px rgba(110,231,183,.7)} .cele-done:active{transform:scale(.97)}
</style>
</head>
<body>
<canvas id="snow"></canvas>
<div class="atmos"></div>
<div class="wrap">
  <div class="top">
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="count" id="count"></div>
    <div class="unit-toggle" id="unitToggle">
      <button class="unit-opt" data-u="kg" type="button">kg</button>
      <button class="unit-opt" data-u="lb" type="button">lb</button>
    </div>
  </div>

  <div id="list"></div>

  <div class="finish-wrap" id="finishWrap">
    <button class="finish" id="finishBtn"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg> Finish session</button>
    <div class="finish-cap" id="finishCap"></div>
  </div>

  <div class="actions" id="actions">
    <button class="act-btn" id="libOpen"><svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg> Add a lift</button>
    <button class="act-btn" id="reorderBtn"><svg viewBox="0 0 24 24"><path d="M8 5l-3 3 3 3M5 8h9M16 13l3 3-3 3M19 16h-9"/></svg> <span class="act-lbl">Reorder lifts</span></button>
  </div>

  <div id="hidden"></div>

  <p class="footnote">Saved on this device. Log a set, close the tab, it is still here.</p>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="ep1-overlay" id="ep1Overlay"><button class="ep1-close" id="ep1Close" aria-label="Back to session"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg> session</button><iframe id="ep1Frame" title="Progressive overload"></iframe></div>
<div class="po-modal" id="poModal"><div class="po-card" id="poCard"></div></div>
<div class="lib-overlay" id="libOverlay"></div>
<div class="cele" id="cele"><div class="cele-card" id="celeCard"></div></div>

<script>
  // ====================================================================
  //  A WORKOUT LOGGER, ONE FILE. Lifts, sets, and a row that grades
  //  itself the moment you log it. Tap "history" and Episode 1's
  //  progressive-overload graph opens, drawn from these same sets.
  //  Everything saves on its own. (The shape works for anything.)
  // ====================================================================

  const GLYPH = {
    chest:'<path d="M3 9c2.5-2.4 6-2.4 9 .2c3-2.6 6.5-2.6 9-.2"/><path d="M12 9.2c0 4-3.2 6-9 5.6M12 9.2c0 4 3.2 6 9 5.6"/>',
    shoulders:'<path d="M4 16a8 8 0 0 1 16 0"/><circle cx="12" cy="8" r="2.2"/>',
    arms:'<path d="M8 4v7a4 4 0 0 0 8 0V4"/><path d="M6 4h4M14 4h4"/>',
    back:'<path d="M12 4v15"/><path d="M12 7c-2.6 0-5 1.7-7 5M12 7c2.6 0 5 1.7 7 5"/>',
    legs:'<path d="M9 4l-1 8-2 8M15 4l1 8 2 8"/><path d="M8 4h8"/>',
    core:'<path d="M7.5 5h9M7.5 10h9M7.5 15h9M12 5v13"/>',
  };
  const SVG = inner => '<svg viewBox="0 0 24 24">' + inner + '</svg>';
  const ICON = {
    swap:'<path d="M4 8h13l-3-3M20 16H7l3 3"/>',
    history:'<path d="M4 18l5-6 3 3 6-8"/><path d="M16 7h3v3"/>',
    tune:'<path d="M4 8h10M18 8h2M4 16h4M12 16h8"/><circle cx="16" cy="8" r="2"/><circle cx="10" cy="16" r="2"/>',
    star:'<path d="M12 2l2.9 6.1 6.6.9-4.8 4.6 1.2 6.6L12 18.5 6.1 20.8l1.2-6.6L2.5 9.6l6.6-.9z"/>',
    weight:'<path d="M4 9v6M7 7.5v9M17 7.5v9M20 9v6M7 12h10"/>',
    sets:'<path d="M12 3 20 7 12 11 4 7Z"/><path d="M4 12 12 16 20 12"/><path d="M4 17 12 21 20 17"/>',
    reps:'<path d="M17 3l3 3-3 3"/><path d="M20 6H9a5 5 0 0 0-5 5"/><path d="M7 21l-3-3 3-3"/><path d="M4 18h11a5 5 0 0 0 5-5"/>',
    rest:'<circle cx="12" cy="13" r="8"/><path d="M12 13V9M12 13l3 2M9 3h6"/>',
    eye:'<path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>',
    arrow:'<path d="M4 12h14M13 7l5 5-5 5"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  };

  // @episode-start:save-local
  // ONE store, never one-per-feature. The lifts live in memory as LIFTS, and
  // these five functions are the only doorway to disk. Everything goes through
  // them: logging a set, swap, tune, star, even Episode 1's overload graph.
  // You read with getLift, write with updateLift or addLift, and saveLog puts
  // it on disk. A new need is a new FIELD on a lift (we added rest for the tune
  // card), never a second store. Point saveLog/loadLog at Supabase instead of
  // localStorage and every feature syncs across devices, untouched (sync.sql).
  const STORE = 'vitality.logger.v3';
  let LIFTS = [];
  function loadLog(){
    // an empty saved list (left over from testing) falls through and re-seeds, so
    // the demo never opens to a blank screen on camera.
    try { const raw = localStorage.getItem(STORE); if (raw){ const a = JSON.parse(raw); if (Array.isArray(a) && a.length) return (LIFTS = a); } } catch(e){}
    LIFTS = SEED.map(s => ({ rest:150, ...s, id: uid(), hidden:false, sets: blankSets(s.targetSets) }));
    saveLog();
    return LIFTS;
  }
  function saveLog(){ try { localStorage.setItem(STORE, JSON.stringify(LIFTS)); } catch(e){} }
  function getLift(id){ return LIFTS.find(l => l.id === id); }
  function updateLift(id, patch){
    const lift = getLift(id); if (!lift) return;
    Object.assign(lift, typeof patch === 'function' ? patch(lift) : patch);
    saveLog();
  }
  function addLift(fields){
    LIFTS.push({ id: uid(), hidden:false, rest:150, history:[], ...fields });
    saveLog();
  }
  // @episode-end:save-local

  const uid = () => 'l' + Math.random().toString(36).slice(2,9);
  const blankSets = n => Array.from({length:n}, () => ({ weight:null, reps:null, done:false, failed:false }));
  // a few past sessions so "history" has a real line to draw (top-set weight)
  const hist = (base, step, reps) => Array.from({length:6}, (_,i) => ({ w: base + i*step, r: reps }));

  // demo seed. No exercise library — these are just starting examples; the
  // user adds their own by typing a name.
  const SEED = [
    { name:'Barbell bench',         tier:1, muscle:'chest',     targetSets:4, targetReps:5,  weight:85,   history:hist(72.5,2.5,5) },
    { name:'Incline DB press',      tier:2, muscle:'chest',     targetSets:3, targetReps:9,  weight:32.5, perHand:true, history:hist(26,1.5,9) },
    { name:'Standing barbell OHP',  tier:1, muscle:'shoulders', targetSets:3, targetReps:6,  weight:52.5, history:hist(45,1.5,6) },
    { name:'Tricep rope pushdown',  tier:3, muscle:'arms',      targetSets:3, targetReps:10, weight:32.5, history:hist(25,1.5,10) },
    { name:'Overhead cable tri ext',tier:3, muscle:'arms',      targetSets:2, targetReps:12, weight:25,   history:hist(17.5,1.5,12) },
    { name:'DB lateral raise',      tier:3, muscle:'shoulders', targetSets:3, targetReps:12, weight:14,   perHand:true, history:hist(9,1,12) },
  ];

  // @episode-start:library-data
  // THE REAL VITALITY "TRAIN" LIBRARY — 57 lifts pulled straight from the app
  // (splitData.ts + exerciseReferences.ts). Every one carries its own official
  // info card: muscles, tier, equipment, a one-line gist, coach steps, cue pills
  // and two form photos. This is what turns "add a lift" into a real library
  // instead of a blank name box. Photos load from our live prod assets so this
  // stays one portable file. A lift added from here is a full lift, saved through
  // the same STORE as everything else — point that at Supabase and the library
  // syncs across devices, untouched.
  const LIB = [
  {key:"bench_bb",name:"Barbell bench",group:"chest",muscles:"Chest · Front delts · Triceps",tier:1,equip:"barbell",img:"bench_bb",rec:true,gist:"The barbell chest builder.",steps:["Unrack over your chest","Lower slow to your neck","Press up and squeeze"],cues:["Lower slower than you press","Squeeze chest at lockout","Wrists stacked over elbows. Tuck the elbows slightly, drive into the bar, hold the arch."]},
  {key:"incl_bb_bench",name:"Incline barbell bench",group:"chest",muscles:"Chest · Front delts · Triceps",tier:1,equip:"barbell",img:"incl_bb_bench",rec:true,gist:"Incline barbell upper-chest press.",steps:["Unrack over upper chest","Lower slow to upper chest","Press up and squeeze"],cues:["Lower slower than you press","Squeeze chest at lockout","30° incline max. Any higher and it becomes shoulder press. Touch upper chest."]},
  {key:"flat_db_press",name:"Flat DB press",group:"chest",muscles:"Chest · Front delts · Triceps",tier:2,equip:"dumbbell",img:null,rec:true,gist:"Flat dumbbell chest press.",steps:["Dumbbells at your chest, palms forward","Press up over your chest","Lower slow to a stretch"],cues:["Wrists stacked over elbows","Lower slower than you press"]},
  {key:"incl_db_press",name:"Incline DB press",group:"chest",muscles:"Chest · Front delts · Triceps",tier:2,equip:"dumbbell",img:"incl_db_press",rec:true,gist:"Incline dumbbell upper-chest press.",steps:["Dumbbells at shoulder width, palms forward","Press up with your chest","Lower slow"],cues:["Lower slower than you press","Stay in full control","30° incline. Lower DBs to upper chest. Squeeze pecs at top."]},
  {key:"machine_chest",name:"Machine chest press",group:"chest",muscles:"Chest · Front delts · Triceps",tier:2,equip:"machine",img:"machine_chest",rec:false,gist:"Machine chest press.",steps:["Upper arms parallel, palms down","Press the handles out","Return slow"],cues:["Hold the squeeze a beat","Back flat on the pad"]},
