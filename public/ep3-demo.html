  const GRP2ICON = { chest:'chest', shoulders:'shoulders', arms:'triceps', back:'back', legs:'legs', core:'core' };
  // sensible starting numbers for a lift added from the library (you tune from there)
  const tierDefaults = t => t === 1 ? { targetSets:4, targetReps:5, weight:40 }
                          : t === 2 ? { targetSets:3, targetReps:8, weight:25 }
                          :           { targetSets:3, targetReps:12, weight:15 };
  // @episode-end:library-data

  // @episode-start:units
  // One toggle, kg or lb. Everything is STORED in kg; these are the only doorway
  // to the screen. wDisp turns a stored kg into the number you see, wKg turns a
  // number you typed back into kg. Flip the unit and every weight re-renders, so
  // no stored value ever drifts. Same trick works for lb/oz, miles/km, anything.
  let UNIT = 'kg';
  try { const u = localStorage.getItem('vitality.logger.unit'); if (u === 'lb' || u === 'kg') UNIT = u; } catch(e){}
  const LB = 0.45359237;
  const wDisp = kg => UNIT === 'lb' ? Math.round(kg / LB * 2) / 2 : Math.round(kg * 100) / 100;   // stored kg -> shown number
  const wKg   = v  => UNIT === 'lb' ? Math.round(v * LB * 1000) / 1000 : v;                        // typed number -> stored kg
  const uLabel = perHand => UNIT + (perHand ? '/ea' : '');
  const nudgeDefault = () => UNIT === 'lb' ? 5 : 2.5;    // the smart overload bump, in the shown unit
  const nudgeStep = () => UNIT === 'lb' ? 2.5 : 1.25;    // finest plate step, in the shown unit
  function paintUnitToggle(){ document.querySelectorAll('.unit-opt').forEach(b => b.classList.toggle('on', b.dataset.u === UNIT)); }
  function setUnit(u){ if (u !== 'kg' && u !== 'lb') return; UNIT = u; try { localStorage.setItem('vitality.logger.unit', u); } catch(e){} paintUnitToggle(); render(); }
  // @episode-end:units

  loadLog();

  const listEl = document.getElementById('list');
  const hiddenEl = document.getElementById('hidden');

  // @episode-start:grade
  // The whole point: grade a set the instant it is logged. Beat the target
  // (heavier OR more reps) and it turns mint. Hit it exactly, still mint.
  // Fall short on reps and it is a calm amber, never a failure. A tapped
  // "miss" is rose. The state is the feedback — words just confirm it.
  function gradeSet(lift, set){
    if (set.failed) return 'failed';
    if (!set.done) return 'empty';
    const beatWeight = set.weight > lift.weight;
    const beatReps   = set.reps   > lift.targetReps;
    const metWeight  = set.weight >= lift.weight;
    const metReps    = set.reps   >= lift.targetReps;
    if (metWeight && metReps) return (beatWeight || beatReps) ? 'over' : 'clean';
    return 'partial';
  }
  function statusWord(lift, set, kind){
    if (kind === 'failed') return 'missed';
    if (kind === 'over'){ const d = set.reps - lift.targetReps; return d > 0 ? 'done · +' + d : 'done'; }
    if (kind === 'partial'){ const d = set.reps - lift.targetReps; return d < 0 ? 'partial · ' + d : 'partial'; }
    return 'done';
  }
  // @episode-end:grade

  // @episode-start:progress
  // One honest number across the visible lifts: how many sets are logged out
  // of how many you set out to do. A miss still counts as logged — you showed
  // up for it. Hidden lifts never count.
  function progress(){
    let logged = 0, total = 0;
    LIFTS.filter(l => !l.hidden).forEach(l => {
      l.sets.forEach(s => { total++; if (s.done || s.failed) logged++; });
    });
    return { logged, total };
  }
  function paintProgress(){
    const { logged, total } = progress();
    document.getElementById('fill').style.width = total ? (logged/total*100) + '%' : '0%';
    document.getElementById('count').innerHTML = '<b>' + logged + '</b> of ' + total + ' logged';
  }
  // @episode-end:progress

  // ── render ──
  function render(){
    listEl.innerHTML = '';
    LIFTS.filter(l => !l.hidden).forEach(lift => listEl.appendChild(liftCard(lift)));
    renderHidden();
    paintProgress();
    paintFinish();
    syncCelebrations();  // fires the on-card gold burst for any lift that just got conquered
  }

  function liftCard(lift){
    const el = document.createElement('div');
    const conquered = isConquered(lift);
    el.className = 'lift' + (conquered ? ' conquered' : '') + (celebratingIds.has(lift.id) ? ' celebrate' : '');
    el.dataset.id = lift.id;
    const unit = uLabel(lift.perHand);
    // ★ overload state — matches the app: armed (gold, breathing) before you lift,
    // inert (dim) once any set is logged, done (calm) once the goal is met.
    const anyLogged = lift.sets.some(s => s.done || s.failed);
    const bump = lift.overload || null;
    const armed = !!bump && ((bump.weightKg || 0) > 0 || (bump.reps || 0) > 0);
    const goalMet = overloadGoalMet(lift);
    const starCls = 'starPill' +
      (armed && !goalMet ? ' starPillArmed' : '') +
      (goalMet ? ' starPillDone' : '') +
      (anyLogged && !goalMet ? ' starPillInert' : '');
    const starAmt = armed && !goalMet ? bumpLabel(bump, lift.perHand) : '';
    el.innerHTML =
      '<div class="lift-head">' +
        '<span class="glyph" aria-hidden="true">' + SVG(GLYPH[lift.muscle] || GLYPH.chest) + '</span>' +
        '<span class="lift-name">' + esc(lift.name) + '</span>' +
        '<span class="info" title="About this lift">i</span>' +
        (conquered ? '<span class="conqueredStar" title="Progressive overload conquered">' + SVG(ICON.star) + '</span>' : '') +
        '<span class="sp"></span>' +
        '<button class="lift-x" title="Remove (kept, never deleted)"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>' +
      '</div>' +
      '<div class="lift-meta"><span class="tierchip">TIER ' + lift.tier + '</span> &middot; <b>' + lift.targetSets + ' &times; ' + lift.targetReps + '</b> &middot; last ' + wDisp(lift.weight) + ' ' + unit + '</div>' +
      '<div class="chips">' +
        '<button class="chip" data-act="swap">' + SVG(ICON.swap) + 'swap</button>' +
        '<button class="chip" data-act="history">' + SVG(ICON.history) + 'history</button>' +
        '<button class="chip" data-act="tune">' + SVG(ICON.tune) + 'tune</button>' +
        '<button class="' + starCls + '" data-act="star" aria-label="Progressive overload"' + (anyLogged ? ' disabled' : '') + '>' +
          '<span class="starDots" aria-hidden><span class="starDot"></span><span class="starDot"></span></span>' +
          '<span class="starGlyph" aria-hidden>&#9733;</span>' +
        '</button>' +
        (starAmt ? '<span class="starAmt">' + esc(starAmt) + '</span>' : '') +
      '</div>' +
      '<div class="rows"></div>';
    const rows = el.querySelector('.rows');
    lift.sets.forEach((set, i) => rows.appendChild(setRow(lift, set, i, unit)));
    el.querySelector('.lift-x').onclick = () => hideLift(lift.id);
    el.querySelector('.info').onclick = () => openInfo(lift);
    el.querySelector('[data-act="swap"]').onclick = () => openSwap(lift);
    el.querySelector('[data-act="history"]').onclick = () => openOverload(lift);
    el.querySelector('[data-act="tune"]').onclick = () => openTune(lift);
    const starBtn = el.querySelector('[data-act="star"]');
    starBtn.onclick = () => { if (anyLogged) return; openOverloadCard(lift); };
    return el;
  }

  // @episode-start:set-row
  // One set row. Tap the numbers to edit, "hit it" to log the typed values,
  // "miss" to fail it, the reset to clear it. It re-grades itself on every
  // change. The numbers carry over from your last target, so logging is two
  // taps on a good day.
  function setRow(lift, set, i, unit){
    const kind = gradeSet(lift, set);
    const logged = kind !== 'empty';
    // Seed unlogged rows from the armed overload bump: +kg lifts the weight,
    // +reps lifts the target. Once a set is logged it keeps its own numbers.
    const bump = lift.overload || null;
    const w = set.weight ?? (lift.weight + (bump ? (bump.weightKg || 0) : 0));
    const r = set.reps ?? (lift.targetReps + (bump ? (bump.reps || 0) : 0));
    const roman = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'][i] || (i+1);
    const row = document.createElement('div');
    row.className = 'pill ' + kind;
    row.innerHTML =
      '<span class="pillIdx">' + roman + '</span>' +
      '<span class="pillValue">' +
        '<input class="pillInput" type="text" inputmode="decimal" value="' + wDisp(w) + '" aria-label="weight">' +
        '<span class="pillUnit">' + unit + '</span>' +
        '<span class="pillTimes">&times;</span>' +
        '<input class="pillInput" type="text" inputmode="numeric" value="' + r + '" aria-label="reps">' +
      '</span>' +
      '<span class="pillSpacer"></span>' +
      '<div class="pillGroup"></div>';
    const [wIn, rIn] = row.querySelectorAll('.pillInput');
    // cross-browser auto-width: field-sizing covers modern browsers, the size
    // attribute (text inputs) covers Safari so "32.5" never clips to "32."
    const fit = el => el.setAttribute('size', Math.max(1, el.value.length));
    fit(wIn); fit(rIn);
    wIn.addEventListener('input', () => fit(wIn));
    rIn.addEventListener('input', () => fit(rIn));
    const group = row.querySelector('.pillGroup');
    const commit = () => {
      const wv = wKg(parseFloat(wIn.value)), rv = Math.round(parseFloat(rIn.value));
      if (!isFinite(wv) || wv < 0 || wv > 1000) return;
      if (!isFinite(rv) || rv <= 0 || rv > 100) return;
      set.weight = wv; set.reps = rv; set.done = true; set.failed = false;
      saveLog(); render();  // render() fires the on-card gold burst if this lift just got conquered
    };
    if (logged){
      const word = statusWord(lift, set, kind);
      group.innerHTML = '<span class="pillStatus">' + (kind==='over' ? '<span class="pillPr">&#9733; </span>' : '') + word + '</span>' +
        '<button class="pillReset" title="Reset this set"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 5.5 A4 4 0 1 0 5.5 2.5"/><polyline points="2 2 3.5 5.5 7 4.5"/></svg></button>';
      group.querySelector('.pillReset').onclick = () => { set.done=false; set.failed=false; set.weight=null; set.reps=null; saveLog(); render(); };
    } else {
      group.innerHTML = '<button class="pillHit">hit it &rarr;</button><button class="pillMiss">miss</button>';
      group.querySelector('.pillHit').onclick = commit;
      group.querySelector('.pillMiss').onclick = () => { set.failed=true; set.done=false; saveLog(); render(); };
    }
    wIn.onkeydown = rIn.onkeydown = e => { if (e.key === 'Enter'){ e.preventDefault(); commit(); } };
    return row;
  }
  // @episode-end:set-row

  // @episode-start:add-lift
  // Add a lift with nothing but a name. No exercise library to wade through,
  // no setup. Type "Cable fly", get a card with sets ready to log. It writes
  // through the same store as everything else (addLift), so the new lift saves
  // the instant it appears. The same move adds "Rent" or "Pages read" if you
  // point this at your money or your books instead.
  function quickAddLift(name){
    name = name.trim();
    if (!name) return;
    // Never lose a lift's data. If this exercise already exists (even one you
    // removed), bring it back with its full history and graph, don't duplicate.
    const existing = LIFTS.find(l => l.name.toLowerCase() === name.toLowerCase());
    if (existing){ existing.hidden = false; saveLog(); render(); return; }
    // If the typed name is a real library lift, add it as that so it gets the
    // real info card and shares the exercise's saved identity.
    const lib = LIB.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (lib){ addFromLibrary(lib); return; }
    addLift({ name, tier:3, muscle: guessMuscle(name) || 'chest', targetSets:3, targetReps:8, weight:20, sets: blankSets(3) });
    render();
  }
  // @episode-end:add-lift

  // @episode-start:soft-delete
  // Remove a lift and it is only HIDDEN, never destroyed. Its history stays
  // in storage, so a mis-tap can't wipe a month of progress. It drops into a
  // "kept" list you can restore from with one tap. This is the difference
  // between a tool you trust and one you are scared to touch.
  function hideLift(id){
    const l = LIFTS.find(x => x.id === id);
    if (l){ l.hidden = true; saveLog(); render(); }
  }
  function restoreLift(id){
    const l = LIFTS.find(x => x.id === id);
    if (l){ l.hidden = false; saveLog(); render(); }
  }
  // @episode-end:soft-delete

  function renderHidden(){
    const hid = LIFTS.filter(l => l.hidden);
    if (!hid.length){ hiddenEl.innerHTML = ''; return; }
    hiddenEl.innerHTML = '<div class="hidden-bar"><h4>' + hid.length + ' removed &middot; nothing lost</h4></div>';
    const bar = hiddenEl.querySelector('.hidden-bar');
    hid.forEach(l => {
      const row = document.createElement('div');
      row.className = 'hidden-row';
      row.innerHTML = '<span class="hn">' + esc(l.name) + '</span><span class="keep">history kept</span><button class="restore">restore</button>';
      row.querySelector('.restore').onclick = () => restoreLift(l.id);
      bar.appendChild(row);
    });
  }

  // @episode-start:reorder
  // Reorder the session with plain up/down arrows — matched to the app, no drag
  // to jam or misfire. Each arrow moves a lift among the visible ones and saves
  // the new order, which is part of your data too. Simple and unbreakable.
  function openReorder(){ sheet.className = 'sheet ro'; renderReorder(); modal.classList.add('on'); }
  function renderReorder(movedId){
    const vis = LIFTS.filter(l => !l.hidden);
    const rows = vis.map((l, i) =>
      '<div class="ro-row' + (l.id === movedId ? ' moved' : '') + '" data-id="' + l.id + '">' +
        '<span class="ro-n">' + (i + 1) + '</span>' +
        '<span class="ro-nm">' + esc(l.name) + '</span>' +
        '<span class="ro-arrows">' +
          '<button class="ro-arrow" data-dir="-1"' + (i === 0 ? ' disabled' : '') + ' aria-label="Move up">' + SVG('<path d="M6 15l6-6 6 6"/>') + '</button>' +
          '<button class="ro-arrow" data-dir="1"' + (i === vis.length - 1 ? ' disabled' : '') + ' aria-label="Move down">' + SVG('<path d="M6 9l6 6 6-6"/>') + '</button>' +
        '</span>' +
      '</div>'
    ).join('');
    sheet.innerHTML =
      '<div class="ro-head"><div><div class="ro-eyebrow">reorder</div><div class="ro-title">Your lifts</div></div>' +
        '<button class="ro-done" id="roDone">Done</button></div>' +
      '<div class="ro-sub">Use the arrows to set the order you train in.</div>' +
      '<div class="ro-list">' + (rows || '<div class="ov-empty">Add a lift first.</div>') + '</div>';
    sheet.querySelector('#roDone').onclick = closeSheet;
    sheet.querySelectorAll('.ro-arrow').forEach(b => b.onclick = () => moveLift(b.closest('.ro-row').dataset.id, +b.dataset.dir));
  }
  function moveLift(id, dir){
    const vis = LIFTS.filter(l => !l.hidden);
    const idx = vis.findIndex(l => l.id === id);
    const j = idx + dir;
    if (idx < 0 || j < 0 || j >= vis.length) return;
    const a = vis[idx], b = vis[j];
    const ia = LIFTS.indexOf(a), ib = LIFTS.indexOf(b);
    LIFTS[ia] = b; LIFTS[ib] = a;
    saveLog(); render();
    renderReorder(id);   // keep the modal open, briefly highlight the moved lift
  }
  // @episode-end:reorder

  // ── modal: info card + the Episode 1 history graph ──
  const modal = document.getElementById('modal');
  const sheet = document.getElementById('sheet');
  function openSheet(html){ sheet.className = 'sheet'; sheet.innerHTML = '<button class="sheet-close" aria-label="Close">&times;</button>' + html; sheet.querySelector('.sheet-close').onclick = closeSheet; modal.classList.add('on'); }
  function closeSheet(){ modal.classList.remove('on'); }
  modal.addEventListener('click', e => { if (e.target === modal) closeSheet(); });
  // only act when a sheet is actually up, and stop the same Escape from also
  // closing the library beneath it (the info card opens over the library).
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('on')) { closeSheet(); e.stopImmediatePropagation(); } });

  // ── info card: the real Vitality "FORM" reference sheet ──
  // In the app this is one component reading lib/exerciseReferences.ts (muscles,
  // tier, equipment, a one-liner, two photos, coach steps, cue pills). A single
  // file has no database, so the same content lives in FORM below, keyed by name.
  // Photos point at our own live prod assets so this stays one portable file.
  // Muscle glyphs are the exact paths from the app's MuscleIcon.
  const FRGLY = {
    chest:     { ms:['M48 30 L48 61 C38 60 27 55 19 46 C25 37 36 31 48 30 Z','M52 30 L52 61 C62 60 73 55 81 46 C75 37 64 31 52 30 Z'] },
    shoulders: { ms:['M28 64 C26 40 40 27 50 27 C60 27 74 40 72 64 C61 69 39 69 28 64 Z'], ln:['M43 29 C39 44 38 56 37 65','M57 29 C61 44 62 56 63 65'] },
    triceps:   { ms:['M30 76 C25 44 36 24 50 24 C64 24 75 44 70 76 L60 76 C64 48 60 38 50 38 C40 38 36 48 40 76 Z'], ln:['M50 24 L50 38'] },
    back:      { ms:['M50 26 L74 42 C70 66 60 78 50 82 C40 78 30 66 26 42 Z'], ln:['M50 28 L50 80'] },
    legs:      { ms:['M38 26 C34 46 34 64 40 82 L48 82 C46 62 46 44 48 26 Z','M52 26 C54 44 54 62 52 82 L60 82 C66 64 66 46 62 26 Z'] },
    core:      { ms:['M35 28 C35 25 65 25 65 28 L63 78 C63 81 37 81 37 78 Z'], ln:['M50 30 L50 76','M37 44 L63 44','M37 58 L63 58'] },
  };
  function muscleSvg(key){
    const g = FRGLY[key]; if (!g) return '';
    const ms = g.ms.map(d => '<path d="' + d + '"/>').join('');
    const ln = (g.ln || []).map(d => '<path d="' + d + '"/>').join('');
    return '<svg viewBox="0 0 100 100" width="16" height="16" aria-hidden="true" style="display:block">'
      + '<g fill="rgba(110,231,183,0.14)" stroke="#6EE7B7" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">' + ms + '</g>'
      + (ln ? '<g fill="none" stroke="#6EE7B7" stroke-width="2.55" stroke-linejoin="round" stroke-linecap="round">' + ln + '</g>' : '')
      + '</svg>';
  }
  const FR_ROMAN = ['i','ii','iii','iv','v','vi','vii','viii'];
  const TIERINFO = {
    1: { digit:'1', badge:'Tier 1', title:'Heavy compounds', body:'The big lifts your day is built around. Bench, squat, overhead press, deadlift, weighted dips. These move the most strength and size, so they go first.' },
    2: { digit:'2', badge:'Tier 2', title:'Compounds', body:'Other multi-muscle moves. Dumbbell presses, machine presses, close-grip bench. They round out the day after the main lifts.' },
    3: { digit:'3', badge:'Tier 3', title:'Isolation', body:'The finishers. Cable fly, lateral raise, bicep curl, tricep pushdown. Quick lifts to hit one muscle directly.' },
  };
  // The info card now reads straight from the LIB library above (keyed by name),
  // so every one of the 57 lifts carries its own official card — not just a
  // hand-picked few. buildFormCard takes a LIB entry: group -> muscle icon,
  // plus muscles, tier, equipment, gist, steps, cues and two form photos.

  function buildFormCard(lift, f){
    const t = TIERINFO[lift.tier] || TIERINFO[3];
    const at = ms => ' style="animation-delay:' + ms + 'ms"';
    let html = '<div class="fr-card">';
    html += '<div class="fr-head fr-rev"' + at(40) + '>';
    html +=   '<span class="fr-eyebrow">FORM</span>';
    html +=   '<h2 class="fr-title">' + esc(lift.name) + '</h2>';
    html +=   '<div class="fr-meta">';
    if (f.muscles) html += '<span class="fr-muscle">' + muscleSvg(GRP2ICON[f.group] || 'chest') + '<span>' + esc(f.muscles) + '</span></span><span class="fr-sep">·</span>';
    html +=     '<button class="fr-tier" type="button" title="What does this tier mean?">' + esc(t.badge.toLowerCase()) + '</button>';
    if (f.equip) html += '<span class="fr-sep">·</span><span class="fr-item">' + esc(f.equip) + '</span>';
    html +=   '</div>';
    html += '</div>';
    if (f.gist) html += '<p class="fr-gist fr-rev"' + at(120) + '>' + esc(f.gist) + '</p>';
    if (f.img){
      const base = 'https://vitality-jade.vercel.app/exercise-refs/' + f.img + '/';
      html += '<div class="fr-images fr-rev"' + at(170) + '>'
           +  '<figure class="fr-frame"><img class="fr-img" src="' + base + '0.jpg" alt="' + esc(lift.name) + '" loading="lazy"></figure>'
           +  '<figure class="fr-frame"><img class="fr-img" src="' + base + '1.jpg" alt="' + esc(lift.name) + '" loading="lazy"></figure>'
           +  '</div>';
    }
    let cueStart = 300;
    if (f.steps && f.steps.length){
      html += '<ol class="fr-steps">';
      for (let i = 0; i < f.steps.length; i++) html += '<li class="fr-step fr-rev"' + at(240 + i*90) + '><span class="fr-num">' + (FR_ROMAN[i] || (i+1)) + '</span><span class="fr-text">' + esc(f.steps[i]) + '</span></li>';
      html += '</ol>';
      cueStart = 240 + f.steps.length*90 + 60;
    }
    if (f.cues && f.cues.length){
      html += '<div class="fr-cues">';
      for (let i = 0; i < f.cues.length; i++) html += '<span class="fr-cue fr-rev"' + at(cueStart + i*60) + '>' + esc(f.cues[i]) + '</span>';
      html += '</div>';
    }
    html += '<div class="fr-tierOverlay" hidden>'
         +  '<div class="fr-tierCard">'
         +    '<button class="fr-tierClose" type="button" aria-label="Close">&times;</button>'
         +    '<div class="fr-tierBanner"><span class="fr-tierDigit">' + esc(t.digit) + '</span><span class="fr-tierBadge">' + esc(t.badge) + '</span></div>'
         +    '<h3 class="fr-tierTitle">' + esc(t.title) + '</h3>'
         +    '<p class="fr-tierBody">' + esc(t.body) + '</p>'
         +  '</div>'
         +  '</div>';
    html += '</div>';
    return html;
  }

  function openInfo(lift){
    const f = libByName[lift.name] || (lift.libKey ? libByKey[lift.libKey] : null);
    if (!f){ openInfoGeneric(lift); return; }      // custom-typed lifts have no reference
    openSheet(buildFormCard(lift, f));
    sheet.classList.add('fr');
    const tierBtn = sheet.querySelector('.fr-tier');
    const overlay = sheet.querySelector('.fr-tierOverlay');
    if (tierBtn && overlay){
      // Escape closes only the tier popover (not the whole info card) while it is
      // open. Capture phase + stopImmediatePropagation beats the global handler.
      function onTierEsc(e){ if (e.key === 'Escape' && !overlay.hidden){ closeTier(); e.stopImmediatePropagation(); e.preventDefault(); } }
      function closeTier(){ overlay.hidden = true; document.removeEventListener('keydown', onTierEsc, true); }
      tierBtn.onclick = () => { overlay.hidden = false; document.addEventListener('keydown', onTierEsc, true); };
      overlay.addEventListener('click', e => { if (e.target === overlay) closeTier(); });
      const tc = overlay.querySelector('.fr-tierClose');
      if (tc) tc.onclick = closeTier;
    }
  }

  // fallback for lifts the user typed in themselves (no reference content)
  function openInfoGeneric(lift){
    const unit = uLabel(lift.perHand), wv = wDisp(lift.weight);
    openSheet(
      '<div class="sheet-eyebrow">About this lift</div>' +
      '<div class="sheet-title">' + esc(lift.name) + '</div>' +
      '<div class="sheet-sub">Tier ' + lift.tier + ' lift. To beat your best, go heavier than ' + wv + ' ' + unit + ', or hit ' + wv + ' ' + unit + ' for one more rep than ' + lift.targetReps + '.</div>' +
      '<div class="sheet-stats">' +
        '<div class="sheet-stat"><div class="k">Target</div><div class="v">' + lift.targetSets + ' &times; ' + lift.targetReps + '</div></div>' +
        '<div class="sheet-stat"><div class="k">Last</div><div class="v">' + wv + ' ' + unit + '</div></div>' +
      '</div>');
  }

  // swap (free standalone): keep it dead simple. Type the new movement and it
  // starts fresh in this slot, written through updateLift. The smart version
  // (matched-weight recommendations, a full exercise library) needs a database,
  // so that is a Vitality feature, not something we fake in a single file.
  const round05 = n => Math.round(n * 2) / 2;
  function guessMuscle(name){
    const n = name.toLowerCase();
    if (/curl|tricep|pushdown|skull|extension|preacher/.test(n)) return 'arms';
    if (/ohp|shoulder|lateral|delt|arnold|overhead|face pull/.test(n)) return 'shoulders';
    if (/press|bench|fly|dip|push-?up|pec/.test(n)) return 'chest';
    return null;
  }
  // Swap now opens the library in "swap mode": pick a replacement from the real
  // catalog. Your weight carries over and today's sets start fresh in this slot.
  function openSwap(lift){ openLibrarySwap(lift); }

  // tune: set the targets and the weight to beat, then save. Edits stay in a
  // draft until you hit save, then one updateLift writes weight, sets, reps and
  // rest together. Changing the set count reshapes the rows but keeps every set
  // you already logged, by index.
  const fmtN = n => (Math.round(n * 10) / 10).toString();
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  function reshapeSets(lift, n){
    // never discard a set you already logged: if a trailing set beyond n is
    // done or failed, keep enough rows to preserve it. Unlogged tails still trim.
    let keep = n;
    for (let i = lift.sets.length - 1; i >= n; i--){
      if (lift.sets[i] && (lift.sets[i].done || lift.sets[i].failed)){ keep = i + 1; break; }
    }
    const out = [];
    for (let i = 0; i < keep; i++) out.push(lift.sets[i] || { weight:null, reps:null, done:false, failed:false });
    return out;
  }
  function openTune(lift){
    const unit = uLabel(lift.perHand);
    const muscleLabel = { chest:'Chest', shoulders:'Shoulders', arms:'Arms', back:'Back', legs:'Legs', core:'Core' }[lift.muscle] || 'Lift';
    const DEFAULT_REST = 150;
    const d = { weight: lift.weight, targetSets: lift.targetSets, targetReps: lift.targetReps, rest: lift.rest ?? DEFAULT_REST };
    const fmtRest = s => Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    const stepRow = (k, icon, label, val) =>
      '<div class="tune-row"><span class="tune-left"><span class="tune-ico">' + SVG(icon) + '</span><span class="tune-lab"><span class="tune-k">' + label + '</span></span></span>' +
      '<span class="tune-ctrl"><button class="tune-step" data-k="' + k + '" data-d="-1" aria-label="decrease">&minus;</button>' +
      '<span class="tune-val">' + val + '</span>' +
      '<button class="tune-step" data-k="' + k + '" data-d="1" aria-label="increase">+</button></span></div>';
    function paint(){
      openSheet(
        '<div class="sheet-eyebrow">Tune &middot; ' + muscleLabel + '</div>' +
        '<div class="sheet-title">' + esc(lift.name) + '</div>' +
        '<div class="tune">' +
          '<div class="tune-row"><span class="tune-left"><span class="tune-ico">' + SVG(ICON.weight) + '</span><span class="tune-lab"><span class="tune-k">Weight</span></span></span>' +
            '<span class="tune-ctrl"><input class="tune-num" id="tWeight" inputmode="decimal" value="' + fmtN(wDisp(d.weight)) + '"><span class="tune-unit">' + unit + '</span></span></div>' +
          stepRow('sets', ICON.sets, 'Sets', d.targetSets) +
          stepRow('reps', ICON.reps, 'Reps', d.targetReps) +
          '<div class="tune-row"><span class="tune-left"><span class="tune-ico">' + SVG(ICON.rest) + '</span><span class="tune-lab"><span class="tune-k">Rest</span>' +
            (d.rest !== DEFAULT_REST ? '<button class="tune-reset" data-act="rest-reset">reset</button>' : '') + '</span></span>' +
            '<span class="tune-ctrl"><button class="tune-step" data-k="rest" data-d="-1" aria-label="less rest">&minus;</button>' +
            '<span class="tune-val">' + fmtRest(d.rest) + '</span>' +
            '<button class="tune-step" data-k="rest" data-d="1" aria-label="more rest">+</button></span></div>' +
        '</div>' +
        '<div class="card-foot"><button class="btn-ghost" data-act="cancel">cancel</button><button class="btn-mint" data-act="save">save</button></div>'
      );
      const wIn = sheet.querySelector('#tWeight');
      const readW = () => { const v = parseFloat(wIn.value); if (isFinite(v)) d.weight = clamp(wKg(v), 0, 1000); };
      wIn.oninput = readW;
      sheet.querySelectorAll('.tune-step').forEach(b => b.onclick = () => {
        readW();
        const k = b.dataset.k, dir = parseInt(b.dataset.d, 10);
        if (k === 'sets') d.targetSets = clamp(d.targetSets + dir, 1, 8);
        else if (k === 'reps') d.targetReps = clamp(d.targetReps + dir, 1, 30);
        else if (k === 'rest') d.rest = clamp(d.rest + dir * 15, 0, 600);
        paint();
      });
      const rr = sheet.querySelector('[data-act="rest-reset"]'); if (rr) rr.onclick = () => { d.rest = DEFAULT_REST; paint(); };
      sheet.querySelector('[data-act="cancel"]').onclick = closeSheet;
      sheet.querySelector('[data-act="save"]').onclick = () => {
        readW();
        updateLift(lift.id, l => ({ weight: d.weight, targetSets: d.targetSets, targetReps: d.targetReps, rest: d.rest, sets: reshapeSets(l, d.targetSets) }));
        render(); closeSheet();
      };
    }
    paint();
  }

  // history -> opens THE REAL Episode 1 component (the overload graph) full-screen,
  // fed by THIS lift's logged sets. ep2 writes the lift's sessions into a shared
  // store key and hands off the name; ep1 reads it and draws its own chart. No
  // reproduction: the history button is literally ep1, the same file the /logger
  // command wires into a real app.
  const pad2 = n => String(n).padStart(2, '0');
  const ymdKey = d => d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  function offsetDate(days){ const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + days); return ymdKey(d); }
  // turn a lift's history (+ today's logged sets) into ep1's session shape
  function liftSessions(lift){
    const h = lift.history || [];
    const sessions = h.map((s, i) => ({
      date: s.date || offsetDate(-((h.length - i) * 4 + 1)),
      kg: s.w,
      sets: s.sets || Array.from({ length: Math.max(1, lift.targetSets) }, () => ({ r: s.r }))
    }));
    const logged = lift.sets.filter(s => s.done || s.failed);
    if (logged.length){
      const top = lift.sets.filter(s => s.done && !s.failed);
      sessions.push({
        date: offsetDate(0),
        kg: top.length ? Math.max(...top.map(s => s.weight)) : lift.weight,
        sets: logged.map(s => ({ r: s.reps || 0, fail: !!s.failed }))
      });
    }
    return sessions;
  }
  const EP1_URL = 'overload.html';  // ep1 sits next to the logger (build copies it in)
  let ep1Loads = 0;
  const ep1Overlay = document.getElementById('ep1Overlay');
  const ep1Frame = document.getElementById('ep1Frame');
  function openOverload(lift){
    const store = 'vitality.overload.' + lift.id + '.v3';
    localStorage.setItem(store, JSON.stringify(liftSessions(lift)));
    localStorage.setItem('vitality.overload.handoff', JSON.stringify({ name: lift.name, store, unit: UNIT, perHand: lift.perHand }));
    ep1Frame.src = EP1_URL + '?from=logger&n=' + (++ep1Loads);

  }
  function closeEp1(){ ep1Overlay.classList.remove('on'); ep1Frame.src = 'about:blank'; }
  window.closeEp1 = closeEp1;  // ep1's own close button (inside the frame) calls this
  document.getElementById('ep1Close').onclick = closeEp1;  // the logger's own back button, works on file://
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && ep1Overlay.classList.contains('on')) closeEp1(); });

  // @episode-start:overload-card
  // The ★ overload card — 1:1 with the app's OverloadModal. Tap the ★ (before any
  // set is logged) to plan today's push: "add a rep" (one tap, +1 rep) or "add
  // 2.5 kg" (a fine stepper you can free-type). Arming writes lift.overload through
  // the ONE store, which seeds the set rows. Screens: choices · step · armed · done.
  const poModal = document.getElementById('poModal');
  const poCard = document.getElementById('poCard');
  const STEP_DISP = 1.25;     // finest plate step (metric)
  const DEFAULT_DISP = 2.5;   // the smart default nudge
  let poLift = null, poTimer = null;
  function openOverloadCard(lift){
    if (poTimer){ clearTimeout(poTimer); poTimer = null; }
    poLift = lift;
    const b = lift.overload;
    const isArmed = !!b && ((b.weightKg || 0) > 0 || (b.reps || 0) > 0);
    poRender(isArmed ? 'armed' : 'choices', nudgeDefault());
    poModal.classList.add('on');
  }
  function closeOverloadCard(){ if (poTimer){ clearTimeout(poTimer); poTimer = null; } poModal.classList.remove('on'); poLift = null; }
  function poArm(bump){ updateLift(poLift.id, { overload: bump }); render(); }
  function poClear(){ updateLift(poLift.id, { overload: null }); render(); closeOverloadCard(); }
  function poApplied(bump){ poArm(bump); poRender('done', 0, bumpLabel(bump, poLift.perHand)); poTimer = setTimeout(closeOverloadCard, 1150); }
  function poRender(view, weightDisp, doneLabel){
    const lift = poLift; if (!lift) return;
    const b = lift.overload;
    const isArmed = !!b && ((b.weightKg || 0) > 0 || (b.reps || 0) > 0);
    // "last session" readout — prior session if there is one, else the saved targets
    const last = (lift.history || [])[(lift.history || []).length - 1] || null;
    const lastSets = last && last.sets ? last.sets.length : lift.targetSets;
    const lastReps = last ? (last.r || lift.targetReps) : lift.targetReps;
    const lastWeight = last ? last.w : lift.weight;
    const unit = uLabel(lift.perHand);
    const head =
      '<div class="po-head"><div class="po-head-l">' +
        '<span class="po-head-ico" aria-hidden>' + SVG(GLYPH[lift.muscle] || GLYPH.chest) + '</span>' +
        '<div><div class="po-eyebrow">overload</div><div class="po-title">' + esc(lift.name) + '</div></div>' +
      '</div><button class="po-close" data-act="close" aria-label="Close"><svg viewBox="0 0 14 14"><path d="M3.5 3.5 L10.5 10.5 M10.5 3.5 L3.5 10.5"/></svg></button></div>';
    let body;
    if (view === 'done'){
      body = '<div class="po-body"><div class="po-done"><div class="po-doneAmt">' + esc(doneLabel || '') + '</div><div class="po-doneSub">on your sets for today</div></div></div>';

          '<div class="po-armedLbl">locked onto this lift</div>' +
          '<div class="po-choices"><button class="po-choice" data-act="edit">edit</button><button class="po-choice" data-act="clear">clear it</button></div>' +
          '<button class="po-skip" data-act="close">done</button>' +
        '</div>';
    } else if (view === 'step'){
      body =
        '<div class="po-body po-stepBody"><div class="po-stepGroup"><span class="po-stepLbl">add weight</span>' +
          '<div class="po-step"><button class="po-adj" data-act="minus" aria-label="Less weight">&minus;</button>' +
            '<span class="po-val"><span class="po-plus">+</span><input class="po-input" id="poInput" inputmode="decimal" value="' + fmtN(weightDisp) + '" aria-label="Added weight"><span class="po-unit">' + unit + '</span></span>' +
            '<button class="po-adj" data-act="plus" aria-label="More weight">+</button></div></div>' +
          '<button class="po-confirm" data-act="confirm">add it</button>' +
          '<button class="po-skip" data-act="back">back</button></div>';
    } else { // choices
      body =
        '<div class="po-body"><div class="po-star" aria-hidden>&#9733;</div>' +
          '<div class="po-show"><span class="po-showD">last session</span><span class="po-showV">' +
            '<span class="po-stat"><b>' + lastSets + '</b> sets</span>' +
            '<span class="po-stat"><b>' + lastReps + '</b> reps</span>' +
            '<span class="po-stat"><b>' + fmtN(wDisp(lastWeight)) + '</b> ' + unit + '</span></span></div>' +
          '<p class="po-hint">How much do you want to push today?</p>' +
          '<div class="po-choices"><button class="po-choice" data-act="addrep">add a rep</button><button class="po-choice" data-act="addweight">add ' + nudgeDefault() + ' ' + unit + '</button></div>' +
          (isArmed ? '<button class="po-remove" data-act="clear">clear it</button>' : '') +
          '<button class="po-skip" data-act="close">not right now</button></div>';
    }
    poCard.innerHTML = head + body;
    const seed = (b && b.weightKg > 0) ? wDisp(b.weightKg) : nudgeDefault();
    poCard.querySelectorAll('[data-act]').forEach(node => {
      const act = node.dataset.act;
      node.onclick = () => {
        if (act === 'close') closeOverloadCard();
        else if (act === 'clear') poClear();
        else if (act === 'addrep') poApplied({ weightKg: 0, reps: 1 });
        else if (act === 'addweight' || act === 'edit') poRender('step', seed);
        else if (act === 'back') poRender('choices', nudgeDefault());
        else if (act === 'minus' || act === 'plus'){
          const inp = poCard.querySelector('#poInput');
          let v = parseFloat(inp.value); if (!isFinite(v)) v = 0;
          // +/- steps by a clean plate bump: 2.5 kg or 5 lb. Free-type the center input for an exact number.
          inp.value = fmtN(Math.max(0, Math.round((v + (act === 'plus' ? 1 : -1) * nudgeDefault()) * 100) / 100));
        } else if (act === 'confirm') confirmStep();
      };
    });
    const inp = poCard.querySelector('#poInput');
    function confirmStep(){
      const v = parseFloat(poCard.querySelector('#poInput').value);
      if (!isFinite(v) || v <= 0) return;
      poApplied({ weightKg: wKg(v), reps: 0 });
    }
    if (inp) inp.onkeydown = e => { if (e.key === 'Enter'){ e.preventDefault(); confirmStep(); } };
  }
  poModal.addEventListener('click', e => { if (e.target === poModal) closeOverloadCard(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && poModal.classList.contains('on')) closeOverloadCard(); });
  // @episode-end:overload-card

  // @episode-start:overload-celebrate
  // The progressive-overload payoff, ported 1:1 from the app. A lift is CONQUERED
  // when every set is logged AND at least one done set beats the PREVIOUS best
  // (history only, never today's own sets) — so the payoff lands on the final set,
  // not the first. Crossing into conquered flushes the card gold once (the ★ bursts,
  // the numbers + name glow), then a small steady gold ★ settles beside the name.
  // Fully reversible: unlog below the overload and the mark clears. No overlay.
  function prevBestOf(lift){
    let best = null;
    (lift.history || []).forEach(s => {
      const w = s.w || 0, r = s.r || 0;
      if (!best || w > best.weight || (w === best.weight && r > best.reps)) best = { weight: w, reps: r };
    });
    return best;
  }
  function beatsPrevBest(lift, set){
    const best = prevBestOf(lift);
    if (!best || best.weight <= 0) return false;
    if (set.weight > best.weight) return true;
    return set.weight === best.weight && set.reps > best.reps;
  }
  function isConquered(lift){
    const rows = lift.sets || [];
    if (!rows.length) return false;
    if (!rows.every(s => s.done || s.failed)) return false;
    return rows.some(s => s.done && !s.failed && s.weight > 0 && s.reps > 0 && beatsPrevBest(lift, s));
  }
  // The armed overload's goal is met once a logged set hits base+bump on both axes.
  function overloadGoalMet(lift){
    const b = lift.overload; if (!b) return false;
    const tW = lift.weight + (b.weightKg || 0);
    const tR = lift.targetReps + (b.reps || 0);
    return lift.sets.some(s => s.done && !s.failed && s.weight >= tW && s.reps >= tR);
  }
  // "+2.5 kg", "+1 rep", or "+2.5 kg · +2 reps"
  function bumpLabel(b, perHand){
    const parts = [];
    if ((b.weightKg || 0) > 0) parts.push('+' + fmtN(wDisp(b.weightKg)) + ' ' + uLabel(perHand));
    if ((b.reps || 0) > 0) parts.push('+' + b.reps + ' rep' + (b.reps > 1 ? 's' : ''));
    return parts.join(' · ') || 'no change';
  }

  // Fire the one-time gold burst on the TRANSITION into conquered. render() rebuilds
  // the list each time, so liftCard re-applies the class to lifts still mid-burst;
  // this only STARTS the burst (+ a 1.6s timer) for lifts newly crossing the line.
  const celebratingIds = new Set();
  let celebratedPrev = new Set();
  // A CLEAN finish = every set hit (done, none missed, none still blank). That is
  // the moment the on-card gold star bursts, the warm "you nailed it" payoff. A
  // missed set or a half-logged lift does NOT star — that would cheapen it.
  // Beating your previous best on top of that also leaves the steady ★ beside the
  // name (isConquered) — so a real PR still reads differently from a clean session.
  function isCompleted(lift){
    const rows = lift.sets || [];
    return rows.length > 0 && rows.every(s => s.done && !s.failed);
  }
  function currentCelebrating(){
    const s = new Set();
    LIFTS.filter(l => !l.hidden).forEach(l => { if (isCompleted(l)) s.add(l.id); });
    return s;
  }
  function syncCelebrations(){
    const now = currentCelebrating();
    now.forEach(id => {
      if (!celebratedPrev.has(id) && !celebratingIds.has(id)){
        celebratingIds.add(id);
        const card = listEl.querySelector('.lift[data-id="' + id + '"]');
        if (card) card.classList.add('celebrate');
        setTimeout(() => {
          celebratingIds.delete(id);
          const c = listEl.querySelector('.lift[data-id="' + id + '"]');
          if (c) c.classList.remove('celebrate');
        }, 1600);
      }
    });
    celebratedPrev = now;
  }
  // @episode-end:overload-celebrate

  // ── finish session: today's logged sets become a saved session, the graph
  //    grows, and the rows reset for next time. This is the loop made whole. ──
  function finishSession(){
    let lifts = 0, totalSets = 0; const prs = [];
    LIFTS.filter(l => !l.hidden).forEach(lift => {
      const logged = lift.sets.filter(s => s.done || s.failed);
      if (!logged.length) return;
      const top = lift.sets.filter(s => s.done && !s.failed);
      const kg = top.length ? Math.max(...top.map(s => s.weight)) : lift.weight;
      const reps = top.length ? Math.max(...top.map(s => s.reps)) : 0;
      // a new best = a logged set that beat the previous best (history before today)
      const isPR = lift.sets.some(s => s.done && !s.failed && beatsPrevBest(lift, s));
      lift.history = (lift.history || []).concat({ w: kg, r: reps, date: offsetDate(0), sets: logged.map(s => ({ r: s.reps || 0, fail: !!s.failed })) });
      if (top.length) lift.weight = kg;          // last working weight carries forward (you push it up with tune or the ★)
      lift.overload = null;                       // the push was for this session; next one starts fresh
      lift.sets = blankSets(lift.targetSets);    // fresh rows for next session
      lifts++; totalSets += logged.length;
      if (isPR) prs.push({ name: lift.name, kg, perHand: lift.perHand });
    });
    if (!lifts) return;
    saveLog(); render();                          // the logger behind is already a clean slate
    showCelebration(lifts, totalSets, prs);
  }
  // The payoff screen: submitted, nice work, your numbers, any new bests, then Done.
  function showCelebration(lifts, totalSets, prs){
    const cele = document.getElementById('cele');
    // a gold gradient star with a fan of sparkles bursting out behind it
    const star = '<svg viewBox="0 0 24 24" aria-hidden="true"><defs><linearGradient id="celeGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe9b0"/><stop offset="1" stop-color="#e0a83a"/></linearGradient></defs><path fill="url(#celeGrad)" d="M12 2l2.9 6.1 6.6.9-4.8 4.6 1.2 6.6L12 18.5 6.1 20.8l1.2-6.6L2.5 9.6l6.6-.9z"/></svg>';
    const sparks = Array.from({ length: 8 }, (_, i) => {
      const a = (i / 8) * 6.2832, r = 40, dx = Math.cos(a) * r, dy = Math.sin(a) * r;
      return '<span class="cele-spark" style="--dx:' + dx.toFixed(1) + 'px;--dy:' + dy.toFixed(1) + 'px;animation-delay:' + (0.12 + i * 0.025).toFixed(3) + 's' + (i % 2 ? ';background:var(--mint)' : '') + '"></span>';
    }).join('');
    const prLines = prs.map(p => '<div class="cele-pr">' + SVG(ICON.star) + 'New best &middot; ' + esc(p.name) + ' ' + wDisp(p.kg) + ' ' + uLabel(p.perHand) + '</div>').join('');
    document.getElementById('celeCard').innerHTML =
      '<div class="cele-star" aria-hidden="true">' + sparks + star + '</div>' +
      '<div class="cele-eyebrow">Workout submitted</div>' +
      '<h2 class="cele-title">Nice work.</h2>' +
      '<p class="cele-sub">Your graph just grew.</p>' +
      '<div class="cele-stats">' +
        '<div class="cele-stat"><div class="cele-statN">' + totalSets + '</div><div class="cele-statK">set' + (totalSets > 1 ? 's' : '') + '</div></div>' +
        '<div class="cele-statDiv"></div>' +
        '<div class="cele-stat"><div class="cele-statN">' + lifts + '</div><div class="cele-statK">lift' + (lifts > 1 ? 's' : '') + '</div></div>' +
      '</div>' +
      (prLines ? '<div class="cele-prs">' + prLines + '</div>' : '') +
      '<button class="cele-done" id="celeDone">Done</button>';
    cele.classList.add('on');
    document.getElementById('celeDone').onclick = () => cele.classList.remove('on');
  }
  const finishBtn = document.getElementById('finishBtn');
  finishBtn.onclick = finishSession;
  // reflect how much is ready to save (called from render)
  function paintFinish(){
    let logged = 0;
    LIFTS.filter(l => !l.hidden).forEach(l => l.sets.forEach(s => { if (s.done || s.failed) logged++; }));
    finishBtn.disabled = logged === 0;
    const cap = document.getElementById('finishCap');
    cap.classList.remove('saved');
    cap.textContent = logged
      ? 'Saves ' + logged + ' logged set' + (logged > 1 ? 's' : '') + ' as today’s session'
      : 'Log a set to finish your session';
  }

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // @episode-start:library
  // THE EXERCISE LIBRARY — the whole Vitality Train catalog on one page. It is
  // the front door to your lifts: open it to ADD a lift to today, or SWAP one
  // for another. Search or scroll by muscle group, tap i for a lift's official
  // form card, tap the check to drop it into today's session. Every add writes
  // through the SAME store, so a pick saves the instant you make it, and a lift
  // you removed comes back with its full history — never a duplicate. Type a
  // name that is not in the catalog and it offers to add it as your own.
  const libOverlay = document.getElementById('libOverlay');
  const GROUP_ORDER = [['chest','Chest'],['back','Back'],['shoulders','Shoulders'],['arms','Arms'],['legs','Legs'],['core','Core']];
  let libMode = 'add';        // 'add' | 'swap'
  let libSwapTarget = null;   // the lift being swapped, in swap mode
  function inSession(e){ return LIFTS.some(l => !l.hidden && (l.libKey === e.key || l.name === e.name)); }
  function addFromLibrary(e){
    const existing = LIFTS.find(l => l.libKey === e.key || l.name === e.name);
    if (existing){ if (existing.hidden){ existing.hidden = false; saveLog(); render(); } return; }  // restore, never duplicate
    const d = tierDefaults(e.tier);
    addLift({ name:e.name, tier:e.tier, muscle:e.group, libKey:e.key, perHand:e.equip === 'dumbbell',
      targetSets:d.targetSets, targetReps:d.targetReps, weight:d.weight, history:[], sets:blankSets(d.targetSets) });
    render();
  }
  function removeFromLibrary(e){
    LIFTS.forEach(l => { if (!l.hidden && (l.libKey === e.key || l.name === e.name)) l.hidden = true; });  // soft: history kept
    saveLog(); render();
  }
  // Swap the current slot for a library pick. It is a FRESH movement: keep the
  // weight (adjusted per hand) but start its own history, targets and overload
  // clean, so the graph never shows another lift's data. If that lift is already
  // in your session, don't duplicate it — retire this slot and keep the one you have.
  function clearOverloadStore(id){ try { localStorage.removeItem('vitality.overload.' + id + '.v3'); } catch(e){} }
  function swapForLibrary(entry){
    if (!libSwapTarget) return;
    const dup = LIFTS.find(l => !l.hidden && l.id !== libSwapTarget.id && (l.libKey === entry.key || l.name === entry.name));
    if (dup){ clearOverloadStore(libSwapTarget.id); updateLift(libSwapTarget.id, { hidden: true }); render(); closeLibrary(); return; }
    const d = tierDefaults(entry.tier);
    const newPerHand = entry.equip === 'dumbbell';
    clearOverloadStore(libSwapTarget.id);
    updateLift(libSwapTarget.id, l => {
      let weight = l.weight;
      if (weight != null){
        if (newPerHand && !l.perHand) weight = round05(weight / 2);
        else if (!newPerHand && l.perHand) weight = round05(weight * 2);
      }
      return { name:entry.name, muscle:entry.group, libKey:entry.key, tier:entry.tier, perHand:newPerHand,
        weight, targetSets:d.targetSets, targetReps:d.targetReps, history:[], overload:null, sets: blankSets(d.targetSets) };
    });
    render(); closeLibrary();
  }
  function openLibrary(){ libMode='add'; libSwapTarget=null; buildLibraryShell(); renderLibRows(''); document.body.classList.add('lib-browsing'); libOverlay.classList.add('on'); }
  function openLibrarySwap(lift){ libMode='swap'; libSwapTarget=lift; buildLibraryShell(); renderLibRows(''); document.body.classList.add('lib-browsing'); libOverlay.classList.add('on'); }
  function closeLibrary(){ libOverlay.classList.remove('on'); document.body.classList.remove('lib-browsing'); libMode='add'; libSwapTarget=null; }
  function buildLibraryShell(){
    const swap = libMode === 'swap';
    libOverlay.innerHTML =
      '<svg class="lib-mtn" viewBox="0 0 1200 220" preserveAspectRatio="none" aria-hidden="true">' +
        '<path d="M0 220V150L150 112L330 150L520 96L720 150L900 112L1080 150L1200 122V220Z" fill="#0b1712" opacity=".5"/>' +
        '<path d="M0 220V176L180 142L380 180L560 132L760 180L980 142L1200 176V220Z" fill="#060f0a" opacity=".92"/>' +
      '</svg>' +
      '<div class="lib-wrap">' +
        '<div class="lib-top">' +
          '<button class="lib-back" id="libBack">' + SVG('<path d="M15 5l-7 7 7 7"/>') + (swap ? 'cancel' : 'session') + '</button>' +
          '<span class="lib-sp"></span>' +
          '<span class="lib-count" id="libCount"></span>' +
        '</div>' +
        '<h1 class="lib-title">' + (swap ? 'Swap' : 'Library') + '</h1>' +
        (swap ? '<p class="lib-sub">Pick a replacement for ' + esc(libSwapTarget ? libSwapTarget.name : '') + '. Your weight carries over.</p>' : '') +
        '<div class="lib-search">' + SVG('<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>') +
          '<input id="libSearch" placeholder="Search any exercise..." autocomplete="off"></div>' +
        '<div id="libList"></div>' +
      '</div>';
    document.getElementById('libBack').onclick = closeLibrary;
    const search = document.getElementById('libSearch');
    search.oninput = () => renderLibRows(search.value);
  }
  function renderLibRows(q){
    const raw = (q || '').trim();
    const query = raw.toLowerCase();
    const swap = libMode === 'swap';
    document.getElementById('libCount').innerHTML = swap ? '' : '<b>' + LIFTS.filter(l => !l.hidden).length + '</b> in your session';
    const html = GROUP_ORDER.map(([g, label]) => {
      const items = LIB.filter(e => e.group === g && (!query || e.name.toLowerCase().includes(query) || e.muscles.toLowerCase().includes(query)));
      if (!items.length) return '';
      const rows = items.map(e => {
        const isIn = !swap && inSession(e);
        const control = swap
          ? '<span class="lib-pick">' + SVG('<path d="M4 12h14M13 7l5 5-5 5"/>') + '</span>'
          : '<button class="lib-check' + (isIn ? ' on' : '') + '" data-act="toggle" aria-label="Add or remove">' + SVG('<path d="M5 12l4 4 10-11"/>') + '</button>';
        return '<div class="lib-row' + (swap ? ' pick' : '') + '" data-key="' + e.key + '">' +
          control +
          '<span class="lib-gly">' + SVG(GLYPH[e.group] || GLYPH.chest) + '</span>' +
          '<span class="lib-main"><span class="lib-nm">' + esc(e.name) + '</span></span>' +
          '<button class="lib-i" data-act="info" aria-label="How to do it">i</button>' +
        '</div>';
      }).join('');
      return '<div class="lib-sec"><div class="lib-sec-h"><b>' + label + '</b><span class="lib-sec-n">' + items.length + '</span></div>' + rows + '</div>';
    }).join('');
    // "name your own": type something not in the catalog and it offers to use it
    const exact = LIB.some(e => e.name.toLowerCase() === query);
    const createRow = (raw && !exact)
      ? '<button class="lib-create" id="libCreate">' + SVG('<path d="M12 5v14M5 12h14"/>') + (swap ? 'Swap for' : 'Add') + ' &ldquo;' + esc(raw) + '&rdquo; as your own</button>'
      : '';
    const list = document.getElementById('libList');
    list.innerHTML = createRow + html;
    if (!html && !createRow) list.innerHTML = '<div class="lib-empty">No lifts match that.</div>';
    const create = document.getElementById('libCreate');
    if (create) create.onclick = () => {
      if (swap && libSwapTarget){
        const dupN = LIFTS.find(l => !l.hidden && l.id !== libSwapTarget.id && l.name.toLowerCase() === raw.toLowerCase());
        if (dupN){ clearOverloadStore(libSwapTarget.id); updateLift(libSwapTarget.id, { hidden: true }); render(); closeLibrary(); return; }
        clearOverloadStore(libSwapTarget.id);
        updateLift(libSwapTarget.id, l => ({ name: raw, muscle: guessMuscle(raw) || 'chest', libKey: null, perHand: l.perHand,
          history:[], overload:null, sets: blankSets(l.targetSets) }));
        render(); closeLibrary();
      }
      else { quickAddLift(raw); closeLibrary(); }
    };
    list.querySelectorAll('.lib-row').forEach(row => {
      const e = libByKey[row.dataset.key];
      row.querySelector('[data-act="info"]').onclick = (ev) => { ev.stopPropagation(); openInfo({ name:e.name, tier:e.tier, libKey:e.key }); };
      if (swap){ row.onclick = () => swapForLibrary(e); }
      else { row.querySelector('[data-act="toggle"]').onclick = () => { inSession(e) ? removeFromLibrary(e) : addFromLibrary(e); renderLibRows(document.getElementById('libSearch').value); }; }
    });
  }
  document.addEventListener('keydown', ev => { if (ev.key === 'Escape' && libOverlay.classList.contains('on') && !modal.classList.contains('on')) closeLibrary(); });
  // @episode-end:library

  // ── bottom actions: add a lift (opens the library) + reorder lifts ──
  document.getElementById('libOpen').onclick = openLibrary;
  document.getElementById('reorderBtn').onclick = openReorder;

  // ── snowy particles drifting behind everything ──
  (function snow(){
    const cv = document.getElementById('snow'); if (!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, parts;
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const mk = () => ({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.4, s:Math.random()*0.35+0.08, d:Math.random()*0.3-0.15, o:Math.random()*0.4+0.12 });
    function size(){ W=cv.width=innerWidth; H=cv.height=innerHeight; parts=Array.from({length: reduce?26:54}, mk); }
    function frame(){
      ctx.clearRect(0,0,W,H);
      for (const p of parts){
        p.y += p.s; p.x += p.d;
        if (p.y > H+2){ p.y = -2; p.x = Math.random()*W; }
        if (p.x < -2) p.x = W; if (p.x > W+2) p.x = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.3);
        ctx.fillStyle = 'rgba(167,243,208,' + p.o + ')'; ctx.fill();
      }
      if (!reduce) requestAnimationFrame(frame);
    }
    size(); addEventListener('resize', size); frame();
  })();

  document.querySelectorAll('.unit-opt').forEach(b => b.onclick = () => setUnit(b.dataset.u));
  paintUnitToggle();
  celebratedPrev = currentCelebrating();  // lifts already filled out from saved state shouldn't burst on load
  render();
</script>
</body>
