<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Fuel — Nutrient Inflow + minimal gem bursts</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --mint:#6EE7B7; --mint-soft:#A7F3D0; --fg:#f2f5f3; --muted:rgba(233,239,233,0.45); --border:rgba(255,255,255,0.08); --ease:cubic-bezier(0.16,1,0.3,1); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:radial-gradient(90% 30vh at 50% 0%, rgba(110,231,183,0.08), transparent 70%), linear-gradient(#0a1612,#04060a); padding:32px; font-family:Inter,sans-serif; color:var(--fg); }
  .crumb{ font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .crumb b{ color:var(--mint); }
  .row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .btn{ font:500 11px Inter; color:var(--mint); background:rgba(110,231,183,0.08); border:1px solid rgba(110,231,183,0.25); padding:6px 12px; border-radius:99px; cursor:pointer; }
  .lab{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:14px 0 8px; }
  .stage{ display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }

  .fuel-lg{ width:560px; height:200px; }
  .fuel-sm{ width:340px; height:200px; }

  .tile{ position:relative; border-radius:18px; border:1px solid var(--border); background:rgba(255,255,255,0.02); overflow:hidden; isolation:isolate; }
  .root{ position:absolute; inset:0; overflow:hidden; }
  .base{ position:absolute; inset:0;
    background:
      radial-gradient(circle 40% at 68% 52%, rgba(110,231,183,0.14), transparent 60%),
      linear-gradient(180deg,#07130d 0%,#050d09 55%,#04060a 100%);
    animation:fuelBase 9s ease-in-out infinite; }
  @keyframes fuelBase{ 0%,100%{opacity:.92} 50%{opacity:1} }

  /* core — the orb everything feeds. ~30px, right-of-centre. */
  .core{ position:absolute; left:68%; top:52%; width:30px; height:30px; transform:translate(-50%,-50%); }
  .orb{ position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 50% 42%, #f2fff8, #a7f3d0 38%, #6ee7b7 70%);
    box-shadow:0 0 18px rgba(110,231,183,.75), 0 0 36px rgba(110,231,183,.35);
    animation:coreBreath 4.5s ease-in-out infinite; }
  .halo{ position:absolute; inset:-120%; border-radius:50%;
    background:radial-gradient(circle, rgba(110,231,183,.28), transparent 68%);
    animation:coreHalo 4.5s ease-in-out infinite; }
  @keyframes coreBreath{ 0%,100%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.12);filter:brightness(1.22)} }
  @keyframes coreHalo{ 0%,100%{opacity:.5;transform:scale(.92)} 50%{opacity:.85;transform:scale(1.1)} }
  .core.fed .orb{ animation:coreBreath 4.5s ease-in-out infinite, corePop .7s var(--ease); }
  @keyframes corePop{ 0%{transform:scale(1)} 40%{transform:scale(1.3);filter:brightness(1.5)} 100%{transform:scale(1)} }

  /* steady inflow */
  .field{ position:absolute; inset:0; }
  .p{ position:absolute; width:3px; height:3px; border-radius:50%; background:var(--mint-soft); box-shadow:0 0 5px rgba(167,243,208,.8); opacity:0; animation:inflow var(--dur,5s) cubic-bezier(0.5,0,0.8,1) infinite; animation-delay:var(--delay,0s); }
  @keyframes inflow{ 0%{opacity:0;transform:translate(0,0) scale(1)} 12%{opacity:.9} 78%{opacity:.85} 96%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.4)} 100%{opacity:0} }

  /* ════════ UNPACKAGED GEM BURSTS — minimal + thin, scaled to the ~30px orb.
     The library fires these at 116px ring / 128–150px throw around a big gem;
     here every distance is shrunk to orb scale and strokes/dots are thinned.
     The .burst layer is centred on the core. ════════ */
  .burst{ position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; }

  /* rings — thin expanding mint rings (scaled 116→26px, border 2→1px) */
  .bRing{ position:absolute; width:26px; height:26px; border:1px solid var(--mint); border-radius:50%; opacity:0; animation:bRing 1.5s ease-out forwards; }
  .bRing2{ animation-delay:.15s } .bRing3{ animation-delay:.3s }
  @keyframes bRing{ 0%{transform:scale(0.6);opacity:0;border-width:1px} 12%{opacity:.7} 100%{transform:scale(2.6);opacity:0;border-width:.3px} }

  /* particles — small dots radiate out (throw 128→34px, 2px dots) */
  .bDot{ position:absolute; width:2px; height:2px; border-radius:50%; background:var(--mint); box-shadow:0 0 4px rgba(110,231,183,.7); opacity:0; animation:bDot 1.3s cubic-bezier(0.16,0.84,0.44,1) forwards; --angle:0deg; }
  @keyframes bDot{ 0%{transform:rotate(var(--angle)) translateY(0) scale(.4);opacity:0} 15%{opacity:1} 100%{transform:rotate(var(--angle)) translateY(-34px) scale(.6);opacity:0} }

  /* sparkles — tiny twinkles around the orb perimeter (6→4px) */
  .bSpk{ position:absolute; width:4px; height:4px; border-radius:50%; background:radial-gradient(circle,#fff 0%,var(--mint-soft) 50%,transparent 75%); box-shadow:0 0 6px rgba(167,243,208,.8); opacity:0; animation:bSpk 1.6s ease-out forwards; }
  @keyframes bSpk{ 0%{opacity:0;transform:scale(.3)} 25%{opacity:1;transform:scale(1.2)} 55%{opacity:.5;transform:scale(.8)} 100%{opacity:0;transform:scale(.4)} }

  /* rays — thin starburst shards (40→14px tall, 2→1px wide, throw 150→30px) */
  .bRay{ position:absolute; width:1px; height:14px; background:linear-gradient(to top, transparent, var(--mint), transparent); opacity:0; transform-origin:50% 100%; animation:bRay .72s cubic-bezier(0.12,0.9,0.35,1) forwards; --angle:0deg; }
  @keyframes bRay{ 0%{opacity:0;transform:rotate(var(--angle)) scaleY(.2) translateY(0)} 30%{opacity:.85} 100%{opacity:0;transform:rotate(var(--angle)) scaleY(1) translateY(-30px)} }

  /* confetti — tiny mint dashes fling out + tumble (8→5px, throw 120→32px) */
  .bConf{ position:absolute; width:2px; height:5px; border-radius:1px; background:var(--mint); opacity:0; animation:bConf 1.4s cubic-bezier(0.15,0.75,0.35,1) forwards; --angle:0deg; --dist:32px; }
  @keyframes bConf{ 0%{opacity:0;transform:rotate(var(--angle)) translateY(0) rotate(0)} 20%{opacity:.9} 100%{opacity:0;transform:rotate(var(--angle)) translateY(calc(var(--dist)*-1)) rotate(220deg)} }

  /* orbit — small dots swing round then drift off (radius 20→10 / 70→24) */
  .bOrb{ position:absolute; width:3px; height:3px; border-radius:50%; background:var(--mint-soft); box-shadow:0 0 5px rgba(167,243,208,.7); opacity:0; animation:bOrb 1.8s cubic-bezier(0.3,0,0.3,1) forwards; --angle:0deg; }
  @keyframes bOrb{ 0%{opacity:0;transform:rotate(var(--angle)) translateX(10px) scale(.5)} 25%{opacity:1} 100%{opacity:0;transform:rotate(calc(var(--angle) + 200deg)) translateX(24px) scale(.9)} }

  /* chrome */
  .num{ position:absolute; top:16px; left:20px; z-index:3; font-family:'Instrument Serif',serif; font-style:italic; color:var(--muted); font-size:13px; }
  .sub{ position:absolute; bottom:46px; left:20px; z-index:3; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .lbl{ position:absolute; bottom:16px; left:20px; z-index:3; font-family:'Instrument Serif',serif; font-style:italic; font-size:24px; }
  .arrow{ position:absolute; bottom:20px; right:20px; z-index:3; font-size:17px; opacity:.9; }
  .icon{ position:absolute; top:16px; right:18px; z-index:3; width:28px; height:28px; color:var(--mint); opacity:.8; filter:drop-shadow(0 0 6px rgba(110,231,183,.3)); }
  .icon svg{width:100%;height:100%}
</style></head><body>

<div class="crumb">Fuel · Nutrient Inflow + <b>unpackaged gem bursts</b> (minimal/thin, orb-scale) · fires every 5–15s when fed</div>
<div class="row">
  <span class="lab" style="margin:0 8px 0 0">Fire one:</span>
  <button class="btn" onclick="fireAll('rings')">rings</button>
  <button class="btn" onclick="fireAll('particles')">particles</button>
  <button class="btn" onclick="fireAll('sparkles')">sparkles</button>
  <button class="btn" onclick="fireAll('rays')">rays</button>
  <button class="btn" onclick="fireAll('confetti')">confetti</button>
  <button class="btn" onclick="fireAll('orbit')">orbit</button>
</div>

<div class="lab">Desktop · stacked — auto-fires a random burst every 5–15s</div>
<div class="stage" id="stage"></div>

<template id="t">
  <div class="tile">
    <div class="root">
      <div class="base"></div>
      <div class="field"></div>
      <div class="core"><div class="halo"></div><div class="orb"></div><div class="burst"></div></div>
    </div>
    <span class="icon"><svg viewBox="-12 -12 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M0 -10 C0 -10 -7 -2 -7 3 a7 7 0 0 0 14 0 C7 -2 0 -10 0 -10 Z"/></svg></span>
    <span class="num">·02</span><span class="sub">Macros · Water · Supplements</span><span class="lbl">Fuel</span><span class="arrow">→</span>
  </div>
</template>

<script>
  const KINDS=['rings','particles','sparkles','rays','confetti','orbit'];

  function build(tile){
    const field=tile.querySelector('.field');
    const w=tile.clientWidth,h=tile.clientHeight,cx=w*0.68,cy=h*0.52;
    for(let i=0;i<18;i++){
      const p=document.createElement('span'); p.className='p';
      const ang=Math.random()*Math.PI*2, dist=Math.max(w,h)*(0.55+Math.random()*0.4);
      const sx=cx+Math.cos(ang)*dist, sy=cy+Math.sin(ang)*dist;
      p.style.left=sx+'px'; p.style.top=sy+'px';
      p.style.setProperty('--tx',(cx-sx)*0.96+'px'); p.style.setProperty('--ty',(cy-sy)*0.96+'px');
      const dur=4.5+Math.random()*3.5; p.style.setProperty('--dur',dur+'s'); p.style.setProperty('--delay',(-Math.random()*dur)+'s');
      field.appendChild(p);
    }
  }

  function fire(core,kind){
    const layer=core.querySelector('.burst'); if(!layer) return;
    const add=(cls,n,setup)=>{ for(let i=0;i<n;i++){ const el=document.createElement('span'); el.className=cls; setup&&setup(el,i,n); layer.appendChild(el); setTimeout(()=>el.remove(),2000); } };
    if(kind==='rings'){ add('bRing',1); add('bRing bRing2',1); add('bRing bRing3',1); }
    else if(kind==='particles'){ add('bDot',12,(el,i,n)=>el.style.setProperty('--angle',(360/n*i)+'deg')); }
    else if(kind==='sparkles'){ add('bSpk',10,(el)=>{ const a=Math.random()*Math.PI*2,r=12+Math.random()*8; el.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`; el.style.animationDelay=(Math.random()*0.4)+'s'; }); }
    else if(kind==='rays'){ add('bRay',12,(el,i,n)=>el.style.setProperty('--angle',(360/n*i)+'deg')); }
    else if(kind==='confetti'){ add('bConf',14,(el,i,n)=>{ el.style.setProperty('--angle',(360/n*i+Math.random()*16)+'deg'); el.style.setProperty('--dist',(26+Math.random()*14)+'px'); }); }
    else if(kind==='orbit'){ add('bOrb',8,(el,i,n)=>el.style.setProperty('--angle',(360/n*i)+'deg')); }
    // happy pop
    core.classList.add('fed'); setTimeout(()=>core.classList.remove('fed'),700);
  }
  function fireAll(kind){ document.querySelectorAll('.core').forEach(c=>fire(c,kind)); }

  let lastKind=null;
  function scheduleFeed(core){
    const next=5000+Math.random()*10000;
    setTimeout(()=>{
      let k=KINDS[Math.floor(Math.random()*KINDS.length)];
      if(k===lastKind) k=KINDS[(KINDS.indexOf(k)+1)%KINDS.length];
      lastKind=k; fire(core,k); scheduleFeed(core);
    }, next);
  }

  function r(){
    const s=document.getElementById('stage'); s.innerHTML='';
    ['fuel-lg','fuel-sm'].forEach(cls=>{ const n=document.getElementById('t').content.cloneNode(true); n.querySelector('.tile').classList.add(cls); s.appendChild(n); });
    requestAnimationFrame(()=>document.querySelectorAll('.tile').forEach(tile=>{
      build(tile);
      const core=tile.querySelector('.core');
      setTimeout(()=>fire(core, KINDS[Math.floor(Math.random()*KINDS.length)]), 1500+Math.random()*1500); // quick first one
      scheduleFeed(core);
    }));
  }
  r();
</script>
</body></html>
