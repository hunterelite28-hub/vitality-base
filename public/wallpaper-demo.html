<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wallpaper picker</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#fff;font-family:Inter,sans-serif;min-height:100vh;overflow:hidden}
  /* WelcomeBackdrop.module.css — world, tinted to --wall-accent */
  .world{--wall-accent:#F5B044}
  .atmosphere{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      radial-gradient(60% 50% at 50% 30%, color-mix(in srgb, var(--wall-accent,#6EE7B7) 16%, transparent) 0%, color-mix(in srgb, var(--wall-accent,#6EE7B7) 6%, transparent) 32%, transparent 65%),
      radial-gradient(28% 22% at 50% 38%, rgba(255,226,181,.07) 0%, rgba(255,226,181,0) 70%),
      radial-gradient(120% 80% at 50% 100%, rgba(14,38,30,.5) 0%, rgba(4,6,10,.95) 75%);
    background-repeat:no-repeat;background-size:100% 100%}
  .mountainsLayer{position:fixed;left:0;right:0;bottom:0;z-index:1;height:30vh;min-height:180px;opacity:.8}
  .mountainsLayer svg{width:100%;height:100%;display:block}
  .particles span{position:absolute;width:1.6px;height:1.6px;background:rgba(233,239,233,.8);border-radius:50%;
    box-shadow:0 0 6px color-mix(in srgb, var(--wall-accent,#a7f3d0) 55%, transparent)}
  .greeting{position:relative;z-index:5;padding:48px 40px;font-family:'Instrument Serif';font-style:italic;font-size:36px}
  .greeting b{color:var(--wall-accent)}
  /* wallpaper panel */
  .wallScrim{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:20px;background:rgba(0,0,0,.18)}
  .wallPanel{width:min(620px,100%);border:1px solid rgba(255,255,255,.16);background:rgba(10,11,13,.92);backdrop-filter:blur(14px);border-radius:20px;padding:20px;box-shadow:0 30px 80px -20px rgba(0,0,0,.8)}
  .wallHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .wallHead h3{font-family:'Instrument Serif';font-style:italic;font-size:24px}
  .wallClose{border:1px solid rgba(255,255,255,.16);background:none;color:#fff;border-radius:999px;padding:8px 18px;font-size:13px;cursor:pointer}
  .chips{display:flex;gap:8px;margin-bottom:14px}
  .chip{border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.5);border-radius:999px;padding:6px 14px;font-size:12.5px;cursor:pointer}
  .chip.on{background:#6EE7B7;color:#04130d;font-weight:600}
  .ctl{margin-top:16px}.k{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:9px}
  .swatches{display:flex;gap:10px}.sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent}.sw.on{border-color:#fff}
  .range{width:100%;accent-color:#6EE7B7}
  .sizes{display:flex;gap:8px}.seg{border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.5);border-radius:9px;padding:8px 13px;font-size:12.5px;cursor:pointer}.seg.on{background:#6EE7B7;color:#04130d;font-weight:600}
</style></head>
<body>
<div class="world">
  <div class="atmosphere"></div>
  <div class="mountainsLayer"><svg viewBox="0 0 1600 420" preserveAspectRatio="none">
    <defs><linearGradient id="f" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1a17" stop-opacity="0"/><stop offset="55%" stop-color="#0d1a17" stop-opacity=".55"/><stop offset="100%" stop-color="#0d1a17" stop-opacity=".95"/></linearGradient>
    <linearGradient id="n" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050a09" stop-opacity=".4"/><stop offset="100%" stop-color="#050a09" stop-opacity="1"/></linearGradient></defs>
    <path d="M0,300 L120,230 L210,260 L320,180 L430,220 L560,150 L680,210 L820,170 L960,220 L1100,180 L1240,240 L1380,200 L1500,250 L1600,220 L1600,420 L0,420 Z" fill="url(#f)"/>
    <path d="M0,360 L100,320 L220,340 L340,290 L460,330 L590,300 L720,340 L860,310 L1000,350 L1140,310 L1280,355 L1420,320 L1540,360 L1600,340 L1600,420 L0,420 Z" fill="url(#n)"/>
  </svg></div>
  <div class="particles" id="p"></div>
  <div class="greeting">Good afternoon, <b>Luke</b></div>
</div>
<div class="wallScrim"><div class="wallPanel">
  <div class="wallHead"><h3>Your wallpaper</h3><span class="wallClose">Done</span></div>
  <div class="chips"><span class="chip on">World</span><span class="chip">Gradient</span><span class="chip">Solid</span></div>
  <div class="ctl"><div class="k">Accent</div><div class="swatches"><span class="sw" style="background:#6EE7B7"></span><span class="sw" style="background:#6EA8FF"></span><span class="sw" style="background:#CFE9FF"></span><span class="sw on" style="background:#F5B044"></span><span class="sw" style="background:#B794F6"></span><span class="sw" style="background:#F49AC2"></span></div></div>
  <div class="ctl"><div class="k">Particles · 24</div><input class="range" type="range" min="0" max="50" value="24"/></div>
  <div class="ctl"><div class="k">Mountains</div><div class="sizes"><span class="seg on">On</span><span class="seg">Off</span></div></div>
  <div class="ctl"><div class="k">Drift</div><div class="sizes"><span class="seg">Calm</span><span class="seg on">Normal</span><span class="seg">Lively</span></div></div>
</div></div>
<script>
const p=document.getElementById('p');
for(let i=0;i<24;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.top=20+Math.random()*70+'%';p.appendChild(s)}
</script>
</body></html>
