<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tune final check</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--fg:#fff;--mint:#6EE7B7;--muted:rgba(255,255,255,.5);--muted-strong:rgba(255,255,255,.7);
--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.16);--bg-elevated:#0a0a0a;
--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--radius-lg:12px;--radius-pill:999px;
--text-xs:.75rem;--text-sm:.875rem;--text-2xl:1.75rem;--font-serif:'Instrument Serif',Georgia,serif;--font-mono:'JetBrains Mono',monospace;
--duration:180ms;--ease:cubic-bezier(.2,.8,.2,1);}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060a;min-height:100vh;display:grid;place-items:center;font-family:Inter,sans-serif;color:var(--fg);padding:40px;
background-image:radial-gradient(90% 30vh at 50% 0%,rgba(110,231,183,.12),transparent 70%)}
.sheet{width:100%;max-width:440px;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-5)}
.head{display:flex;flex-direction:column;gap:var(--space-2)}
.eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mint);font-weight:600}
.title{font-family:var(--font-serif);font-style:italic;font-size:var(--text-2xl);line-height:1.1}
.form{display:flex;flex-direction:column}
.row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding:var(--space-4) 0;border-top:1px solid var(--border)}
.row:first-of-type{border-top:none}
.rowLeft{display:flex;align-items:center;gap:var(--space-3);min-width:0}
.rowIcon{width:16px;height:16px;flex-shrink:0;color:var(--muted)}
.rowLabel{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.16em;text-transform:uppercase;color:var(--muted-strong)}
.ctl{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0}
.step{width:28px;height:32px;background:transparent;border:none;color:rgba(255,255,255,.3);font-size:1.2rem;line-height:1;cursor:pointer;transition:color var(--duration) var(--ease)}
.step:hover{color:var(--mint)}
.num{width:80px;background:transparent;border:none;border-bottom:1.5px solid transparent;color:var(--fg);font-family:var(--font-serif);font-size:var(--text-2xl);font-variant-numeric:tabular-nums;text-align:center;outline:none;padding-bottom:2px;-moz-appearance:textfield;appearance:textfield;transition:border-color var(--duration) var(--ease)}
.num:focus{border-bottom-color:var(--mint)}
.num::-webkit-outer-spin-button,.num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.restVal{min-width:80px;text-align:center;color:var(--fg);font-family:var(--font-serif);font-size:var(--text-2xl);font-variant-numeric:tabular-nums}
.unit{color:var(--muted);font-family:var(--font-mono);font-size:.6rem;letter-spacing:.06em;text-transform:lowercase}
.foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding-top:var(--space-5);margin-top:var(--space-2)}
.tip{font-family:var(--font-mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.actions{display:flex;gap:var(--space-3)}
.btn{font-size:var(--text-sm);font-weight:600;text-transform:lowercase;letter-spacing:.05em;padding:var(--space-3) var(--space-5);border-radius:var(--radius-pill);cursor:pointer;border:1px solid transparent}
.cancelBtn{background:transparent;border-color:var(--border-strong);color:var(--muted-strong)}
.saveBtn{background:var(--mint);color:#000}
</style></head><body>
<div class="sheet">
  <div class="head"><span class="eyebrow">TUNE · HEAVY DAY</span><h2 class="title">Barbell bench</h2></div>
  <form class="form" onsubmit="return false">
    <div class="row"><span class="rowLeft"><svg class="rowIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6M7 7.5v9M17 7.5v9M20 9v6M7 12h10"/></svg><span class="rowLabel">Weight</span></span>
      <div class="ctl"><input class="num" value="102.5"><span class="unit">kg</span></div></div>
    <div class="row"><span class="rowLeft"><svg class="rowIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 20 7 12 11 4 7Z"/><path d="M4 12 12 16 20 12"/><path d="M4 17 12 21 20 17"/></svg><span class="rowLabel">Sets</span></span>
      <div class="ctl"><button class="step">−</button><input class="num" value="4"><button class="step">+</button></div></div>
    <div class="row"><span class="rowLeft"><svg class="rowIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l3 3-3 3"/><path d="M20 6H9a5 5 0 0 0-5 5"/><path d="M7 21l-3-3 3-3"/><path d="M4 18h11a5 5 0 0 0 5-5"/></svg><span class="rowLabel">Reps</span></span>
      <div class="ctl"><button class="step">−</button><input class="num" value="6"><button class="step">+</button></div></div>
    <div class="row"><span class="rowLeft"><svg class="rowIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M12 13l3 2M9 3h6"/></svg><span class="rowLabel">Rest</span></span>
      <div class="ctl"><button class="step">−</button><span class="restVal">3:30</span><button class="step">+</button></div></div>
    <div class="foot"><span class="tip">tap a number to type</span><div class="actions"><button class="btn cancelBtn">cancel</button><button class="btn saveBtn">save</button></div></div>
  </form>
</div>
</body></html>
