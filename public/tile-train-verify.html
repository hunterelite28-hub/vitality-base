<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Train — one SVG, dots welded to the line</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --mint:#6EE7B7; --mint-soft:#A7F3D0; --fg:#f2f5f3; --muted:rgba(233,239,233,0.45); --border:rgba(255,255,255,0.08); --ease:cubic-bezier(0.16,1,0.3,1); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:radial-gradient(90% 30vh at 50% 0%, rgba(110,231,183,0.08), transparent 70%), linear-gradient(#0a1612,#04060a); padding:32px; font-family:Inter,sans-serif; color:var(--fg); }
  .crumb{ font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .crumb b{ color:var(--mint); }
  .btn{ font:500 12px Inter; color:var(--mint); background:rgba(110,231,183,0.08); border:1px solid rgba(110,231,183,0.25); padding:6px 14px; border-radius:99px; cursor:pointer; margin-bottom:18px; }
  .lab{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:18px 0 8px; }
  .stage{ display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }

  /* real live Train-tile sizes (it's the big 2-row cell) */
  .train-lg{ width:575px; height:432px; }
  .train-md{ width:470px; height:340px; }
  .train-sm{ width:330px; height:300px; }

  .tile{ position:relative; border-radius:18px; border:1px solid var(--border); background:#060a08; overflow:hidden; isolation:isolate; }
  .root{ position:absolute; inset:0; overflow:hidden; }
  .base{ position:absolute; inset:-8%;
    background:
      radial-gradient(ellipse 52% 50% at 32% 44%, rgba(110,231,183,0.30), transparent 62%),
      radial-gradient(ellipse 48% 52% at 78% 64%, rgba(40,120,90,0.32), transparent 68%),
      linear-gradient(155deg,#0b1a14 0%,#060d0a 60%,#040806 100%);
    transform-origin:50% 50%; animation:base 9s ease-in-out infinite; }
  @keyframes base{ 0%,100%{transform:scale(1.02);opacity:.92} 50%{transform:scale(1.05);opacity:1} }

  /* THE FIX: the band's aspect-ratio EXACTLY equals the SVG viewBox ratio
     (400/150), so the single SVG scales UNIFORMLY — no stretch. Everything
     (contours, trend line, AND the dots) lives in that ONE SVG in the SAME
     coordinate space, so dots are welded to the line and can never drift or
     render half-off. preserveAspectRatio is the default (meet) → round dots. */
  .graph{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
          width:86%; aspect-ratio:400/150; max-height:62%; }
  .graph svg{ width:100%; height:100%; display:block; overflow:visible; }

  .contour{ fill:none; stroke:rgba(110,231,183,0.20); stroke-width:1.3; stroke-linecap:round;
            filter:drop-shadow(0 0 3px rgba(110,231,183,0.25));
            stroke-dasharray:100; stroke-dashoffset:100; animation:draw 3s var(--ease) forwards; }
  .contourB{ stroke-opacity:.7; animation-delay:.25s; }
  @keyframes draw{ to{stroke-dashoffset:0} }

  /* one solid mint line with a clean technical glow (hero language) */
  .trend{ fill:none; stroke:var(--mint); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;
          stroke-dasharray:100; stroke-dashoffset:100;
          animation:trend 5s 3.1s cubic-bezier(0.45,0,0.25,1) forwards, glow 7s 8.2s ease-in-out infinite;
          filter:drop-shadow(0 0 4px rgba(110,231,183,0.7)); }
  @keyframes trend{ from{stroke-dashoffset:100} to{stroke-dashoffset:0} }
  @keyframes glow{ 0%,100%{filter:drop-shadow(0 0 3px rgba(110,231,183,.55))} 50%{filter:drop-shadow(0 0 7px rgba(110,231,183,.85))} }

  /* dots = SVG circles at the EXACT line vertices. fade in L→R, then stay. */
  .dot{ fill:rgba(110,231,183,0.6); opacity:0; transform-box:fill-box; transform-origin:center;
        animation:dotIn .6s var(--ease) forwards; }
  .dotPeak{ fill:var(--mint-soft); filter:drop-shadow(0 0 4px rgba(167,243,208,0.8));
            animation:dotIn .6s var(--ease) forwards, peak 7s 8.2s ease-in-out infinite; }
  @keyframes dotIn{ from{opacity:0; transform:scale(.4)} to{opacity:.9; transform:scale(1)} }
  @keyframes peak{ 0%,100%{filter:drop-shadow(0 0 3px rgba(167,243,208,.5))} 50%{filter:drop-shadow(0 0 7px rgba(167,243,208,.9))} }

  .icon{ position:absolute; top:18px; right:20px; width:32px; height:32px; color:var(--mint); opacity:.8; filter:drop-shadow(0 0 6px rgba(110,231,183,.3)); }
  .num{ position:absolute; top:16px; left:20px; font-family:'Instrument Serif',serif; font-style:italic; color:var(--muted); font-size:13px; }
  .sub{ position:absolute; bottom:46px; left:20px; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .lbl{ position:absolute; bottom:16px; left:20px; font-family:'Instrument Serif',serif; font-style:italic; font-size:24px; }
  .arrow{ position:absolute; bottom:20px; right:20px; font-size:17px; opacity:.9; }
</style></head><body>

<div class="crumb">Train — <b>one SVG, dots welded to the line</b> · dots are circles at the exact vertices, so they can never drift or render half-off</div>
<button class="btn" onclick="r()">↺ Replay</button>

<div class="lab">Desktop one-screen · smaller laptop · tablet stack — identical composition, dots always on the line</div>
<div class="stage" id="stage"></div>

<template id="t">
  <div class="tile">
    <div class="root">
      <div class="base"></div>
      <div class="graph">
        <svg viewBox="0 0 400 150" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="g" x1="0" y1="1" x2="1" y2="0">
              <stop offset="0" stop-color="#34d399"/><stop offset=".55" stop-color="#6ee7b7"/><stop offset="1" stop-color="#a7f3d0"/>
            </linearGradient>
          </defs>
          <!-- contour top + bottom -->
          <path class="contour"  d="M-10,40 C100,35 180,32 230,27 S360,18 410,15" pathLength="100"/>
          <path class="contour contourB" d="M-10,140 C100,137 180,134 230,129 S360,121 410,118" pathLength="100"/>
          <!-- main trend line: one solid glowing mint stroke -->
          <path class="trend" d="M10,118 L56,110 L102,114 L148,96 L196,100 L244,78 L292,82 L340,60 L390,46" pathLength="100"/>
          <!-- dots: EXACT same coords as the trend vertices -->
          <circle class="dot" cx="10"  cy="118" r="3" style="animation-delay:.30s"/>
          <circle class="dot" cx="56"  cy="110" r="3" style="animation-delay:.62s"/>
          <circle class="dot" cx="102" cy="114" r="3" style="animation-delay:.94s"/>
          <circle class="dot" cx="148" cy="96"  r="3" style="animation-delay:1.26s"/>
          <circle class="dot" cx="196" cy="100" r="3" style="animation-delay:1.58s"/>
          <circle class="dot" cx="244" cy="78"  r="3" style="animation-delay:1.90s"/>
          <circle class="dot" cx="292" cy="82"  r="3" style="animation-delay:2.22s"/>
          <circle class="dot" cx="340" cy="60"  r="3" style="animation-delay:2.54s"/>
          <circle class="dot dotPeak" cx="390" cy="46" r="4" style="animation-delay:2.84s"/>
        </svg>
      </div>
    </div>
    <span class="icon"><svg viewBox="-12 -12 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="-10" y="-3" width="2.8" height="6" rx="0.6" stroke-width="1.3"/><rect x="7.2" y="-3" width="2.8" height="6" rx="0.6" stroke-width="1.3"/><line x1="-7.2" y1="0" x2="7.2" y2="0" stroke-width="1.3"/></svg></span>
    <span class="num">·01</span><span class="sub">Workouts · Progress · Wearables</span><span class="lbl">Train</span><span class="arrow">→</span>
  </div>
</template>

<script>
  const sizes=['train-lg','train-md','train-sm'];
  const tpl=document.getElementById('t');
  function r(){
    const s=document.getElementById('stage'); s.innerHTML='';
    sizes.forEach((cls,idx)=>{
      const node=tpl.content.cloneNode(true);
      node.querySelector('.tile').classList.add(cls);
      s.appendChild(node);
    });
  }
  r(); window.r=r;
</script>
</body></html>
