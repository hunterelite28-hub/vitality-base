<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<title>The Vitals kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{ --bg:#000000; --ink:#ffffff; --ink-faint:rgba(255,255,255,.4); --accent:#5e9bff; --accent-hi:#8db8ff;
  --serif:'Instrument Serif',Georgia,serif; --mono:'JetBrains Mono',monospace; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg); color:var(--ink); font-family:var(--mono); display:flex; flex-direction:column; overflow:hidden}
.bar{display:flex; align-items:center; gap:14px; padding:11px 16px; border-bottom:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg, rgba(94,155,255,.07), transparent); flex:none}
.brand{font-family:var(--serif); font-style:italic; font-size:1.05rem; margin-right:6px}
.brand b{color:var(--accent-hi); font-style:normal; font-weight:400}
.tabs{display:flex; gap:8px; flex-wrap:wrap}
.tab{font-family:var(--mono); font-size:.62rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint);
  background:transparent; border:1px solid transparent; border-radius:999px; padding:7px 14px; cursor:pointer; transition:.18s}
.tab:hover{color:var(--accent-hi)}
.tab.on{color:#06122b; background:var(--accent); border-color:var(--accent)}
.hint{margin-left:auto; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint)}
.stage{flex:1; position:relative}
iframe{position:absolute; inset:0; width:100%; height:100%; border:0; background:var(--bg)}
.hidden{display:none}
@media (max-width:600px){ .hint{display:none} }
</style>
</head>
<body>
<div class="bar">
  <span class="brand">The <b>Vitals</b> kit</span>
  <div class="tabs">
    <button class="tab on" id="t1" onclick="show(1)">Page 1 · Readings</button>
    <button class="tab" id="t2" onclick="show(2)">Page 2 · Goal</button>
    <button class="tab" id="t5" onclick="show(5)">Page 2.5 · Your signal</button>
    <button class="tab" id="t3" onclick="show(3)">Page 3 · Connect</button>
    <button class="tab" id="t4" onclick="show(4)">Page 4 · UI kit</button>
  </div>
  <span class="hint" id="hint">the daily readout — sibling to the Vee page, in azure</span>
</div>
<div class="stage">
  <iframe id="f1" src="vitals-readings-kit.html" title="Vitals readings"></iframe>
  <iframe id="f2" class="hidden" src="vitals-goal-kit.html" title="Vitals goal" loading="lazy"></iframe>
  <iframe id="f3" class="hidden" src="vitals-connect-kit.html" title="Vitals connect" loading="lazy"></iframe>
  <iframe id="f4" class="hidden" src="vitals-ui-kit.html" title="Vitals UI kit" loading="lazy"></iframe>
  <iframe id="f5" class="hidden" src="vitals-signals-kit.html" title="Vitals signal" loading="lazy"></iframe>
</div>
<script>
const HINTS = { 1:'the daily readout — sibling to the Vee page, in azure', 2:'pick one goal, sized to you, judged on your 7-day average', 5:'the fused personal metric — WHOOP + Train + Fuel + Vee, oriented to your goal', 3:'connect a band, plus the shared building blocks', 4:'the design system — palette, type, every component' };
function show(n){
  for (const i of [1,2,3,4,5]) {
    document.getElementById('f'+i).classList.toggle('hidden', n!==i);
    document.getElementById('t'+i).classList.toggle('on', n===i);
  }
  document.getElementById('hint').textContent = HINTS[n];
}
</script>
</body>
</html>
