<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vee tab · goals presence revamp</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --iris:#a78bfa; --iris-hi:#c4b5fd; --iris-glow:rgba(167,139,250,.42); --iris-deep:#241b46;
    --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.72);
    --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16);
    --card:rgba(255,255,255,.02); --card-elevated:rgba(255,255,255,.04);
    --serif:'Instrument Serif',Georgia,serif; --sans:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
    --ease:cubic-bezier(.16,1,.3,1); --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box}
  body{margin:0;background:#000;color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(60% 30% at 50% -6%, rgba(167,139,250,.1), transparent 70%);
    padding:2rem 1.25rem 5rem;}
  .shell{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
  .stateLbl{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:1.5rem 0 .1rem}

  /* section eyebrow — V mark + label, matches the Vee tab */
  .eyebrow{display:flex;align-items:center;gap:.7rem;margin-bottom:.2rem}
  .vmark{display:inline-flex;color:var(--iris)}
  .eyebrowLbl{font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-strong)}
  .eyebrowRule{flex:1;height:1px;background:linear-gradient(90deg,rgba(167,139,250,.3),transparent)}
  .open{font-family:var(--mono);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--iris);text-decoration:none;display:inline-flex;align-items:center;gap:5px}

  /* ── EMPTY STATE — cozy invitation, not a dotted box ── */
  .invite{position:relative;overflow:hidden;border:1px solid rgba(167,139,250,.28);border-radius:18px;
    padding:1.6rem 1.5rem;background:radial-gradient(120% 120% at 0% 0%, rgba(167,139,250,.1), transparent 60%), var(--card-elevated);
    box-shadow:0 0 70px -36px var(--iris-glow);display:flex;align-items:center;gap:1.1rem;
    animation:rise .6s var(--ease) both}
  /* soft breathing aura behind it */
  .invite::before{content:"";position:absolute;inset:-40% -10% auto auto;width:60%;height:160%;border-radius:50%;
    background:radial-gradient(circle, rgba(167,139,250,.16), transparent 70%);filter:blur(8px);
    animation:breathe 5.5s var(--ease) infinite;pointer-events:none}
  .inviteGlyph{flex:0 0 auto;width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;
    color:var(--iris);border:1px solid rgba(167,139,250,.34);background:rgba(167,139,250,.07);position:relative;z-index:1;
    animation:floaty 4.5s var(--ease) infinite}
  .inviteBody{flex:1;min-width:0;position:relative;z-index:1;display:flex;flex-direction:column;gap:.55rem}
  .invitePrompt{font-family:var(--serif);font-style:italic;font-size:1.4rem;line-height:1.2;margin:0;color:#fff}
  .inviteAdd{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;min-height:42px;
    font-family:var(--sans);font-size:.9rem;font-weight:500;padding:9px 16px;border-radius:999px;
    color:#000;background:var(--iris);border:none;cursor:pointer;box-shadow:0 0 24px -6px var(--iris-glow);
    transition:transform .15s var(--spring),background .2s var(--ease)}
  .inviteAdd:hover{background:var(--iris-hi);transform:translateY(-1px)}
  .inviteAdd:active{transform:scale(.97)}

  /* ── POPULATED — goals that pop, part of the Vee world ── */
  .rows{display:flex;flex-direction:column;gap:.6rem}
  .goal{position:relative;overflow:hidden;border:1px solid rgba(167,139,250,.24);border-radius:16px;
    padding:1rem 1.1rem;background:radial-gradient(130% 120% at 0% 0%, rgba(167,139,250,.08), transparent 58%), var(--card);
    box-shadow:0 0 0 1px rgba(167,139,250,.05), 0 0 50px -30px var(--iris-glow);
    display:flex;align-items:center;gap:1rem;text-decoration:none;color:inherit;
    transition:border-color .2s var(--ease),transform .14s var(--ease);animation:rise .55s var(--ease) both}
  .goal:hover{border-color:rgba(167,139,250,.5);transform:translateY(-1px)}
  .goal:nth-child(2){animation-delay:.07s}
  .goalIcon{flex:0 0 auto;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    color:var(--iris);border:1px solid rgba(167,139,250,.34);background:rgba(167,139,250,.08)}
  .goalBody{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .goalCat{font-family:var(--mono);font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--iris)}
  .goalTitle{font-family:var(--serif);font-style:italic;font-size:1.22rem;line-height:1.15;color:#fff;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .goalMeta{font-family:var(--mono);font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .pips{flex:0 0 auto;display:inline-flex;align-items:flex-end;gap:3px;height:18px}
  .pip{width:4px;border-radius:2px;background:rgba(255,255,255,.1)}
  .pipOn{background:var(--iris);box-shadow:0 0 7px var(--iris-glow)}

  @keyframes rise{0%{opacity:0;transform:translateY(12px) scale(.99)}60%{opacity:1}100%{opacity:1;transform:none}}
  @keyframes breathe{0%,100%{opacity:.5;transform:scale(.95)}50%{opacity:1;transform:scale(1.08)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="shell">

  <div class="stateLbl">— in the Vee tab, when you have no goals yet —</div>
  <div class="eyebrow"><span class="vmark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l7 11 7-11"/></svg></span><span class="eyebrowLbl">Your goals</span><span class="eyebrowRule"></span></div>
  <div class="invite">
    <span class="inviteGlyph" id="ig"></span>
    <div class="inviteBody">
      <p class="invitePrompt">What are you working toward?</p>
      <button class="inviteAdd"><svg width="16" height="16" viewBox="-12 -12 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M0 -8 V8 M-8 0 H8"/></svg>Set your first goal</button>
    </div>
  </div>

  <div class="stateLbl">— when you have goals (each tagged + cleaned by the triage) —</div>
  <div class="eyebrow"><span class="vmark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l7 11 7-11"/></svg></span><span class="eyebrowLbl">Your goals</span><span class="eyebrowRule"></span><a class="open" href="#">Open<svg width="11" height="11" viewBox="-12 -12 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M-7 0 H7 M2 -5 L7 0 L2 5"/></svg></a></div>
  <div class="rows" id="rows"></div>

</div>

<script>
  const I = {
    fitness:'<path d="M-9 -4 V4 M9 -4 V4 M-9 0 H9 M-6 -6 V6 M6 -6 V6"/>',
    audience:'<circle cx="-4" cy="0" r="2.2"/><path d="M1 -6 a8 8 0 0 1 0 12 M4 -9 a12 12 0 0 1 0 18"/>',
    spark:'<path d="M0 -9 L2 -2 L9 0 L2 2 L0 9 L-2 2 L-9 0 L-2 -2 Z"/>',
  };
  function svg(p,w){ w=w||22; return '<svg width="'+w+'" height="'+w+'" viewBox="-12 -12 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>'; }
  document.getElementById('ig').innerHTML = svg(I.spark,24);

  const GOALS = [
    { cat:'Fitness', icon:'fitness', title:'3-plate bench press', meta:'by Dec 17', prio:2 },
    { cat:'Audience', icon:'audience', title:'Reach 1,000 subscribers', meta:'by Sep 1', prio:3 },
  ];
  document.getElementById('rows').innerHTML = GOALS.map(g => {
    const pips = [1,2,3].map(i => '<span class="pip '+(i<=g.prio?'pipOn':'')+'" style="height:'+(7+i*4)+'px"></span>').join('');
    return '<a class="goal" href="#"><span class="goalIcon">'+svg(I[g.icon])+'</span>'+
      '<div class="goalBody"><span class="goalCat">'+g.cat+'</span><span class="goalTitle">'+g.title+'</span><span class="goalMeta">'+g.meta+'</span></div>'+
      '<span class="pips">'+pips+'</span></a>';
  }).join('');
</script>
</body>
</html>
