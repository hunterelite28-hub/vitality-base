<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cardio icons — v2</title>
<style>
  :root{
    --bg:#000; --mint:#6EE7B7; --fg:#f5f5f5;
    --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.7);
    --rule:rgba(255,255,255,.08);
    --text-xs:.75rem; --text-sm:.875rem; --text-2xl:1.75rem;
    --font-serif:'Times New Roman',Georgia,serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; padding:36px 0 80px}
  ::selection{background:rgba(110,231,183,.3)}
  .wrap{max-width:600px; margin:0 auto; padding:0 22px}
  .h-eyebrow{font-size:var(--text-xs); letter-spacing:.2em; text-transform:uppercase; color:var(--muted); text-align:center}
  .h-title{font-family:var(--font-serif); font-style:italic; font-size:1.7rem; text-align:center; margin:5px 0 4px}
  .h-sub{text-align:center; color:var(--muted); font-size:var(--text-sm); margin:0 auto 36px; max-width:420px; line-height:1.5}

  .group{border-top:1px solid var(--rule); padding-top:22px; margin-bottom:34px}
  .group-name{font-family:var(--font-serif); font-style:italic; font-size:var(--text-2xl); margin:0 0 16px}
  .opts{display:flex; gap:22px; flex-wrap:wrap}
  .opt{display:flex; flex-direction:column; align-items:center; gap:10px}
  .opt .label{font-size:var(--text-xs); letter-spacing:.12em; text-transform:uppercase; color:var(--mint)}
  .pair{display:flex; align-items:center; gap:12px}
  .chip{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;color:var(--mint);background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2)}
  .big{width:72px;height:72px;border-radius:20px;display:grid;place-items:center;color:var(--mint);background:rgba(110,231,183,.06);border:1px solid rgba(110,231,183,.16)}

  .ref .chip{opacity:.9}
  .ref-row{display:flex; gap:24px; flex-wrap:wrap; align-items:center}
  .ref-item{display:flex; flex-direction:column; align-items:center; gap:7px}
  .ref-item .label{font-size:.625rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-strong)}
</style>
</head>
<body>
<div class="wrap">
  <div class="h-eyebrow">SplitLog · cardio icons · v2</div>
  <h1 class="h-title">Simpler, cleaner</h1>
  <p class="h-sub">Walk, incline walk and elliptical, redrawn to match the abstract style of the keepers (run = chevrons, stairs = stepped line). Three clean options each. Pick one per row, e.g. "walk A, incline A, elliptical B".</p>

  <div id="groups"></div>

  <div class="group ref">
    <h2 class="group-name">The keepers — match this feel</h2>
    <div class="ref-row" id="refRow"></div>
  </div>
</div>

<script>
  function svg(inner,size){size=size||22;return '<svg viewBox="0 0 24 24" width="'+size+'" height="'+size+'" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';}

  const GROUPS = [
    { name:'Walk', options:[
      { label:'A · footprints', inner:'<ellipse cx="9" cy="9" rx="2" ry="3"/><ellipse cx="9" cy="13.4" rx="1.1" ry="0.8"/><ellipse cx="15" cy="13" rx="2" ry="3"/><ellipse cx="15" cy="17.4" rx="1.1" ry="0.8"/>' },
      { label:'B · simple figure', inner:'<circle cx="13" cy="4.6" r="1.6"/><path d="M13 6.4 L11.4 12"/><path d="M11.4 12 L8.6 18"/><path d="M11.4 12 L14 15.6 L14.3 18.6"/><path d="M12.1 8.4 L14.8 10.1"/>' },
      { label:'C · mid-stride', inner:'<circle cx="11.5" cy="4.4" r="1.6"/><path d="M11.5 6.2 L11 11.2"/><path d="M11 11.2 L8.4 17.6"/><path d="M11 11.2 L13.6 15 L13.2 18.6"/><path d="M11.2 7.9 L8.8 9.9"/><path d="M11.2 7.9 L13.7 9.6"/>' },
    ]},
    { name:'Incline walk', options:[
      { label:'A · ramp', inner:'<path d="M4 19 L20 19"/><path d="M4 19 L18 6.5"/>' },
      { label:'B · up arrow', inner:'<path d="M5 18.5 L18.5 6"/><path d="M18.5 6 L12.5 6.3"/><path d="M18.5 6 L18.2 12"/>' },
      { label:'C · steps uphill', inner:'<path d="M4 20 L20 8" opacity="0.5"/><ellipse cx="9" cy="14.2" rx="1.5" ry="2.1" transform="rotate(-37 9 14.2)"/><ellipse cx="14.5" cy="10.2" rx="1.5" ry="2.1" transform="rotate(-37 14.5 10.2)"/>' },
    ]},
    { name:'Elliptical', options:[
      { label:'A · ellipse', inner:'<ellipse cx="12" cy="12" rx="8" ry="4.4" transform="rotate(-20 12 12)"/>' },
      { label:'B · ellipse + pedals', inner:'<ellipse cx="12" cy="12" rx="7.6" ry="4.2" transform="rotate(-20 12 12)"/><path d="M6.4 15.4 L5.2 18.4"/><path d="M17.6 8.6 L18.8 5.6"/>' },
      { label:'C · glide arcs', inner:'<path d="M4 13.5 C8 8.5 16 8.5 20 13.5"/><path d="M4 13.5 C8 18.5 16 18.5 20 13.5"/><circle cx="4" cy="13.5" r="0.9"/><circle cx="20" cy="13.5" r="0.9"/>' },
    ]},
  ];

  const KEEP = [
    {label:'Run', inner:'<path d="M6 7l5 5-5 5"/><path d="M13 7l5 5-5 5"/>'},
    {label:'Cycling', inner:'<circle cx="6" cy="17" r="3.1"/><circle cx="18" cy="17" r="3.1"/><path d="M6 17l4-6h5l-3 6"/><path d="M10 11l2-3h3"/>'},
    {label:'Rowing', inner:'<path d="M4 9c2.5 2 5.5 2 8 0s5.5-2 8 0"/><path d="M4 15c2.5 2 5.5 2 8 0s5.5-2 8 0"/>'},
    {label:'Stairmaster', inner:'<path d="M4 19h4v-3h4v-3h4v-3h4"/>'},
    {label:'Other', inner:'<path d="M3 12h4l2 6 4-14 2 8h6"/>'},
  ];

  document.getElementById('groups').innerHTML = GROUPS.map(g=>
    '<div class="group"><h2 class="group-name">'+g.name+'</h2><div class="opts">'+
    g.options.map(o=>'<div class="opt"><span class="label">'+o.label+'</span>'+
      '<div class="pair"><span class="chip">'+svg(o.inner,22)+'</span><span class="big">'+svg(o.inner,44)+'</span></div></div>').join('')+
    '</div></div>'
  ).join('');

  document.getElementById('refRow').innerHTML = KEEP.map(k=>
    '<div class="ref-item"><span class="chip">'+svg(k.inner,22)+'</span><span class="label">'+k.label+'</span></div>'
  ).join('');
</script>
</body>
</html>
