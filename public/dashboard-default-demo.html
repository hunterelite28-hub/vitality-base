<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vitality · Default dashboard (span layout diagnostic)</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#fff;font-family:Inter,sans-serif}
  /* mirror app/app/dashboard.module.css .page */
  .page{position:relative;min-height:100vh;overflow:hidden;padding:42px 30px}
  .shell{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:24px}
  .header{font-family:'Instrument Serif',serif;font-style:italic;font-size:34px}
  .header b{color:#6EE7B7;font-weight:400}

  /* ---- the exact grid rules from components/veeTiles.css ---- */
  .veeTiles{width:100%}
  .veeTiles .grid{
    display:grid;gap:18px;width:100%;
    grid-template-columns:repeat(4,1fr);
    grid-auto-rows:clamp(118px,13.5vw,160px);
    grid-auto-flow:row dense;
  }
  .veeTiles .grid .tile[data-size="m"]{grid-column:span 2}
  .veeTiles .grid .tile[data-size="tall"]{grid-row:span 2}
  .veeTiles .grid .tile[data-size="hero"]{grid-column:span 3}
  .veeTiles .grid .tile[data-size="big"]{grid-column:span 2;grid-row:span 2}
  .veeTiles .grid .tile[data-size="band"]{grid-column:1 / -1}
  .veeTiles .grid .tile[data-size="l"]{grid-column:1 / -1;grid-row:span 2}

  .veeTiles .tile{position:relative;overflow:hidden;border-radius:20px;border:1px solid rgba(167,243,208,.10);
    background:linear-gradient(165deg, rgba(16,26,22,.55) 0%, rgba(7,12,10,.40) 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 22px 50px -30px rgba(0,0,0,.75)}
  .veeTiles .index{position:absolute;top:15px;left:20px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.38)}
  .veeTiles .label{position:absolute;left:20px;bottom:16px;font-family:'Instrument Serif',serif;font-style:italic;font-size:22px}
  .veeTiles .arrow{position:absolute;right:18px;bottom:17px;color:rgba(255,255,255,.4);font-size:14px}
</style>
</head>
<body>
<div class="page">
  <div class="shell">
    <div class="header">Good afternoon, <b>Luke</b></div>
    <div class="veeTiles">
      <div class="grid">
        <div class="tile" data-size="hero"><span class="index">01</span><span class="label">Train</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="tall"><span class="index">02</span><span class="label">Fuel</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="s"><span class="index">04</span><span class="label">Vitals</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="big"><span class="index">06</span><span class="label">Vee</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="tall"><span class="index">05</span><span class="label">Brand</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="tall"><span class="index">03</span><span class="label">Peak</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="m"><span class="index">07</span><span class="label">Finance</span><span class="arrow">&#8594;</span></div>
        <div class="tile" data-size="band"><span class="index">08</span><span class="label">Create</span><span class="arrow">&#8594;</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
