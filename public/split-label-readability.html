<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Split labels · readability · 3 fixes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --fg:#fff; --mint:#6EE7B7; --amber:#fbbf24;
  --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.7); --faint:rgba(255,255,255,.3);
  --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16); --card:rgba(255,255,255,.02);
  --s2:.5rem; --s3:.75rem; --s4:1rem; --s5:1.25rem; --s6:1.5rem;
  --r-md:8px; --r-lg:12px; --r-pill:999px;
  --serif:'Instrument Serif',Georgia,serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060a;min-height:100vh;font-family:Inter,sans-serif;color:var(--fg);-webkit-font-smoothing:antialiased;
  padding:42px 22px 80px;background-image:radial-gradient(90% 24vh at 50% 0%,rgba(110,231,183,.07),transparent 70%)}
.wrap{max-width:560px;margin:0 auto}
.pageHead{text-align:center;margin-bottom:6px}
.eyebrowRule{display:inline-flex;align-items:center;gap:var(--s3);font-family:var(--mono);font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mint)}
.eyebrowRule::before,.eyebrowRule::after{content:'';width:24px;height:1px;background:var(--mint);opacity:.55}
.pageTitle{font-family:var(--serif);font-style:italic;font-size:2rem;margin:.4rem 0 .3rem}
.pageSub{color:var(--muted-strong);font-size:.86rem;line-height:1.5;max-width:480px;margin:0 auto}
.cTag{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-strong);margin:30px 0 10px}
.cTag b{color:var(--mint);font-weight:500}
.cNote{color:var(--muted);text-transform:none;letter-spacing:.04em;font-size:.56rem;margin-top:3px}

.card{border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;background:var(--card);margin-bottom:10px;display:flex;flex-direction:column;gap:12px}
.head{display:flex;align-items:center;gap:10px}
.name{font-family:var(--serif);font-style:italic;font-size:1.1rem;flex:1;min-width:0}
.fr{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.rhythm{border-top:1px solid var(--border);padding-top:13px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);align-items:start}
.cell{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}
.pd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pd.m{background:var(--mint)}.pd.a{background:var(--amber)}.pd.o{background:transparent;border:1px solid rgba(255,255,255,.2)}
.spacer{height:11px}

/* A — short words, mono caps */
.wA{font-family:var(--mono);font-size:7.5px;font-weight:500;letter-spacing:.02em;text-transform:uppercase;color:var(--mint);opacity:.7;white-space:nowrap}
.wA.v{color:var(--amber)}
/* C — serif italic words */
.wC{font-family:var(--serif);font-style:italic;font-size:.78rem;line-height:1;color:var(--mint);opacity:.78;white-space:nowrap}
.wC.v{color:var(--amber)}
/* B — caption */
.caption{margin-top:11px;text-align:center;font-family:var(--serif);font-style:italic;font-size:.92rem;color:var(--muted-strong);line-height:1.3}
.caption .sep{color:var(--faint);margin:0 5px}
.repIco{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.52rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mint);opacity:.7}
.repIco svg{width:11px;height:11px}
</style>
</head>
<body>
<div class="wrap">
  <div class="pageHead">
    <div class="eyebrowRule">Labels · readability</div>
    <h1 class="pageTitle">Words you can actually read</h1>
    <p class="pageSub">"CH BK SH AR" shouldn't need decoding. Three ways to keep it small + minimal but clear — using each day's real name.</p>
  </div>
  <div id="out"></div>
</div>

<script>
const LOOP=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>`;
// day = [intensity, fullName]
const SPLITS = [
  {name:'Bro Split', fr:'5× /wk',
    week:[['m','Chest'],['m','Back'],['m','Legs'],['m','Delts'],['m','Arms'],['o',''],['o','']]},
  {name:'Push Pull Legs', fr:'3× /cycle', rot:true,
    cycle:[['m','Push'],['m','Pull'],['m','Legs'],['o','']]},
  {name:'Upper / Lower', fr:'4× /wk',
    week:[['m','Upper'],['m','Lower'],['o',''],['a','Upper'],['a','Lower'],['o',''],['o','']]},
];
const days = s => s.rot ? s.cycle : s.week;

// A — short word under each dot (mono caps)
function rA(s){
  const cells = days(s).map(([i,n])=>`<div class="cell"><span class="pd ${i}"></span>${(i!=='o'&&n)?`<span class="wA ${i==='a'?'v':''}">${n}</span>`:'<span class="spacer"></span>'}</div>`).join('');
  return `<div class="g7">${cells}${s.rot?`<span class="repIco" style="grid-column:span 3;padding-left:9px;align-self:start">${LOOP}repeats</span>`:''}</div>`;
}
// B — clean dots + readable caption line
function rB(s){
  const cells = days(s).map(([i])=>`<div class="cell"><span class="pd ${i}"></span></div>`).join('');
  const names = days(s).filter(([i])=>i!=='o').map(([i,n])=>`<span class="${i==='a'?'v':''}">${n}</span>`).join('<span class="sep">·</span>');
  return `<div class="g7">${cells}${s.rot?`<span class="repIco" style="grid-column:span 3;padding-left:9px">${LOOP}repeats</span>`:''}</div>
    <div class="caption">${names}${s.rot?'<span class="sep">·</span><span style="color:var(--mint)">repeats</span>':''}</div>`;
}
// C — serif italic word under each dot (editorial)
function rC(s){
  const cells = days(s).map(([i,n])=>`<div class="cell"><span class="pd ${i}"></span>${(i!=='o'&&n)?`<span class="wC ${i==='a'?'v':''}">${n}</span>`:'<span class="spacer"></span>'}</div>`).join('');
  return `<div class="g7">${cells}${s.rot?`<span class="repIco" style="grid-column:span 3;padding-left:9px;align-self:start">${LOOP}repeats</span>`:''}</div>`;
}

function section(tag,note,fn){
  return `<div class="cTag">${tag}<div class="cNote">${note}</div></div>`+
    SPLITS.map(s=>`<div class="card"><div class="head"><span class="name">${s.name}</span><span class="fr">${s.fr}</span></div><div class="rhythm">${fn(s)}</div></div>`).join('');
}
document.getElementById('out').innerHTML =
  section('concept <b>A</b> · short words, mono','the real word, tiny caps — chest, back, delts. clear + technical.',rA)+
  section('concept <b>B</b> · clean dots + caption','dots stay minimal; one readable serif line names them in order.',rB)+
  section('concept <b>C</b> · serif italic words','the real word in the editorial serif — softest, most vitality.',rC);
</script>
</body>
</html>
