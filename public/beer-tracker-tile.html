<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<!--
  Beer tracker — the canonical "I built a tile and Vitality noticed something" demo.
  Sealed: it runs in a sandboxed iframe (allow-scripts, no allow-same-origin) and
  talks to Vitality only through the bridge. It saves its OWN history via
  Vitality.save/load, and it feeds Vee ONE numeric life-stream via Vitality.report:
      { key:'beer', label:'Beers', value, date, kind:'intake', goalDirection:'down' }
  The user just built a beer counter. What they actually did is hand Vee a
  categorized life-stream that the noticed engine correlates against recovery,
  mood, weight, anything. They never had to know it connects.
-->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;color:#fff;background:transparent;accent-color:#6EE7B7;padding:6px;text-align:center}
.label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:10px}
.count{font-size:64px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;background:linear-gradient(180deg,#fff,#9ff0cf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.unit{font-size:13px;color:rgba(255,255,255,.4);margin-top:6px}
.row{display:flex;gap:14px;justify-content:center;align-items:center;margin-top:18px}
.step{width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#fff;font-size:26px;font-family:inherit;cursor:pointer;display:grid;place-items:center;transition:all .18s cubic-bezier(.16,1,.3,1)}
.step:hover{border-color:rgba(110,231,183,.55);background:rgba(110,231,183,.08)}
.step:active{transform:scale(.92)}
.plus{background:#6EE7B7;border-color:#6EE7B7;color:#042a1c;font-weight:700}
.plus:hover{background:#5dd6a6}
.week{display:flex;gap:5px;justify-content:center;margin-top:22px}
.day{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.35)}
.bar{width:13px;height:34px;border-radius:4px;background:rgba(255,255,255,.05);display:flex;align-items:flex-end;overflow:hidden}
.fill{width:100%;background:#6EE7B7;border-radius:4px;transition:height .3s cubic-bezier(.16,1,.3,1)}
.note{font-size:11px;color:rgba(255,255,255,.3);margin-top:16px}
</style>
</head>
<body>
<div class="label">Beers today</div>
<div class="count" id="count">0</div>
<div class="unit" id="unit">tap to log a beer</div>
<div class="row">
  <button class="step" id="minus" aria-label="one fewer">&minus;</button>
  <button class="step plus" id="plus" aria-label="one more">+</button>
</div>
<div class="week" id="week"></div>
<div class="note">saved to your account. Vitality is watching this stream.</div>
<script>
var Vitality={_w:{},
  save:function(d){parent.postMessage({source:'vitality-tile',type:'save',data:d},'*')},
  load:function(){return new Promise(function(res){var id=Math.random().toString(36).slice(2);Vitality._w[id]=res;parent.postMessage({source:'vitality-tile',type:'load',id:id},'*')})},
  report:function(s){parent.postMessage({source:'vitality-tile',type:'report',stream:s},'*')}
};
window.addEventListener('message',function(e){var m=e.data;if(m&&m.source==='vitality-host'&&m.type==='load:result'&&Vitality._w[m.id]){Vitality._w[m.id](m.data);delete Vitality._w[m.id]}});

function today(){var d=new Date();var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');return d.getFullYear()+'-'+m+'-'+day}
var history=[]; // [{date, beers}]
function get(date){for(var i=0;i<history.length;i++){if(history[i].date===date)return history[i]}var row={date:date,beers:0};history.push(row);return row}

function render(){
  var t=get(today());
  document.getElementById('count').textContent=t.beers;
  document.getElementById('unit').textContent=t.beers===0?'tap to log a beer':(t.beers===1?'1 beer logged':t.beers+' beers logged');
  // last 7 days mini bars
  var wk=document.getElementById('week');wk.innerHTML='';
  var max=1;history.forEach(function(r){if(r.beers>max)max=r.beers});
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');
    var key=d.getFullYear()+'-'+m+'-'+day;
    var row=null;for(var j=0;j<history.length;j++){if(history[j].date===key){row=history[j];break}}
    var beers=row?row.beers:0;var pct=Math.round((beers/max)*100);
    var el=document.createElement('div');el.className='day';
    el.innerHTML='<div class="bar"><div class="fill" style="height:'+pct+'%"></div></div><span>'+['S','M','T','W','T','F','S'][d.getDay()]+'</span>';
    wk.appendChild(el);
  }
}

function commit(){
  render();
  Vitality.save(history);
  var t=get(today());
  // the one line that wires this tile into Vee.
  Vitality.report({key:'beer',label:'Beers',value:t.beers,date:today(),kind:'intake',goalDirection:'down'});
}

document.getElementById('plus').onclick=function(){var t=get(today());t.beers++;commit()};
document.getElementById('minus').onclick=function(){var t=get(today());if(t.beers>0)t.beers--;commit()};

Vitality.load().then(function(d){history=Array.isArray(d)?d:[];render()});
</script>
</body>
</html>
