<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05080a" />
<title>Swipe preview · Vitality</title>
<style>
  :root{ --mint:#6ee7b7; --rule:rgba(233,239,233,.14); --rule-strong:rgba(233,239,233,.22); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:#05080a;color:#e9efe9;
    font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
  body{padding:max(20px,env(safe-area-inset-top)) 18px 120px}
  .h{font-style:italic;font-family:Georgia,serif;font-size:34px;margin:8px 0 2px}
  .sub{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#7a8a82;margin-bottom:22px}

  /* live debug readout so we can see exactly what your phone sends */
  .debug{position:fixed;left:8px;right:8px;bottom:8px;z-index:99;
    background:#0b1210;border:1px solid var(--rule);border-radius:12px;
    padding:10px 12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--mint);
    white-space:pre-wrap;line-height:1.5}
  .debug b{color:#e9efe9}

  .grid{display:grid;grid-template-columns:1fr;gap:14px;max-width:560px;margin:0 auto}

  .slot{position:relative;display:flex;border-radius:18px;overflow:hidden;isolation:isolate}
  .reveal{position:absolute;inset:0;z-index:0;display:flex;align-items:stretch;justify-content:flex-end;
    background:linear-gradient(90deg,#0c1d17 0%,#103325 55%,#154835 100%);border-radius:18px;opacity:0;transition:opacity 120ms linear;pointer-events:none}
  .slot.active .reveal{opacity:1}
  .reveal .btn{width:116px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mint)}
  .reveal svg{transform:scale(calc(.94 + .1*var(--p,0)));transition:transform 120ms ease}
  .reveal .lbl{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}

  .card{position:relative;z-index:1;flex:1;min-height:190px;padding:22px;
    display:flex;flex-direction:column;justify-content:space-between;
    border:1px solid var(--rule);border-radius:18px;text-decoration:none;color:inherit;
    background-color:#070d0b;background-image:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    box-shadow:0 12px 36px -20px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04);
    touch-action:pan-y;-webkit-touch-callout:none;-webkit-user-drag:none;
    transition:transform .34s cubic-bezier(.22,1,.36,1)}
  .card.today{border-color:rgba(110,231,183,.5);box-shadow:0 0 0 1px rgba(110,231,183,.25),0 18px 50px -22px rgba(110,231,183,.3)}
  .card.dragging{user-select:none;-webkit-user-select:none}
  .slot.active .card{box-shadow:0 24px 60px -24px rgba(0,0,0,.9),0 14px 44px -18px rgba(110,231,183,.24),inset 0 1px 0 rgba(255,255,255,.06)}
  .idx{font-style:italic;color:var(--mint);font-size:13px}
  .name{font-family:Georgia,serif;font-style:italic;font-size:38px;margin:0;line-height:1}
  .meta{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#7a8a82}
</style>
</head>
<body>
  <div class="h">Today&rsquo;s session</div>
  <div class="sub">Swipe preview · drag a tile left</div>
  <div class="grid" id="grid"></div>
  <div class="debug" id="debug">touch a card and drag left…</div>

<script>
const DAYS = [
  {n:'01', name:'Push', meta:'Heavy · 6 exercises', today:true},
  {n:'02', name:'Pull', meta:'Heavy · 7 exercises'},
  {n:'03', name:'Legs', meta:'Heavy · 8 exercises'},
];
const COMMIT = 92, MAX = 116;
const dbg = document.getElementById('debug');
let evCount = 0;
function show(o){ dbg.innerHTML = Object.entries(o).map(([k,v])=>`<b>${k}</b> ${v}`).join('   '); }

const grid = document.getElementById('grid');
DAYS.forEach((d,i)=>{
  const slot = document.createElement('div');
  slot.className='slot';
  slot.innerHTML = `
    <div class="reveal" aria-hidden="true"><span class="btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      <span class="lbl">Edit</span></span></div>
    <a class="card${d.today?' today':''}" href="#open-${i}" draggable="false">
      <span class="idx">·${d.n}${d.today?'  · today':''}</span>
      <h2 class="name">${d.name}</h2><span class="meta">${d.meta}</span></a>`;
  grid.appendChild(slot);

  const card = slot.querySelector('.card');
  let startX=0,startY=0,axis='idle',dx=0,moved=false,downId=null;

  function setDx(v,snap){ dx=v; card.style.transition=snap?'transform 300ms cubic-bezier(.22,1,.36,1)':'none';
    card.style.transform=v?`translateX(${v}px)`:''; slot.style.setProperty('--p',Math.min(1,-v/COMMIT)); }

  card.addEventListener('pointerdown',e=>{
    if(e.pointerType==='mouse'&&e.button!==0) return;
    downId=e.pointerId; startX=e.clientX; startY=e.clientY; axis='idle'; moved=false; dx=0; evCount=0;
    show({down:`card ${i}`, type:e.pointerType, axis, dx:0});
  },{passive:false});

  card.addEventListener('pointermove',e=>{
    if(downId===null||e.pointerId!==downId) return;
    evCount++;
    const ddx=e.clientX-startX, ddy=e.clientY-startY;
    if(axis==='idle'){
      if(Math.abs(ddx)<8&&Math.abs(ddy)<8){ show({move:evCount, ddx:ddx.toFixed(0), ddy:ddy.toFixed(0), axis:'(deciding)'}); return; }
      axis = Math.abs(ddx)>Math.abs(ddy)?'h':'v';
      if(axis==='h'){ try{card.setPointerCapture(e.pointerId)}catch(_){}
        slot.classList.add('active'); card.classList.add('dragging'); }
      else { downId=null; show({axis:'v → scrolling', moves:evCount}); return; }
    }
    if(axis!=='h') return;
    e.preventDefault();
    moved=true;
    let v=Math.min(0,ddx); if(v<-MAX) v=-MAX+(v+MAX)*0.18;
    setDx(v,false);
    show({axis:'h', dx:v.toFixed(0), commitAt:`-${COMMIT}`, armed:(v<=-COMMIT)?'YES':'no'});
  },{passive:false});

  function end(){
    if(downId===null) return;
    const commit = axis==='h' && dx<=-COMMIT;
    downId=null; axis='idle'; card.classList.remove('dragging');
    if(commit){ show({result:'COMMIT → slides off → opens editor', dx:dx.toFixed(0)});
      // Satisfying full slide-off (then we'd navigate); demo resets after.
      slot.style.setProperty('--p',1);
      card.style.transition='transform 220ms cubic-bezier(0.4,0,1,1)';
      card.style.transform='translateX(-112%)';
      setTimeout(()=>{ card.style.transition=''; card.style.transform=''; slot.classList.remove('active'); slot.style.setProperty('--p',0); }, 560);
      return; }
    setDx(0,true); setTimeout(()=>slot.classList.remove('active'),340);
    show({result:'snapped back', maxDx:dx.toFixed(0), moves:evCount});
  }
  card.addEventListener('pointerup',end);
  card.addEventListener('pointercancel',end);
  card.addEventListener('click',e=>{ e.preventDefault();
    if(moved){ moved=false; show({result:'(was a swipe — tap ignored)'}); }
    else show({result:`TAP → opens day ${i}`}); });
});
</script>
</body>
</html>
