<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Widget designs — ported motion diagnostic</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#fff;font-family:Inter,sans-serif;padding:40px}
  h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:34px;margin-bottom:18px}
  .gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:1100px}
  .card{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:14px;overflow:hidden}
  .dart{position:relative;height:118px;color:var(--c,#6EE7B7)}
  .nm{padding:10px 13px;font-family:'Instrument Serif',serif;font-style:italic;font-size:16px}
  /* ---- the exact ported motion block from components/veeTiles.css (scoped .veeTiles .wmArt) ---- */
  .veeTiles{--vease:cubic-bezier(.16,1,.3,1);--wspring:cubic-bezier(.34,1.56,.64,1)}
  .veeTiles .wmArt{position:absolute;inset:0;z-index:2;pointer-events:none}
  .veeTiles .wmArt svg{position:absolute;inset:0;width:100%;height:100%;opacity:.9}
  .veeTiles .wmArt .dots circle{transform-box:fill-box;transform-origin:center;animation:wmDotIn .55s var(--wspring) var(--dd,0s) both}
  .veeTiles .wmArt:not(.dots-off) .dots circle{animation:wmDotIn .55s var(--wspring) var(--dd,0s) both, wmDotLive 2.6s var(--vease) calc(var(--dd,0s) + .55s) infinite}
  @keyframes wmDotIn{0%{opacity:0;transform:scale(0)}60%{opacity:1}100%{transform:scale(1)}}
  @keyframes wmDotLive{0%,100%{opacity:.55}50%{opacity:1}}
  .veeTiles .wmArt.dots-off .dots{display:none}
  .veeTiles .wmArt .m-draw{stroke-dasharray:100;stroke-dashoffset:100;animation:wmDraw 1.5s var(--vease) var(--d,0s) forwards}
  .veeTiles .wmArt:not(.dots-off) .m-draw{animation:wmDraw 1.5s var(--vease) var(--d,0s) forwards, wmLineGlow 5.5s ease-in-out calc(var(--d,0s) + 1.6s) infinite}
  @keyframes wmDraw{to{stroke-dashoffset:0}}
  @keyframes wmLineGlow{0%,100%{opacity:var(--op,.85)}50%{opacity:calc(var(--op,.85) * .7)}}
  .veeTiles .wmArt .m-comet{opacity:0;offset-rotate:0deg}
  .veeTiles .wmArt:not(.dots-off) .m-comet{animation:wmCometRun var(--cd,6.5s) linear calc(var(--d,0s) + 1.7s) infinite}
  @keyframes wmCometRun{0%{offset-distance:0%;opacity:0}12%{opacity:.95}55%{offset-distance:62%}88%{opacity:.95}100%{offset-distance:100%;opacity:0}}
  .veeTiles .wmArt .m-bar{transform-box:fill-box;transform-origin:center bottom;transform:scaleY(0);animation:wmBarGrow .7s var(--vease) var(--d,0s) forwards}
  .veeTiles .wmArt:not(.dots-off) .m-bar{animation:wmBarGrow .7s var(--vease) var(--d,0s) forwards, wmBarBreathe 4.2s ease-in-out calc(var(--d,0s) + .7s) infinite}
  @keyframes wmBarGrow{to{transform:scaleY(1)}}@keyframes wmBarBreathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.96)}}
  .veeTiles .wmArt .m-ring{transform-box:fill-box;transform-origin:center;animation:wmRingIn .7s var(--vease) var(--d,0s) both}
  .veeTiles .wmArt:not(.dots-off) .m-ring{animation:wmRingIn .7s var(--vease) var(--d,0s) both, wmRingBreathe 4.6s ease-in-out calc(var(--d,0s) + .7s) infinite}
  @keyframes wmRingIn{from{opacity:0;transform:scale(.72)}to{opacity:var(--op,.6);transform:scale(1)}}
  @keyframes wmRingBreathe{0%,100%{transform:scale(1);opacity:var(--op,.6)}50%{transform:scale(1.04);opacity:calc(var(--op,.6) * 1.14)}}
  .veeTiles .wmArt .m-arc{stroke-dasharray:100;stroke-dashoffset:100;animation:wmDraw 1.4s var(--vease) calc(var(--d,0s) + .15s) forwards}
  .veeTiles .wmArt .m-fade{animation:wmFadeIn .9s var(--vease) var(--d,0s) both}@keyframes wmFadeIn{from{opacity:0}to{opacity:var(--op,.85)}}
  .veeTiles .wmArt .m-drift{transform-box:fill-box;stroke-dasharray:100;stroke-dashoffset:100;animation:wmDraw 1.3s var(--vease) var(--di,0s) both}
  .veeTiles .wmArt:not(.dots-off) .m-drift{animation:wmDraw 1.3s var(--vease) var(--di,0s) forwards, wmDriftX 7.5s ease-in-out calc(var(--di,0s) + 1.3s + var(--d,0s)) infinite}
  @keyframes wmDriftX{0%,100%{transform:translateX(-4px)}50%{transform:translateX(4px)}}
  .veeTiles .wmArt[data-motion="orbit"] svg,.veeTiles .wmArt[data-spin] svg{transform-box:fill-box;transform-origin:center}
  .veeTiles .wmArt:not(.dots-off)[data-motion="orbit"] svg{animation:wmSpinSlow 26s linear infinite}
  .veeTiles .wmArt:not(.dots-off)[data-spin] svg{animation:wmSpinSlow 48s linear infinite}
  @keyframes wmSpinSlow{to{transform:rotate(360deg)}}
</style></head>
<body>
<div class="veeTiles">
  <h1>Widget designs — ported motion</h1>
  <div class="gallery" id="g"></div>
</div>
<script>
// load the real library DESIGNS so the demo shows the true SVGs, then run the
// PORTED animate() logic (mirrors components/widgetMotion.ts) under our .wmArt CSS.
const MOTION={'ascent-line':'draw','rep-bars':'bars','heartbeat-trace':'draw','streak-row':'pulse','ridge-climb':'draw','effort-ring':'rings','tide-layers':'drift','crescent-rest':'draw','recovery-rings':'rings','breathing-pulse':'rings','weight-trend':'draw','hrv-ribbon':'draw','net-worth-ascent':'draw','candles':'bars','growth-mountain':'draw','savings-stack':'bars','budget-ring':'rings','spend-stream':'drift','mood-wave':'drift','gratitude-spark':'draw','focus-orbit':'orbit','calm-ripples':'rings','journal-lines':'draw','constellation':'draw','sparkline-end-dot':'draw','bar-set':'bars','ring-gauge-tick':'rings','node-scatter':'pulse','area-chart':'draw','dotted-field':'pulse'};
const SVGNS='http://www.w3.org/2000/svg';
const stroked=el=>{if(el.getAttribute('stroke')==='none')return false;if(el.getAttribute('stroke'))return true;try{return getComputedStyle(el).stroke!=='none'}catch(e){return false}};
const opOf=(el,d)=>parseFloat(el.getAttribute('opacity')||d);
function decorateDots(svg){[...svg.querySelectorAll('.dots circle')].forEach((c,i)=>{c.style.setProperty('--dd',(0.55+i*0.07).toFixed(2)+'s');c.style.setProperty('--rop',opOf(c,'0.7'))})}
function pointsToD(pts){const p=(pts||'').trim().split(/\s+/);return p.map((pair,i)=>(i?'L':'M')+pair.replace(',',' ')).join(' ')}
function addComet(svg,primary){const d=primary.tagName.toLowerCase()==='polyline'?pointsToD(primary.getAttribute('points')):primary.getAttribute('d');if(!d)return;const g=document.createElementNS(SVGNS,'g');g.setAttribute('class','m-comet');g.style.offsetPath=`path('${d}')`;const h=document.createElementNS(SVGNS,'circle');h.setAttribute('r','5');h.setAttribute('fill','currentColor');h.setAttribute('opacity','0.18');const c=document.createElementNS(SVGNS,'circle');c.setAttribute('r','2.2');c.setAttribute('fill','currentColor');c.setAttribute('opacity','0.95');g.appendChild(h);g.appendChild(c);svg.appendChild(g)}
function animate(container,key){if(!container)return;const svg=container.querySelector('svg');if(!svg)return;const motion=MOTION[key]||'pulse';container.setAttribute('data-motion',motion);container.removeAttribute('data-spin');decorateDots(svg);
  if(motion==='draw'){const lines=[...svg.querySelectorAll('path,polyline,line')].filter(stroked);lines.forEach((el,i)=>{el.setAttribute('pathLength','100');el.style.setProperty('--op',opOf(el,'0.85'));el.style.setProperty('--d',(i*0.12).toFixed(2)+'s');el.classList.add('m-draw')});const p=lines.find(el=>el.tagName.toLowerCase()!=='line');if(p)addComet(svg,p);}
  else if(motion==='bars'){[...svg.querySelectorAll('rect,line')].filter(el=>el.tagName.toLowerCase()==='rect'||el.getAttribute('x1')===el.getAttribute('x2')).sort((a,b)=>+(a.getAttribute('x')??a.getAttribute('x1'))-+(b.getAttribute('x')??b.getAttribute('x1'))).forEach((el,i)=>{el.style.setProperty('--d',(i*0.07).toFixed(2)+'s');el.classList.add('m-bar')});}
  else if(motion==='rings'){const donut=!!svg.querySelector('[transform*="rotate"]');const arcs=[...svg.querySelectorAll('circle,ellipse,path')].filter(el=>stroked(el)&&!el.closest('.dots'));if(donut){container.setAttribute('data-spin','');arcs.forEach((el,i)=>{el.style.setProperty('--op',opOf(el,'0.85'));el.style.setProperty('--d',(i*0.12).toFixed(2)+'s');if(el.tagName.toLowerCase()==='path'&&!el.getAttribute('stroke-dasharray')){el.setAttribute('pathLength','100');el.classList.add('m-arc')}else{el.classList.add('m-fade')}})}else{arcs.sort((a,b)=>parseFloat(a.getAttribute('r')||0)-parseFloat(b.getAttribute('r')||0)).forEach((el,i)=>{if(el.tagName.toLowerCase()==='path'){el.setAttribute('pathLength','100');el.style.setProperty('--op',opOf(el,'0.85'));el.style.setProperty('--d',(i*0.12).toFixed(2)+'s');el.classList.add('m-arc')}else{el.style.setProperty('--op',opOf(el,'0.5'));el.style.setProperty('--d',(i*0.5).toFixed(2)+'s');el.classList.add('m-ring')}})}}
  else if(motion==='drift'){[...svg.querySelectorAll('path')].filter(stroked).forEach((el,i)=>{el.setAttribute('pathLength','100');el.style.setProperty('--di',(i*0.1).toFixed(2)+'s');el.style.setProperty('--d',(i*-0.9).toFixed(2)+'s');el.classList.add('m-drift')})}
  const moved='m-draw m-arc m-bar m-ring m-drift m-comet m-fade'.split(' ');[...svg.querySelectorAll('path,polyline,line,rect,circle,ellipse')].forEach((el,i)=>{if(el.closest('.dots')||moved.some(c=>el.classList.contains(c)))return;const f=el.getAttribute('fill');if(!stroked(el)&&(!f||f==='none'))return;el.style.setProperty('--op',opOf(el,'0.85'));el.style.setProperty('--d',(0.1+i*0.05).toFixed(2)+'s');el.classList.add('m-fade')});}
fetch('/widget-design-library.html').then(r=>r.text()).then(t=>{
  const D=JSON.parse(t.match(/window\.DESIGNS=(\[.*?\]);/s)[1]);
  const g=document.getElementById('g');
  g.innerHTML=D.map(d=>`<div class="card"><div class="dart"><div class="wmArt" data-key="${d.key}">${d.svg}</div></div><div class="nm">${d.name}</div></div>`).join('');
  g.querySelectorAll('.wmArt').forEach(a=>animate(a,a.dataset.key));
  window.__ready=true;
});
</script>
</body></html>
