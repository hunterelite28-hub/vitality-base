<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Train — LIVE DOM replica</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --mint:#6EE7B7; --mint-soft:#A7F3D0; --fg:#f2f5f3; --muted:rgba(233,239,233,0.45); --border:rgba(255,255,255,0.08); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:radial-gradient(90% 30vh at 50% 0%, rgba(110,231,183,0.08), transparent 70%), linear-gradient(#0a1612,#04060a); padding:32px; font-family:Inter,sans-serif; color:var(--fg); }
  .crumb{ font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
  .crumb b{ color:var(--mint); }

  /* ===== EXACT live tile chrome (from dashboard.module.css) ===== */
  .tile{ position:relative; overflow:hidden; border-radius:18px; border:1px solid var(--border);
         background:rgba(255,255,255,0.02); isolation:isolate;
         /* real one-screen Train cell size */ width:575px; height:432px; }
  .tileArt{ position:absolute; inset:-10%; pointer-events:none; }   /* the bleed wrapper */
  .artAurora{ background:
    radial-gradient(ellipse 60% 50% at 35% 55%, rgba(110,231,183,0.35), transparent 70%),
    radial-gradient(ellipse 50% 40% at 70% 40%, rgba(74,140,110,0.28), transparent 70%),
    linear-gradient(135deg,#0c1612 0%,#060a08 100%); }
  .tileIndex{ position:absolute; top:18px; left:22px; z-index:3; font-family:'Instrument Serif',serif; font-style:italic; font-size:14px; color:var(--muted); }
  .tileSub{ position:absolute; bottom:50px; left:22px; z-index:3; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .tileLabel{ position:absolute; bottom:18px; left:22px; z-index:3; font-family:'Instrument Serif',serif; font-style:italic; font-size:28px; color:var(--fg); }
  .tileArrow{ position:absolute; bottom:22px; right:22px; z-index:3; font-size:18px; opacity:.9; }
  .tileGlyph{ position:absolute; top:20px; right:22px; z-index:3; width:36px; height:36px; color:var(--mint); opacity:.78; filter:drop-shadow(0 0 6px rgba(110,231,183,0.28)); }
  .tileGlyph svg{ width:100%; height:100% }

  /* ===== TrainTileArt.module.css — copied 1:1 ===== */
  .root{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .base{ position:absolute; inset:-8%;
    background:
      radial-gradient(ellipse 52% 50% at 32% 44%, rgba(110,231,183,0.30), transparent 62%),
      radial-gradient(ellipse 48% 52% at 78% 64%, rgba(40,120,90,0.32), transparent 68%),
      linear-gradient(155deg,#0b1a14 0%,#060d0a 60%,#040806 100%);
    transform-origin:50% 50%; animation:trainBase 9s ease-in-out infinite; }
  @keyframes trainBase{ 0%,100%{transform:scale(1.02);opacity:.92} 50%{transform:scale(1.05);opacity:1} }
  .graph{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:86%; aspect-ratio:400/150; max-height:62%; }
  .graph svg{ width:100%; height:100%; display:block; overflow:visible; }
  .contour{ fill:none; stroke:rgba(110,231,183,0.20); stroke-width:1.3; stroke-linecap:round; filter:drop-shadow(0 0 3px rgba(110,231,183,0.25)); stroke-dasharray:100; stroke-dashoffset:100; animation:trainDraw 3s cubic-bezier(0.16,1,0.3,1) forwards; }
  .contourB{ stroke-opacity:.7; animation-delay:.25s; }
  @keyframes trainDraw{ to{stroke-dashoffset:0} }
  .trend{ fill:none; stroke:#6EE7B7; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:100; stroke-dashoffset:100; animation:trainTrend 5s 3.1s cubic-bezier(0.45,0,0.25,1) forwards, trainGlow 7s 8.2s ease-in-out infinite; filter:drop-shadow(0 0 4px rgba(110,231,183,0.7)); }
  @keyframes trainTrend{ from{stroke-dashoffset:100} to{stroke-dashoffset:0} }
  @keyframes trainGlow{ 0%,100%{filter:drop-shadow(0 0 3px rgba(110,231,183,.55))} 50%{filter:drop-shadow(0 0 7px rgba(110,231,183,.85))} }
  .dot{ fill:rgba(110,231,183,0.6); opacity:0; transform-box:fill-box; transform-origin:center; animation:trainDotIn .6s cubic-bezier(0.16,1,0.3,1) forwards; }
  .dotPeak{ fill:var(--mint-soft); filter:drop-shadow(0 0 4px rgba(167,243,208,0.8)); animation:trainDotIn .6s cubic-bezier(0.16,1,0.3,1) forwards, trainPeak 7s 8.2s ease-in-out infinite; }
  @keyframes trainDotIn{ from{opacity:0; transform:scale(.4)} to{opacity:.9; transform:scale(1)} }
  @keyframes trainPeak{ 0%,100%{filter:drop-shadow(0 0 3px rgba(167,243,208,.5))} 50%{filter:drop-shadow(0 0 7px rgba(167,243,208,.9))} }
</style></head><body>

<div class="crumb">Train — <b>LIVE DOM replica</b> (exact tile chrome + .tileArt inset:-10% + TrainTileArt as sibling) at the real one-screen size</div>

<!-- mirrors the exact JSX: artClass div first, TrainTileArt sibling after, then text spans -->
<div class="tile">
  <div class="tileArt artAurora"></div>

  <div class="root">
    <div class="base"></div>
    <div class="graph">
      <svg viewBox="0 0 400 150" preserveAspectRatio="xMidYMid meet">
        <path class="contour"  d="M-10,40 C100,35 180,32 230,27 S360,18 410,15" pathLength="100"/>
        <path class="contour contourB" d="M-10,140 C100,137 180,134 230,129 S360,121 410,118" pathLength="100"/>
        <path class="trend" d="M10,118 L56,110 L102,114 L148,96 L196,100 L244,78 L292,82 L340,60 L390,46" pathLength="100"/>
        <circle class="dot" cx="10"  cy="118" r="3" style="animation-delay:.30s"/>
        <circle class="dot" cx="56"  cy="110" r="3" style="animation-delay:.62s"/>
        <circle class="dot" cx="102" cy="114" r="3" style="animation-delay:.94s"/>
        <circle class="dot" cx="148" cy="96"  r="3" style="animation-delay:1.26s"/>
        <circle class="dot" cx="196" cy="100" r="3" style="animation-delay:1.58s"/>
        <circle class="dot" cx="244" cy="78"  r="3" style="animation-delay:1.90s"/>
        <circle class="dot" cx="292" cy="82"  r="3" style="animation-delay:2.22s"/>
        <circle class="dot" cx="340" cy="60"  r="3" style="animation-delay:2.54s"/>
        <circle class="dot dotPeak" cx="390" cy="46" r="4" style="animation-delay:2.84s"/>
      </svg>
    </div>
  </div>

  <span class="tileGlyph"><svg viewBox="-12 -12 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="-10" y="-3" width="2.8" height="6" rx="0.6" stroke-width="1.3"/><rect x="7.2" y="-3" width="2.8" height="6" rx="0.6" stroke-width="1.3"/><line x1="-7.2" y1="0" x2="7.2" y2="0" stroke-width="1.3"/></svg></span>
  <span class="tileIndex">·01</span>
  <span class="tileSub">Workouts · Progress · Wearables</span>
  <span class="tileLabel">Train</span>
  <span class="tileArrow">→</span>
</div>

</body></html>
