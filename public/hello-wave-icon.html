<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Friendly wave icon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
<style>
  :root{ --mint:#6EE7B7; --mono:'JetBrains Mono',ui-monospace,monospace; }
  *{box-sizing:border-box}
  html,body{margin:0;background:#000;color:#eafff7;min-height:100%;font-family:var(--mono);-webkit-font-smoothing:antialiased}
  body{padding:54px 24px;display:flex;flex-direction:column;align-items:center;gap:6px}
  h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:30px;margin:0;color:#fff}
  .sub{color:rgba(233,239,233,0.55);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;margin:0 0 26px}
  .row{display:flex;align-items:flex-end;gap:56px;margin-top:8px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:12px}
  canvas{display:block;border-radius:18px}
  .cap{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(110,231,183,0.55)}
  .controls{display:flex;gap:10px;margin-top:30px}
  .controls button{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
    border-radius:999px;padding:8px 16px;cursor:pointer;border:1px solid rgba(110,231,183,0.3);background:transparent;color:var(--mint)}
  .controls button.on{background:var(--mint);color:#06281d;border-color:var(--mint)}
</style>
</head>
<body>
  <h1>Friendly wave</h1>
  <p class="sub">simple · even · crisp line icon · gentle wave</p>

  <div class="row">
    <div class="stage">
      <canvas id="big" width="440" height="440" style="width:320px;height:320px"></canvas>
      <span class="cap">large</span>
    </div>
    <div class="stage">
      <canvas id="small" width="300" height="300" style="width:140px;height:140px"></canvas>
      <span class="cap">gem size</span>
    </div>
  </div>

  <div class="controls">
    <button id="waveBtn" class="on">wave: on</button>
    <button id="stepBtn">single wave ↻</button>
  </div>

<script>
  // Dead-simple, even hand: four equal rounded fingers on a rounded palm, one
  // little thumb. One continuous outline (no spider-legs), in the 512² gem
  // space so it maps 1:1 onto the gem.
  function traceHand(c){
    const fx=[216,246,276,306], fr=14, cap=234;   // finger centers + tip line
    const palmL=202, palmR=320, palmBottom=352, pr=28;
    c.beginPath();
    c.moveTo(palmL, 262);                          // left shoulder of palm
    c.lineTo(fx[0]-fr, cap);                        // up to finger 0 base (left)
    for(let i=0;i<fx.length;i++){
      c.arc(fx[i], cap, fr, Math.PI, 0, false);    // rounded finger top
      if(i<fx.length-1){
        const nextL = fx[i+1]-fr;
        c.quadraticCurveTo((fx[i]+fr+nextL)/2, 256, nextL, cap); // soft valley
      }
    }
    c.lineTo(palmR, palmBottom-pr);                 // down right side
    c.quadraticCurveTo(palmR, palmBottom, palmR-pr, palmBottom);
    c.lineTo(palmL+pr, palmBottom);                 // across the bottom (wrist)
    c.quadraticCurveTo(palmL, palmBottom, palmL, palmBottom-pr);
    c.lineTo(palmL, 300);                           // up left side
    c.quadraticCurveTo(176, 298, 176, 282);         // thumb out + up
    c.quadraticCurveTo(176, 268, palmL, 272);
    c.closePath();
    c.stroke();
  }

  // Crisp, flat-icon glow — soft halo + clean core (no ghostly bloom).
  const LAYERS = [
    ['rgba(110, 231, 183, 0.30)', 9, 12],
    ['rgba(167, 243, 208, 0.70)', 5,  6],
    ['rgba(232, 255, 246, 1.00)', 4,  2],
  ];

  // wrist pivot for the wave
  const PIVOT = { x: 261, y: 352 };

  function draw(cv, t, waving){
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/2);
    g.addColorStop(0,'rgba(110,231,183,0.12)'); g.addColorStop(0.55,'rgba(110,231,183,0.035)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    const s = W/512;
    ctx.setTransform(s,0,0,s,0,0);

    // gentle wave: a couple of friendly rocks, then a short rest — feels alive,
    // not a constant jitter.
    let amp = 0;
    if (waving){
      const cycle = t % 2.6;
      const env = cycle < 1.5 ? Math.sin(cycle/1.5 * Math.PI) : 0; // wave 1.5s, rest 1.1s
      amp = Math.sin(t * 7.5) * (11 * Math.PI/180) * env;
    }
    ctx.translate(PIVOT.x, PIVOT.y);
    ctx.rotate(-4*Math.PI/180 + amp);
    ctx.translate(-PIVOT.x, -PIVOT.y);

    ctx.lineCap='round'; ctx.lineJoin='round';
    for (const [color, lw, blur] of LAYERS){
      ctx.shadowColor='#6EE7B7'; ctx.shadowBlur=blur; ctx.strokeStyle=color; ctx.lineWidth=lw;
      traceHand(ctx);
    }
    ctx.shadowBlur=0;
  }

  const big=document.getElementById('big'), small=document.getElementById('small');
  let waving=true, t0=null, stepUntil=0;
  document.getElementById('waveBtn').addEventListener('click', e=>{
    waving=!waving; e.target.classList.toggle('on',waving); e.target.textContent='wave: '+(waving?'on':'off');
  });
  document.getElementById('stepBtn').addEventListener('click', ()=>{ stepUntil=performance.now()+2600; });

  function frame(ts){
    if(t0===null) t0=ts;
    const t=(ts-t0)/1000;
    const w = waving || ts<stepUntil;
    draw(big,t,w); draw(small,t,w);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
</script>
</body>
</html>
