<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Off day · cozy reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#05080a; --fg:#eef2ef; --muted:#7f8c84; --faint:rgba(233,239,233,.5);
    --rule:rgba(233,239,233,.08);
    --gold:#e9c984; --mint:#6ee7b7;
    --off:#8ab4d0; --off-soft:#b6d6ea; --off-bg:rgba(138,180,208,.07); --off-line:rgba(138,180,208,.26);
    --serif:'Instrument Serif',Georgia,serif; --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Inter',sans-serif;
    --spring:cubic-bezier(.34,1.56,.64,1); --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:radial-gradient(110% 45% at 50% -8%,rgba(138,180,208,.04),transparent 55%),var(--bg);color:var(--fg);font-family:var(--sans);display:flex;justify-content:center}
  ::selection{background:rgba(110,231,183,.28)}
  .wrap{width:100%;max-width:400px;padding:0 16px 90px}

  /* ── top ── */
  .top{position:sticky;top:0;z-index:10;padding:16px 0 14px;background:linear-gradient(180deg,var(--bg) 72%,transparent)}
  .banner{display:flex;align-items:center;gap:10px;border:1px solid var(--off-line);background:var(--off-bg);border-radius:13px;padding:10px 14px}
  .banner .lead{width:5px;height:5px;border-radius:50%;background:var(--off);flex:none;box-shadow:0 0 8px var(--off)}
  .banner p{margin:0;font-size:12px;color:var(--off-soft);letter-spacing:.01em}
  .banner b{font-weight:600;color:var(--fg)}
  .banner .undo{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer}
  .lede{text-align:center;margin:20px 0 4px}
  .lede .k{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--off);margin-bottom:8px}
  .lede .t{font-family:var(--serif);font-style:italic;font-size:19px;line-height:1.3;color:var(--faint)}
  .lede .t em{color:var(--fg);font-style:italic}

  /* ── lift card ── */
  .lift{margin-top:14px;border:1px solid var(--rule);border-radius:16px;padding:14px 15px;background:rgba(255,255,255,.012)}
  .lh{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}
  .ln{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1}
  .tg{margin-left:auto;font-family:var(--mono);font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
  .tg.c{color:var(--off)}

  .grid{display:grid;grid-template-columns:56px 1fr 1fr 1.25fr;align-items:center;column-gap:6px}
  .grid.head{margin-bottom:7px}
  .grid.head span{font-family:var(--mono);font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);text-align:center}
  .grid.head span:first-child{text-align:left}

  .rl{display:flex;flex-direction:column;gap:1px}
  .rl b{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--faint)}
  .rl i{font-family:var(--mono);font-size:8px;font-style:normal;color:var(--muted)}
  .v{text-align:center;font-variant-numeric:tabular-nums;font-weight:600;font-size:18px;line-height:1.15}
  .v u{font-style:normal;text-decoration:none;font-weight:400;font-size:.6em;color:var(--muted);margin-left:2px}
  .v .st{color:var(--gold);font-size:.62em;margin-left:3px}

  /* LAST row — gold, tucks to calm twilight */
  .last{position:relative;overflow:hidden;padding:9px 0;border-radius:10px;transition:background .8s var(--ease),opacity .8s var(--ease)}
  .last .rl b{color:var(--gold)}
  .last .v{color:var(--gold)}
  .shimmer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 32%,rgba(233,201,132,.14) 48%,rgba(182,214,234,.16) 57%,transparent 73%);transform:translateX(-120%);opacity:0;pointer-events:none;border-radius:10px}
  .play .shimmer{animation:sweep 1.1s var(--ease) .2s 1}
  @keyframes sweep{0%{transform:translateX(-120%);opacity:0}14%{opacity:1}86%{opacity:1}100%{transform:translateX(120%);opacity:0}}
  .play .last{opacity:.5;transition-delay:.95s}
  .play .last .rl b{color:var(--muted);transition:color .8s .95s}
  .play .last .v{color:var(--faint);transition:color .8s .95s}
  .play .last .v .st{color:var(--muted)}

  .divline{height:1px;background:var(--rule);margin:3px 0}

  /* TODAY row — twilight, blooms in */
  .todaywrap{max-height:0;overflow:hidden;transition:max-height .6s var(--ease) .95s}
  .play .todaywrap{max-height:120px}
  .today{padding:9px 0;opacity:0;transform:translateY(10px)}
  .play .today{animation:bloom .55s var(--spring) 1.05s forwards}
  @keyframes bloom{to{opacity:1;transform:translateY(0)}}
  .today .rl b{color:var(--off)}
  .today .v{color:var(--off-soft)}

  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid var(--rule);opacity:0}
  .play .foot{animation:bloom .5s var(--ease) 1.4s forwards}
  .wait{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--muted)}
  .wait b{font-style:normal;font-weight:500;color:var(--gold);font-variant-numeric:tabular-nums}
  .edit{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--off);background:none;border:1px solid var(--off-line);border-radius:18px;padding:5px 11px;cursor:pointer;flex:none;transition:background .2s}
  .edit:active{background:rgba(138,180,208,.14)}

  /* sleek inline steppers (edit mode) */
  .stp{display:flex;align-items:center;justify-content:center;gap:5px}
  .stp button{width:22px;height:22px;border-radius:7px;border:none;background:rgba(138,180,208,.12);color:var(--off-soft);font-size:14px;line-height:1;cursor:pointer}
  .stp button:active{background:rgba(138,180,208,.26)}
  .stp .sv{min-width:24px;text-align:center;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--off-soft)}
  .today.editing .v{display:none}
  .today .stp{display:none}
  .today.editing .stp{display:flex}

  .replay{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--off-soft);background:rgba(138,180,208,.1);border:1px solid var(--off-line);border-radius:22px;padding:9px 16px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="banner">
      <span class="lead"></span>
      <p><b>Off day</b> · pretty rough — eased, baseline safe</p>
      <button class="undo">undo</button>
    </div>
    <div class="lede">
      <div class="k">today is a spin-off</div>
      <div class="t">Your strong days are <em>tucked away safe</em>.<br/>They'll be right here next week.</div>
    </div>
  </div>
  <div id="list"></div>
</div>
<button class="replay" onclick="replay()">↻ replay</button>

<script>
  const round25=x=>Math.round(x/2.5)*2.5;
  const LIFTS=[
    {name:'Barbell back squat', tier:'compound', date:'Jun 14', sets:4, reps:5,  kg:87.5},
    {name:'Romanian deadlift',  tier:'compound', date:'Jun 14', sets:3, reps:8,  kg:70},
    {name:'Leg press',          tier:'compound', date:'Jun 14', sets:4, reps:10, kg:130},
    {name:'Leg extension',      tier:'isolation',date:'Jun 14', sets:3, reps:12, kg:55},
    {name:'Lying leg curl',     tier:'isolation',date:'Jun 14', sets:3, reps:12, kg:45},
    {name:'Standing calf raise',tier:'isolation',date:'Jun 14', sets:4, reps:15, kg:80},
  ];
  function ease(l){const c=l.tier==='compound';return{sets:c?Math.max(1,Math.round(l.sets*0.5)):Math.max(1,Math.round(l.sets*0.7)),reps:l.reps,kg:round25(l.kg*(c?0.8:0.9))};}

  const state=[];
  const list=document.getElementById('list');
  LIFTS.forEach((l,i)=>{
    const e=ease(l); state.push({...e});
    const el=document.createElement('div'); el.className='lift'; el.dataset.i=i;
    el.innerHTML=`
      <div class="lh"><span class="ln">${l.name}</span><span class="tg ${l.tier==='compound'?'c':''}">${l.tier}</span></div>
      <div class="grid head"><span></span><span>sets</span><span>reps</span><span>weight</span></div>
      <div class="grid last">
        <span class="rl"><b>last</b><i>${l.date}</i></span>
        <span class="v">${l.sets}</span><span class="v">${l.reps}</span><span class="v">${l.kg}<u>kg</u><i class="st">★</i></span>
        <div class="shimmer"></div>
      </div>
      <div class="divline"></div>
      <div class="todaywrap"><div class="grid today" id="t${i}">
        <span class="rl"><b>today</b></span>
        <span class="v" id="vs${i}">${e.sets}</span>
        <span class="v" id="vr${i}">${e.reps}</span>
        <span class="v" id="vk${i}">${e.kg}<u>kg</u></span>
        <span class="stp"><button onclick="adj(${i},'sets',-1)">−</button><span class="sv" id="ss${i}">${e.sets}</span><button onclick="adj(${i},'sets',1)">+</button></span>
        <span class="stp"><button onclick="adj(${i},'reps',-1)">−</button><span class="sv" id="sr${i}">${e.reps}</span><button onclick="adj(${i},'reps',1)">+</button></span>
        <span class="stp"><button onclick="adj(${i},'kg',-1)">−</button><span class="sv" id="sk${i}">${e.kg}</span><button onclick="adj(${i},'kg',1)">+</button></span>
      </div></div>
      <div class="foot"><span class="wait">your <b>${l.kg}kg</b> is waiting next week</span><button class="edit" id="eb${i}" onclick="toggleEdit(${i})">edit</button></div>`;
    list.appendChild(el);
  });

  function adj(i,f,d){
    const e=state[i];
    if(f==='sets')e.sets=Math.max(1,Math.min(12,e.sets+d));
    else if(f==='reps')e.reps=Math.max(1,Math.min(30,e.reps+d));
    else e.kg=Math.max(0,round25(e.kg+d*2.5));
    document.getElementById('vs'+i).innerHTML=e.sets;
    document.getElementById('vr'+i).innerHTML=e.reps;
    document.getElementById('vk'+i).innerHTML=e.kg+'<u>kg</u>';
    document.getElementById('ss'+i).textContent=e.sets;
    document.getElementById('sr'+i).textContent=e.reps;
    document.getElementById('sk'+i).textContent=e.kg;
  }
  function toggleEdit(i){
    const t=document.getElementById('t'+i), on=t.classList.toggle('editing');
    document.getElementById('eb'+i).textContent=on?'done':'edit';
  }

  const io=new IntersectionObserver(es=>es.forEach(en=>{if(en.isIntersecting){en.target.classList.add('play');io.unobserve(en.target);}}),{threshold:.5});
  document.querySelectorAll('.lift').forEach(l=>io.observe(l));
  function replay(){document.querySelectorAll('.lift').forEach(l=>l.classList.remove('play'));window.scrollTo({top:0,behavior:'smooth'});setTimeout(()=>document.querySelectorAll('.lift').forEach(l=>io.observe(l)),350);}
</script>
</body>
</html>
